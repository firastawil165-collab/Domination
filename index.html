<body>
<div id="root"><div id="boot">LOADING DOMINATION…</div></div>

<script type="text/babel" data-presets="react">
console.warn = window.__origConsoleWarn;
console.error = window.__origConsoleError;
const { useRef, useState, useEffect, useCallback } = React;



// ================= Constants =================
const APP_VERSION = "0.133"; // bump by 0.001 each update
const START_TROOPS = 3;      // every castle begins with 3 troops
const BASE_MAX = 10;         // level-1 cap; each upgrade adds 10
const MAX_LEVEL = 4;         // cap: level 4 → 40 troops
const MAX_CASTLES = 12;      // hard cap on total towers (players + neutrals) per map
const REGEN_RATE = 0.6;      // troops/sec at level 1 (grows with level)
const UNIT_SPEED = 72;       // base px/sec per soldier
const SPAWN_RATE = 9;        // soldiers marching out per second, per order
const UNIT_R = 3;            // legacy dot radius (soldiers now render as sprites; kept for reference)
const COLLIDE_R = 6.5;       // kill distance between opposing soldiers
const TOWER_HIT_R = 20;      // arrival radius
const ATTACK_SMOKE_R = 60;   // px — smoke shows once hostile troops are this close, not while still marching in from afar
const START_HIGHLIGHT_DURATION = 5; // seconds the "this is you" ring shows around the player's castles at match start

// Camera — tilted pseudo-3D board + zoom. The world stays flat 2D; rendering
// squashes Y (TILT) and widens nearer rows (PERSP); input inverts the mapping.
const TILT = 0.74;           // ground-plane Y squash (1 = flat top-down)
const PERSP = 0.3;           // nearer rows render slightly wider/larger
// Fixed camera: 1/TILT is the zoom where the tilted board exactly fills the
// viewport vertically — the "maximum zoom out" framing, locked in.
const CAM_ZOOM = 1 / TILT;

// Defensive arrow towers
const ARROW_RANGE = 92;      // px, how far a defense tower can shoot
const ARROW_FIRE_CD = 1.3;   // seconds between shots at level 1 (faster when upgraded)
const ARROW_SPEED = 320;     // px/sec, arrow flight
const BOULDER_SPEED = 200;   // px/sec — slower, heavier flight for Tower Defense 2.0

// Battle-bed heat: tracks how hot the fighting is near the player's OWN castles,
// decaying over time, and drives SoundEngine's ambient combat layer.
const BATTLE_RADIUS = 140;     // px — combat within this range of a friendly castle counts
const BATTLE_HEAT_MAX = 6;     // heat value that maps to full (1.0) intensity
const BATTLE_HEAT_DECAY = 1.8; // heat lost per second with no new nearby kills

// Per-castle scaling by upgrade level (level 1→4 multipliers: 1, 1.3, 1.6, 2)
const LEVEL_MULT = [1, 1.6, 2.2, 3]; // level 4 = 3x level 1 regen & fire rate
const levelMult = (t) => LEVEL_MULT[Math.min(t.level, MAX_LEVEL) - 1];
const towerMax = (t) => t.level * BASE_MAX;
const towerRegen = (t) => REGEN_RATE * levelMult(t);
const towerFireCd = (t) => ARROW_FIRE_CD / levelMult(t);

// Specials share one "train" of loading capacity instead of independent cooldowns.
// It loads in a fixed order — Tower Defense, then Speed, then Tower Defense 2.0 — each
// stage taking TRAIN_STAGE seconds, so a special isn't available until every stage before
// it (and its own) has loaded. Tower Defense 2.0 is last (needs a full 60s load) because
// it's the strongest of the three. Casting a special spends progress equal to its OWN
// threshold — the 1st-stage special costs 20s, the 2nd costs 40s, the 3rd costs a full
// 60s — so using anything beyond the first always drains the whole train. All three
// trigger instantly on tap — no aiming/targeting.
// The train actually caps at a 4th, PHANTOM stage with no special of its own — it just
// banks an extra TRAIN_STAGE of reserve. That means fully maxing out and casting Tower
// Defense 2.0 (60s) still leaves 20s in the tank — enough to immediately follow up with
// Tower Defense (the 1st-stage special) instead of starting from zero.
const TRAIN_STAGE = 20;                  // seconds to load each stage
const TRAIN_MAX = TRAIN_STAGE * 4;       // 80s to fully max out (3 real stages + 1 reserve)
const SPECIAL_STAGE = { storm: 1, speed: 2, fire: 3 }; // load order, 1st/2nd/3rd
const trainThreshold = (kind) => SPECIAL_STAGE[kind] * TRAIN_STAGE;
// Beyond the shared train, each individual special also has its own 20s cooldown per
// caster — even with train progress to spare, you can't spam the same one back to back.
const SPECIAL_COOLDOWN = 20;

// Every soldier that dies anywhere on the field — yours, an ally's, or an enemy's —
// feeds everyone's train a little, symmetrically. 10 deaths = +1s for every player.
const TRAIN_KILL_GAIN = 0.1;             // seconds of train progress per soldier death

// Tower Defense specials (replace Fireball & Storm) — no longer add extra towers.
// "storm" slot = Tower Defense: every existing defense tower the caster (or their
// team) owns fires 2x as fast for a limited time. "fire" slot = Tower Defense 2.0:
// same fire rate as normal, but every tower lobs trebuchet boulders instead of
// arrows — each impact crushes a small cluster of enemies instead of just one.
const TOWER_DEF_DURATION = 12;     // seconds either buff lasts
const TOWER_DEF_RATE_MULT = 2;     // fire-rate multiplier — "storm" slot
const BOULDER_SPLASH_COUNT = 4;    // enemies destroyed per boulder impact — "fire" slot
const BOULDER_SPLASH_RADIUS = 42;  // px, blast radius around a boulder's impact point

// Speed special — now the middle tier (2nd stage). Instantly buffs every marching
// soldier on the caster's team for the rest of their trip (global, no radius/targeting
// needed).
const SPEED_BOOST = 1.5;     // +50% movement speed

const FACTIONS = [
  { id: 0, name: "You",        color: "#4ADE5A", dim: "#2FA83C", fill: "rgba(74,222,90,0.46)", human: true },
  { id: 1, name: "Crimson AI", color: "#FF6B6B", dim: "#D14D4D", fill: "rgba(255,107,107,0.48)" },
  { id: 2, name: "Teal AI",    color: "#2BD9C4", dim: "#1FA898", fill: "rgba(43,217,196,0.46)" },
  { id: 3, name: "Violet AI",  color: "#C48BFF", dim: "#9560D6", fill: "rgba(196,139,255,0.48)" },
];
const NEUTRAL = -1;
const NEUTRAL_COLOR = "#FFFFFF";
const NEUTRAL_FILL = "rgba(255,255,255,0.34)";

// ----- Soldier sprites -----
// Units render as tiny marching soldiers instead of dots. Sprites are
// pre-rendered once to offscreen canvases (faction × 2 walk frames × 2
// facings = 16 tiny canvases), so each unit costs a single drawImage —
// cheap even with hundreds on the field. Anchor: feet at bottom-center.
const SOLDIER_W = 9;   // world px
const SOLDIER_H = 13;  // world px
const soldierCache = new Map();
function soldierSprite(owner, frame, flip) {
  const key = owner * 4 + frame * 2 + (flip ? 1 : 0);
  let cv = soldierCache.get(key);
  if (cv) return cv;
  const PIX = 4; // supersample for crispness after downscale
  cv = document.createElement("canvas");
  cv.width = SOLDIER_W * PIX;
  cv.height = SOLDIER_H * PIX;
  const x = cv.getContext("2d");
  x.scale(PIX, PIX);
  if (flip) { x.translate(SOLDIER_W, 0); x.scale(-1, 1); }
  const f = FACTIONS[owner];
  const cx = SOLDIER_W / 2;
  const footY = SOLDIER_H - 0.5;

  // Ground shadow (baked into the sprite)
  x.fillStyle = "rgba(0,0,0,0.28)";
  x.beginPath(); x.ellipse(cx, footY, 3.3, 1.1, 0, 0, Math.PI * 2); x.fill();

  // Legs — two frames of a marching step
  x.strokeStyle = "#2b3350";
  x.lineWidth = 1.4;
  x.lineCap = "round";
  x.beginPath();
  if (frame === 0) { // stride
    x.moveTo(cx - 0.5, footY - 4.4); x.lineTo(cx - 2.2, footY - 0.6);
    x.moveTo(cx + 0.5, footY - 4.4); x.lineTo(cx + 2.2, footY - 0.6);
  } else {           // legs passing
    x.moveTo(cx - 0.8, footY - 4.4); x.lineTo(cx - 0.8, footY - 0.6);
    x.moveTo(cx + 0.8, footY - 4.4); x.lineTo(cx + 0.8, footY - 0.6);
  }
  x.stroke();

  // Tunic in faction color, dim border
  x.fillStyle = f.color;
  x.strokeStyle = f.dim;
  x.lineWidth = 0.8;
  x.beginPath(); x.roundRect(cx - 2.4, footY - 8.6, 4.8, 4.8, 1.2); x.fill(); x.stroke();
  // Belt
  x.fillStyle = "rgba(0,0,0,0.25)";
  x.fillRect(cx - 2.4, footY - 5.2, 4.8, 0.9);

  // Spear held forward (toward the direction of travel)
  x.strokeStyle = "#C9D2E8";
  x.lineWidth = 0.7;
  x.beginPath(); x.moveTo(cx + 1.6, footY - 3.4); x.lineTo(cx + 3.4, footY - 11.4); x.stroke();
  x.fillStyle = "#E8EEF9";
  x.beginPath();
  x.moveTo(cx + 3.5, footY - 12.3);
  x.lineTo(cx + 4.1, footY - 10.9);
  x.lineTo(cx + 2.8, footY - 11.1);
  x.closePath(); x.fill();

  // Head + faction helmet
  x.fillStyle = "#F0C49C";
  x.beginPath(); x.arc(cx, footY - 9.9, 1.7, 0, Math.PI * 2); x.fill();
  x.fillStyle = f.dim;
  x.beginPath(); x.arc(cx, footY - 10.6, 1.8, Math.PI, 0); x.fill();
  x.fillRect(cx - 1.8, footY - 10.8, 3.6, 0.7);

  soldierCache.set(key, cv);
  return cv;
}

const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];

// ================= Voronoi (half-plane clipping) =================
function clipHalfPlane(poly, a, b) {
  const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
  const nx = b.x - a.x, ny = b.y - a.y;
  const side = (p) => (p.x - mx) * nx + (p.y - my) * ny;
  const out = [];
  for (let i = 0; i < poly.length; i++) {
    const p = poly[i], q = poly[(i + 1) % poly.length];
    const dp = side(p), dq = side(q);
    if (dp <= 0) out.push(p);
    if ((dp <= 0) !== (dq <= 0)) {
      const t = dp / (dp - dq);
      out.push({ x: p.x + (q.x - p.x) * t, y: p.y + (q.y - p.y) * t });
    }
  }
  return out;
}

function computeCells(towers, W, H) {
  for (const t of towers) {
    let poly = [{ x: 0, y: 0 }, { x: W, y: 0 }, { x: W, y: H }, { x: 0, y: H }];
    for (const o of towers) {
      if (o.id === t.id || poly.length === 0) continue;
      poly = clipHalfPlane(poly, t, o);
    }
    t.cell = poly;
  }
  placeDefenders(towers);
}

function polyCentroid(poly) {
  let a = 0, cx = 0, cy = 0;
  for (let i = 0; i < poly.length; i++) {
    const p = poly[i], q = poly[(i + 1) % poly.length];
    const cross = p.x * q.y - q.x * p.y;
    a += cross; cx += (p.x + q.x) * cross; cy += (p.y + q.y) * cross;
  }
  if (Math.abs(a) < 1e-6) return { x: poly[0].x, y: poly[0].y };
  a *= 0.5;
  return { x: cx / (6 * a), y: cy / (6 * a) };
}

// Place each region's defensive tower off to the side of its castle, inside the cell.
// t.defs is an array so Tower Defense specials can bolt on extra temporary towers —
// index 0 is always the permanent base defender.
function placeDefenders(towers) {
  for (const t of towers) {
    const c = t.cell.length >= 3 ? polyCentroid(t.cell) : { x: t.x, y: t.y };
    let dx = c.x - t.x, dy = c.y - t.y;
    const len = Math.hypot(dx, dy);
    if (len < 12) { dx = 40; dy = -18; } // degenerate/tiny cell: nudge up-right
    else { const off = Math.min(58, Math.max(38, len * 0.85)); dx = (dx / len) * off; dy = (dy / len) * off; }
    t.defs = [{ x: t.x + dx, y: t.y + dy, cd: Math.random() * ARROW_FIRE_CD }];
  }
}

// ================= Map generation =================
// Rotationally symmetric layout mapped onto an ellipse that fits the screen, so
// the board fills the whole view instead of clumping in the middle. Home bases sit
// out near the edges; neutrals spread across inner and outer rings. Every player is
// the same template rotated by 360/n, so starts are even. Neutral buffers between
// neighbors are identical for every pair.
function generateMap(numPlayers, W, H, teamMode = false) {
  const n = numPlayers;
  const perPlayer = 2 + Math.floor(Math.random() * 2); // 2–3, equal for all
  const cx = W / 2, cy = H / 2;
  const margin = 80;
  const rx = W / 2 - margin, ry = H / 2 - margin;
  const step = (Math.PI * 2) / n;
  const a0 = Math.random() * Math.PI * 2 + (n === 4 && !teamMode ? Math.PI / 4 : 0);

  // Elliptical placement: fraction f of the way to the edge, at angle ang.
  const ell = (f, ang) => ({ x: cx + Math.cos(ang) * f * rx, y: cy + Math.sin(ang) * f * ry });

  // ---- 2v2: two allied pairs on opposite sides, 180°-symmetric ----
  if (teamMode) {
    const raw = [];
    const homeF = 0.9, extraF = 0.62, spread = 0.42;
    let pp = perPlayer;                  // player towers per owner, may shrink to fit the cap
    let extraMid = Math.random() < 0.7;  // second symmetric neutral pair
    let centerNeutral = Math.random() < 0.7;
    const neutralCount = () => 2 + (extraMid ? 2 : 0) + (centerNeutral ? 1 : 0);
    while (4 * pp + neutralCount() > MAX_CASTLES) {
      if (centerNeutral) centerNeutral = false;
      else if (pp > 1) pp--;
      else if (extraMid) extraMid = false;
      else break;
    }
    // One side holds owners 0 and 1 (side rotated by π holds 2 and 3).
    // Start levels: home/extra slots are 1 or 2, chosen once per slot so every
    // player (and their mirrored ally on the opposite side) gets the identical
    // pattern — no one starts with an edge.
    const homeLevel = pick([1, 2]);
    const extraLevels = Array.from({ length: Math.max(0, pp - 1) }, () => pick([1, 2]));
    const sideTemplate = [];
    const allyAngs = [a0 - spread, a0 + spread];
    for (let a = 0; a < 2; a++) {
      sideTemplate.push({ f: homeF, ang: allyAngs[a], owner: a, level: homeLevel });
      for (let i = 0; i < pp - 1; i++) {
        sideTemplate.push({ f: extraF, ang: allyAngs[a] + (i ? -0.18 : 0.18), owner: a, level: extraLevels[i] });
      }
    }
    for (let k = 0; k < 2; k++) {
      for (const s of sideTemplate) {
        const p = ell(s.f, s.ang + k * Math.PI);
        raw.push({ x: p.x, y: p.y, owner: s.owner + k * 2, level: s.level });
      }
    }
    // Neutrals along the mid-axis between the two teams (>= 2, symmetric).
    // Each ring shares one level (1–3) so both teams face the same strength;
    // level 4 is reserved for the single true-center tower. Don't let every
    // neutral ring out-level the strongest player castle — bring the weakest
    // roll down to match if they all rolled higher.
    const maxPlayerLevel = Math.max(homeLevel, ...extraLevels);
    const teamNeutralRings = [{ key: "mid", level: pick([1, 2, 3]) }];
    if (extraMid) teamNeutralRings.push({ key: "extraMid", level: pick([1, 2, 3]) });
    if (centerNeutral) teamNeutralRings.push({ key: "center", level: pick([1, 2, 3, 4]) });
    if (teamNeutralRings.every((r) => r.level > maxPlayerLevel)) {
      teamNeutralRings.reduce((min, r) => (r.level < min.level ? r : min)).level = maxPlayerLevel;
    }
    const midLevel = teamNeutralRings.find((r) => r.key === "mid").level;
    const extraMidLevel = teamNeutralRings.find((r) => r.key === "extraMid")?.level;
    const centerLevel = teamNeutralRings.find((r) => r.key === "center")?.level;
    const mid = [a0 + Math.PI / 2, a0 - Math.PI / 2];
    for (const ma of mid) { const p = ell(0.9, ma); raw.push({ x: p.x, y: p.y, owner: NEUTRAL, level: midLevel }); }
    if (extraMid) for (const ma of mid) { const p = ell(0.44, ma); raw.push({ x: p.x, y: p.y, owner: NEUTRAL, level: extraMidLevel }); }
    if (centerNeutral) raw.push({ x: cx, y: cy, owner: NEUTRAL, level: centerLevel });

    const towers = raw.map((p, i) => ({ id: i, x: p.x, y: p.y, owner: p.owner, troops: START_TROOPS, level: p.level || 1, cell: [] }));
    computeCells(towers, W, H);
    placeDefenders(towers);
    const neutrals = towers.filter((t) => t.owner === NEUTRAL).length;
    return { towers, perPlayer, neutrals };
  }

  let buffered = Math.random() < 0.5;        // equal neutral buffers vs. touching
  let innerRing = Math.random() < 0.7;       // contested neutrals toward the middle
  let centerNeutral = Math.random() < 0.7;   // one shared middle tower
  // Guarantee at least one symmetric ring → always >= numPlayers (>= 2) neutrals
  if (!buffered && !innerRing) {
    if (Math.random() < 0.5) buffered = true; else innerRing = true;
  }

  // Template for player 0 as {f, ang} offsets; rotate into every wedge.
  const homeF = 0.9;
  const da = step * 0.26;
  const extraF = 0.6 + Math.random() * 0.08;
  let pp = perPlayer;                        // player towers per player, may shrink to fit the cap
  const neutralCount = () => (buffered ? n : 0) + (innerRing ? n : 0) + (centerNeutral ? 1 : 0);
  while (n * pp + neutralCount() > MAX_CASTLES) {
    if (centerNeutral) centerNeutral = false;
    else if (pp > 1) pp--;
    else if (innerRing) innerRing = false;
    else if (buffered) buffered = false;
    else break;
  }
  const template = [{ f: homeF, ang: 0 }];
  const extraAngs = [+da, -da, 0];
  for (let i = 0; i < pp - 1; i++) {
    template.push({ f: extraF, ang: extraAngs[i % extraAngs.length] });
  }
  // Start levels: one slot (home or extra) gets a level once, then every
  // player's wedge reuses the same per-slot level — nobody starts ahead.
  const templateLevels = template.map(() => pick([1, 2]));
  const maxPlayerLevel = Math.max(...templateLevels);

  const raw = [];
  for (let k = 0; k < n; k++) {
    template.forEach((s, j) => {
      const p = ell(s.f, a0 + k * step + s.ang);
      raw.push({ x: p.x, y: p.y, owner: k, level: templateLevels[j] });
    });
  }

  // Neutral rings: each ring shares one level so whichever players border it
  // face the same strength; level 4 is reserved for the single center tower.
  // Don't let every present ring out-level the strongest player castle —
  // bring the weakest roll down to match if they all rolled higher.
  const neutralRings = [];
  if (buffered) neutralRings.push({ key: "buffered", level: pick([1, 2, 3]) });
  if (innerRing) neutralRings.push({ key: "inner", level: pick([1, 2, 3]) });
  if (centerNeutral || (!buffered && !innerRing)) neutralRings.push({ key: "center", level: pick([1, 2, 3, 4]) });
  if (neutralRings.length && neutralRings.every((r) => r.level > maxPlayerLevel)) {
    neutralRings.reduce((min, r) => (r.level < min.level ? r : min)).level = maxPlayerLevel;
  }
  const bufferedLevel = neutralRings.find((r) => r.key === "buffered")?.level;
  const innerLevel = neutralRings.find((r) => r.key === "inner")?.level;
  const centerLevelVal = neutralRings.find((r) => r.key === "center")?.level;

  // Equal neutral buffers between adjacent players, out near the rim.
  if (buffered) {
    for (let k = 0; k < n; k++) {
      const p = ell(0.92, a0 + (k + 0.5) * step);
      raw.push({ x: p.x, y: p.y, owner: NEUTRAL, level: bufferedLevel });
    }
  }
  // Inner contested ring (one per wedge → symmetric)
  if (innerRing) {
    const inF = 0.4 + Math.random() * 0.1;
    const off = buffered ? 0.5 : 0.0;
    for (let k = 0; k < n; k++) {
      const p = ell(inF, a0 + (k + off) * step);
      raw.push({ x: p.x, y: p.y, owner: NEUTRAL, level: innerLevel });
    }
  }
  // Shared center — the only tower allowed to start at level 4
  if (centerNeutral || (!buffered && !innerRing)) {
    raw.push({ x: cx, y: cy, owner: NEUTRAL, level: centerLevelVal });
  }

  const towers = raw.map((p, i) => ({
    id: i, x: p.x, y: p.y,
    owner: p.owner, troops: START_TROOPS, level: p.level || 1,
    cell: [],
  }));

  computeCells(towers, W, H);
  placeDefenders(towers);

  const neutrals = towers.filter((t) => t.owner === NEUTRAL).length;
  return { towers, perPlayer, neutrals };
}

// ================= Sound =================
// Everything here is synthesized with the Web Audio API — no external audio files,
// keeping this a single self-contained HTML document. AudioContext only starts on
// first call, which always happens from a user gesture (deploy, drag, tap), so
// browser autoplay restrictions are satisfied naturally.
const SoundEngine = (() => {
  let ctx = null, master = null, muted = false;
  const lastPlayed = {};

  const ensureCtx = () => {
    if (!ctx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      ctx = new AC();
      master = ctx.createGain();
      master.gain.value = 0.5;
      master.connect(ctx.destination);
    }
    if (ctx.state === "suspended") ctx.resume();
    return ctx;
  };

  // Skip a call if the same sound name played too recently — stops dozens of
  // simultaneous arrow/clash kills from spawning dozens of overlapping nodes.
  const throttled = (name, minMs) => {
    const now = performance.now();
    if (lastPlayed[name] !== undefined && now - lastPlayed[name] < minMs) return true;
    lastPlayed[name] = now;
    return false;
  };

  const tone = (freq, dur, type, vol, delay = 0) => {
    const c = ensureCtx();
    if (!c || muted) return;
    const t0 = c.currentTime + delay;
    const osc = c.createOscillator(), gain = c.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(vol, t0 + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    osc.connect(gain).connect(master);
    osc.start(t0); osc.stop(t0 + dur + 0.02);
  };

  const sweep = (f0, f1, dur, type, vol, delay = 0) => {
    const c = ensureCtx();
    if (!c || muted) return;
    const t0 = c.currentTime + delay;
    const osc = c.createOscillator(), gain = c.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(f0, t0);
    osc.frequency.exponentialRampToValueAtTime(Math.max(1, f1), t0 + dur);
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(vol, t0 + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    osc.connect(gain).connect(master);
    osc.start(t0); osc.stop(t0 + dur + 0.02);
  };

  const noiseBurst = (dur, vol, filterFreq, delay = 0) => {
    const c = ensureCtx();
    if (!c || muted) return;
    const t0 = c.currentTime + delay;
    const n = Math.max(1, Math.floor(c.sampleRate * dur));
    const buf = c.createBuffer(1, n, c.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < n; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / n);
    const src = c.createBufferSource();
    src.buffer = buf;
    const filter = c.createBiquadFilter();
    filter.type = "lowpass";
    filter.frequency.value = filterFreq;
    const gain = c.createGain();
    gain.gain.setValueAtTime(vol, t0);
    gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    src.connect(filter).connect(gain).connect(master);
    src.start(t0);
  };

  // ---- Battle bed: a live castle-under-attack layer built from the same clash/
  // impact vocabulary, not a separate alarm sound. A self-rescheduling stream of
  // small, muffled percussive taps (quieter/duller than the foreground hit sounds)
  // whose rate and volume track how hot the fighting is near the player's own
  // castles. Stops rescheduling itself once intensity drops back to zero.
  let battleIntensity = 0;
  let battleTimer = null;

  const battleTap = (intensity) => {
    const c = ensureCtx();
    if (!c || muted) return;
    const vol = 0.035 + 0.11 * intensity;
    // Muffled: heavier lowpass + lower gain than the foreground arrowHit/clash
    // sounds, so this reads as "distant fighting" rather than duplicating them.
    noiseBurst(0.05 + Math.random() * 0.04, vol, 1400 + Math.random() * 900);
    if (Math.random() < 0.25 + 0.35 * intensity) {
      tone(65 + Math.random() * 35, 0.09, "sine", vol * 0.55);
    }
  };

  const scheduleBattleTick = () => {
    if (battleTimer !== null) return; // already running
    const tick = () => {
      battleTimer = null;
      if (battleIntensity <= 0.02) return; // quiet enough — let the loop end
      battleTap(battleIntensity);
      const minDelay = 100, maxDelay = 460;
      const delay = maxDelay - (maxDelay - minDelay) * battleIntensity + Math.random() * 70;
      battleTimer = setTimeout(tick, delay);
    };
    tick();
  };

  return {
    setMuted: (m) => { muted = m; },
    isMuted: () => muted,
    resume: () => ensureCtx(),

    arrowHit: () => { if (throttled("arrowHit", 90)) return; noiseBurst(0.05, 0.1, 3200); },
    boulderHit: () => { if (throttled("boulderHit", 90)) return; noiseBurst(0.22, 0.3, 380); tone(85, 0.2, "sine", 0.22); },
    clash: () => { if (throttled("clash", 90)) return; noiseBurst(0.04, 0.07, 5200); },
    towerDefense: (vol = 1) => { tone(300, 0.1, "square", 0.22 * vol); tone(450, 0.12, "square", 0.18 * vol, 0.06); },
    towerDefense2: (vol = 1) => { noiseBurst(0.3, 0.32 * vol, 300); tone(80, 0.35, "sawtooth", 0.3 * vol); },
    speed: (vol = 1) => sweep(300, 900, 0.25, "sine", 0.22 * vol),
    win: () => { [523, 659, 784, 1047].forEach((f, i) => tone(f, 0.25, "triangle", 0.26, i * 0.14)); },
    lose: () => { [392, 349, 311, 262].forEach((f, i) => tone(f, 0.3, "sawtooth", 0.2, i * 0.16)); },
    click: () => tone(600, 0.04, "square", 0.08),
    pause: () => tone(500, 0.06, "sine", 0.12),

    // intensity: 0..1, how hot the fighting is near the player's own castles
    setBattleIntensity: (intensity) => {
      battleIntensity = Math.max(0, Math.min(1, intensity));
      if (battleIntensity > 0.02) scheduleBattleTick();
    },
    stopBattle: () => {
      battleIntensity = 0;
      if (battleTimer !== null) { clearTimeout(battleTimer); battleTimer = null; }
    },
  };
})();

// ================= Tutorial =================
// A short, scripted playthrough: pauses to explain a mechanic, then unpauses
// and waits for the player to actually try it (detected via g.tutorialFlags,
// set at the relevant action sites) before auto-pausing again for the next
// step. Steps without `waitFor` are pure explanation — the Continue button
// just advances immediately. `onEnter` runs once when a step becomes current,
// used to hand the player whatever resource they need to try the mechanic
// (a topped-off castle, a charged specials train) without waiting for it.
// `waitFor` flags are set at the moment the OUTCOME is actually visible (a
// capture completing, an upgrade finishing) — not at the moment the player
// merely presses the button — and `settleFor` (seconds) then holds the step
// open that much longer after the flag trips, so the player has time to
// watch the effect play out (a buff's full active duration, etc.) before the
// tutorial auto-pauses and moves on.
const TUTORIAL_STEPS = [
  {
    title: "Welcome, General",
    body: "This is a private training ground — your rival here can never defeat you. Take your time and try everything.",
    waitFor: null,
  },
  {
    title: "Sending Troops",
    body: "Drag from any castle you own to another region — enemy, neutral, or your own — to send troops there.",
    hint: "Drag from one of your castles onto a rival castle to capture it",
    waitFor: "captured",
    settleFor: 1.5, // let them see the castle actually flip to their color
  },
  {
    title: "Regions & Defense Towers",
    body: "Every region, even neutral ones, has a defense tower that shoots hostile troops crossing it. Marching through enemy or unclaimed land costs you soldiers, so plan your routes.",
    waitFor: null,
  },
  {
    title: "Upgrading Castles",
    body: "When a castle is full, double-tap it to upgrade — it costs half the garrison but raises capacity and speeds up regen and firing. We've topped one off for you.",
    hint: "Double-tap your topped-off castle to upgrade it",
    waitFor: "upgraded",
    settleFor: 1.5, // let them see the new level before moving on
    onEnter: (g) => {
      const mine = g.towers.find((t) => t.owner === 0);
      if (mine) mine.troops = towerMax(mine);
    },
  },
  {
    title: "Special: Tower Defense",
    body: "Your specials share one loading bar. Tower Defense makes every one of your towers fire twice as fast for a while. We've charged the bar for you.",
    hint: "Tap the Tower Defense segment to cast it",
    waitFor: "castStorm",
    settleFor: TOWER_DEF_DURATION, // hold the step open for the buff's full active window
    onEnter: (g) => { g.trainProgress = trainThreshold("storm"); },
  },
  {
    title: "Special: Speed",
    body: "Speed instantly boosts every marching soldier on your team for the rest of their trip. Charged and ready.",
    hint: "Tap the Speed segment to cast it",
    waitFor: "castSpeed",
    settleFor: 3, // brief pause so the pulse and any boosted march are visible
    onEnter: (g) => { g.trainProgress = trainThreshold("speed"); },
  },
  {
    title: "Special: Tower Defense 2.0",
    body: "The strongest special — your towers lob splash-damage boulders, each hit crushing up to 4 enemies. Fully charged for you.",
    hint: "Tap the Tower Defense 2.0 segment to cast it",
    waitFor: "castFire",
    settleFor: TOWER_DEF_DURATION, // hold the step open for the buff's full active window
    onEnter: (g) => { g.trainProgress = trainThreshold("fire"); },
  },
  {
    title: "You're Ready",
    body: "That covers territory, upgrades, and specials. In a real match rivals fight back and can beat you — this one just can't. Good luck out there, General.",
    waitFor: null,
    final: true,
  },
];
function applyTutorialStep(g, idx) {
  const step = TUTORIAL_STEPS[idx];
  g.tutorialWaitStart = null; // reset the settle timer for the new step
  if (step && step.onEnter) step.onEnter(g);
}

// ================= Component =================
function TowerConquest() {
  const canvasRef = useRef(null);
  const wrapRef = useRef(null);
  const mapRef = useRef(null);
  const gameRef = useRef(null);
  const [screen, setScreen] = useState("menu");
  const [numPlayers, setNumPlayers] = useState(2);
  const [mode, setMode] = useState("ffa"); // "ffa" | "2v2"
  const [showHelp, setShowHelp] = useState(false); // "How to play" modal, closed by default
  const [pct, setPct] = useState(100);
  const pctRef = useRef(100);
  const [hud, setHud] = useState([]);
  const [outcome, setOutcome] = useState(null);
  const [paused, setPaused] = useState(false);
  const pausedRef = useRef(false);
  useEffect(() => {
    pausedRef.current = paused;
    if (paused) SoundEngine.stopBattle();
  }, [paused]);
  const [soundOn, setSoundOn] = useState(true);
  useEffect(() => { SoundEngine.setMuted(!soundOn); }, [soundOn]);
  const [showPlayers, setShowPlayers] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const [tutorialStep, setTutorialStep] = useState(0);
  const tutorialStepRef = useRef(0);
  useEffect(() => { tutorialStepRef.current = tutorialStep; }, [tutorialStep]);
  const [fireInfo, setFireInfo] = useState({
    fireSecs: TRAIN_STAGE * 3, stormSecs: TRAIN_STAGE * 1, speedSecs: TRAIN_STAGE * 2,
    fireCd: 0, stormCd: 0, speedCd: 0,
    trainProgress: 0,
  });

  // Pulse each special button once, right when it comes off cooldown.
  const [pulse, setPulse] = useState({ fire: false, storm: false, speed: false });
  const prevSecsRef = useRef({ fire: TRAIN_STAGE * 3, storm: TRAIN_STAGE * 1, speed: TRAIN_STAGE * 2 });
  useEffect(() => {
    const prev = prevSecsRef.current;
    // "Ready to tap" needs BOTH the train loaded and the special's own cooldown clear —
    // pulse should only fire once it's actually usable, not just off the loading bar.
    const next = {
      fire: Math.max(fireInfo.fireSecs, fireInfo.fireCd),
      storm: Math.max(fireInfo.stormSecs, fireInfo.stormCd),
      speed: Math.max(fireInfo.speedSecs, fireInfo.speedCd),
    };
    const justReady = {
      fire: prev.fire > 0 && next.fire <= 0,
      storm: prev.storm > 0 && next.storm <= 0,
      speed: prev.speed > 0 && next.speed <= 0,
    };
    prevSecsRef.current = next;
    if (justReady.fire || justReady.storm || justReady.speed) {
      setPulse((p) => ({
        fire: p.fire || justReady.fire,
        storm: p.storm || justReady.storm,
        speed: p.speed || justReady.speed,
      }));
      for (const k of ["fire", "storm", "speed"]) {
        if (justReady[k]) setTimeout(() => setPulse((p) => ({ ...p, [k]: false })), 650);
      }
    }
  }, [fireInfo.fireSecs, fireInfo.stormSecs, fireInfo.speedSecs, fireInfo.fireCd, fireInfo.stormCd, fireInfo.speedCd]);

  useEffect(() => { pctRef.current = pct; }, [pct]);

  // Block browser/app gestures (pull-to-refresh, swipe-to-minimize) while dragging.
  // React's synthetic events are passive, so native non-passive listeners are required.
  useEffect(() => {
    const c = canvasRef.current;
    if (!c) return;
    const block = (e) => { e.preventDefault(); };
    c.addEventListener("touchstart", block, { passive: false });
    c.addEventListener("touchmove", block, { passive: false });
    c.addEventListener("touchend", block, { passive: false });
    const prevOverscroll = document.documentElement.style.overscrollBehavior;
    document.documentElement.style.overscrollBehavior = "none";
    document.body.style.overscrollBehavior = "none";
    return () => {
      c.removeEventListener("touchstart", block);
      c.removeEventListener("touchmove", block);
      c.removeEventListener("touchend", block);
      document.documentElement.style.overscrollBehavior = prevOverscroll;
      document.body.style.overscrollBehavior = prevOverscroll;
    };
  }, [screen]);

  const viewSize = () => ({
    W: mapRef.current ? mapRef.current.clientWidth : window.innerWidth,
    H: mapRef.current ? mapRef.current.clientHeight : window.innerHeight,
  });

  const startGame = useCallback((players, gameModeIn = "ffa", tutorial = false) => {
    SoundEngine.resume();
    SoundEngine.click();
    // "random" isn't a real mode — resolve it to one of the concrete modes now.
    let gameMode = tutorial ? "ffa" : gameModeIn;
    let playersResolved = tutorial ? 2 : players;
    if (!tutorial && gameModeIn === "random") {
      gameMode = Math.random() < 0.75 ? "ffa" : "2v2";
      playersResolved = gameMode === "ffa" ? [2, 3, 4][Math.floor(Math.random() * 3)] : players;
    }
    const { W, H } = viewSize();
    const teamMode = gameMode === "2v2";
    const nPlayers = teamMode ? 4 : playersResolved;
    // Team assignment: FFA → everyone their own team; 2v2 → {0,1} vs {2,3}
    const teams = teamMode ? [0, 0, 1, 1] : Array.from({ length: nPlayers }, (_, i) => i);
    const map = generateMap(nPlayers, W, H, teamMode);
    if (tutorial) {
      // Keep the tutorial forgiving: every castle except the player's own starts at
      // level 1, so nothing the player attacks is beefed up beyond the baseline.
      for (const t of map.towers) if (t.owner !== 0) t.level = 1;
    }
    gameRef.current = {
      W, H,
      towers: map.towers,
      teams,
      mode: gameMode,
      tutorial,          // if true, the player can never lose (see outcome check)
      tutorialFlags: { captured: false, upgraded: false, castStorm: false, castSpeed: false, castFire: false },
      tutorialWaitStart: null, // g.pulse timestamp when the current step's waitFor flag tripped;
                               // null while still waiting. Used to hold the step open for
                               // `settleFor` seconds so the player actually sees the effect.
      orders: [],       // gradual deployments: {owner, src, dst, remaining, accum}
      units: [],        // individual soldiers: {owner, x, y, dst, off, speed, phase}
      arrows: [],       // defensive-tower shots: {x, y, targetUid, owner, life}
      sparks: [],       // clash effects: {x, y, life, color}
      rings: [],        // one-shot cast rings (speed + tower defense): {x, y, life, dur, color}
      trainProgress: 0,            // player's shared special "train" — must load up from 0
      lastCast: {},     // "{owner}_{kind}" -> g.pulse of last successful cast, for cooldowns
      battleHeat: 0,    // combat intensity near the player's own castles, feeds the battle bed
      pointer: { x: W / 2, y: H / 2 },
      uidSeq: 1,
      numPlayers: nPlayers,
      drag: null,       // {src, x, y, sx, sy} while pointer is held down
      lastTap: null,    // {id, time} for double-tap upgrade detection
      hover: null,
      eliminated: new Set(),
      aiTimers: Array.from({ length: nPlayers }, () => 1 + Math.random() * 1.5),
      // AI trains also start empty, with a little negative jitter so they don't
      // all cross each loading threshold on the same frame.
      aiTrain: Array.from({ length: nPlayers }, () => -Math.random() * 6),
      aiFxTimer: 0.6,
      over: false,
      pulse: 0,
    };
    setOutcome(null);
    setShowPlayers(false);
    setMenuOpen(false);
    setShowHelp(false);
    if (tutorial) {
      applyTutorialStep(gameRef.current, 0);
      setTutorialStep(0);
      setPaused(true);
    } else {
      setPaused(false);
    }
    setScreen("play");
  }, []);

  // Two owners are allied if they share a team. Neutral (-1) is nobody's ally.
  const sameTeam = (g, a, b) =>
    a !== NEUTRAL && b !== NEUTRAL && g.teams[a] === g.teams[b];

  // Is (x, y) within earshot of one of the player's own (or ally's) castles? Used
  // to decide whether a kill should feed the battle-bed ambience — fights on the
  // far side of the map between other players stay silent.
  const nearFriendlyCastle = (g, x, y) => {
    for (const t of g.towers) {
      if (!(sameTeam(g, t.owner, 0) || t.owner === 0)) continue;
      if (Math.hypot(t.x - x, t.y - y) <= BATTLE_RADIUS) return true;
    }
    return false;
  };
  const addBattleHeat = (g, x, y, amount) => {
    if (!nearFriendlyCastle(g, x, y)) return;
    g.battleHeat = Math.min(BATTLE_HEAT_MAX, g.battleHeat + amount);
  };

  // ----- Camera: world <-> screen (fixed) -----
  // All game logic runs in flat world coordinates. proj() tilts the board
  // (Y squash + mild perspective) at a fixed zoom that exactly fills the
  // viewport; unproj() is the exact inverse used for pointer input. `s` is
  // the local sprite scale — nearer rows draw a touch larger.
  const proj = (g, wx, wy) => {
    const dy = wy - g.H / 2;
    const p = 1 + (dy / g.H) * PERSP;
    return {
      x: g.W / 2 + (wx - g.W / 2) * CAM_ZOOM * p,
      y: g.H / 2 + dy * CAM_ZOOM * TILT,
      s: CAM_ZOOM * p,
    };
  };
  const unproj = (g, sx, sy) => {
    const dy = (sy - g.H / 2) / (CAM_ZOOM * TILT);
    const p = 1 + (dy / g.H) * PERSP;
    return { x: g.W / 2 + (sx - g.W / 2) / (CAM_ZOOM * p), y: g.H / 2 + dy };
  };

  // ----- Resize: rescale positions, keep the battle going -----
  useEffect(() => {
    const onResize = () => {
      const g = gameRef.current;
      const c = canvasRef.current;
      if (!c) return;
      const { W, H } = viewSize();
      const dpr = window.devicePixelRatio || 1;
      c.width = W * dpr; c.height = H * dpr;
      c.style.width = W + "px"; c.style.height = H + "px";
      c.getContext("2d").setTransform(dpr, 0, 0, dpr, 0, 0);
      if (g) {
        const sx = W / g.W, sy = H / g.H;
        if (sx !== 1 || sy !== 1) {
          for (const t of g.towers) {
            t.x *= sx; t.y *= sy;
            if (t.defs) for (const d of t.defs) { d.x *= sx; d.y *= sy; }
          }
          for (const u of g.units) { u.x *= sx; u.y *= sy; }
          for (const a of g.arrows) { a.x *= sx; a.y *= sy; }
          for (const rg of g.rings) { rg.x *= sx; rg.y *= sy; }
          if (g.pointer) { g.pointer.x *= sx; g.pointer.y *= sy; }
          for (const s of g.sparks) { s.x *= sx; s.y *= sy; }
          g.W = W; g.H = H;
          computeCells(g.towers, W, H);
        }
      }
    };
    onResize();
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, [screen]);

  // ----- Orders -----
  function issueOrder(g, src, dst, percent) {
    const n = Math.floor(src.troops * (percent / 100));
    if (n < 1) return;
    g.orders.push({ owner: src.owner, src: src.id, dst: dst.id, remaining: n, accum: 0 });
  }

  // ----- Input: press a tower, drag to the target, release to march -----
  const canvasPos = (e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  };

  // Which region (Voronoi cell) contains a point — the whole region is the
  // hit area, so you can grab/target anywhere in a territory, not just the castle.
  const pointInPoly = (p, poly) => {
    let inside = false;
    for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
      const a = poly[i], b = poly[j];
      if ((a.y > p.y) !== (b.y > p.y) &&
          p.x < ((b.x - a.x) * (p.y - a.y)) / (b.y - a.y) + a.x) inside = !inside;
    }
    return inside;
  };
  const nearestTower = (g, p, radius, mineOnly) => {
    let best = null, bd = radius;
    for (const t of g.towers) {
      if (mineOnly && t.owner !== 0) continue;
      const d = dist(p, t);
      if (d < bd) { bd = d; best = t; }
    }
    return best;
  };
  // Region first (covers the whole map), nearest-castle as a soft fallback.
  const regionAt = (g, p) => {
    for (const t of g.towers) if (t.cell.length >= 3 && pointInPoly(p, t.cell)) return t;
    return nearestTower(g, p, 60, false);
  };

  // ----- Specials -----
  const trainOf = (g, owner) => (owner === 0 ? g.trainProgress : g.aiTrain[owner]);

  // How much longer until `kind` comes off its own 20s per-caster cooldown (separate
  // from train progress — this is what stops spamming the same special back to back).
  const cooldownRemaining = (g, kind, owner = 0) => {
    const last = g.lastCast[owner + "_" + kind];
    if (last === undefined) return 0;
    return Math.max(0, SPECIAL_COOLDOWN - (g.pulse - last));
  };

  const syncSpecials = (g) =>
    setFireInfo({
      fireSecs: Math.ceil(Math.max(0, trainThreshold("fire") - g.trainProgress)),
      stormSecs: Math.ceil(Math.max(0, trainThreshold("storm") - g.trainProgress)),
      speedSecs: Math.ceil(Math.max(0, trainThreshold("speed") - g.trainProgress)),
      fireCd: Math.ceil(cooldownRemaining(g, "fire")),
      stormCd: Math.ceil(cooldownRemaining(g, "storm")),
      speedCd: Math.ceil(cooldownRemaining(g, "speed")),
      trainProgress: g.trainProgress,
    });

  // Casting a special spends progress equal to its OWN threshold (20s / 40s / 60s
  // for 1st/2nd/3rd stage) — using the top-tier special always fully drains the train.
  // Also stamps this cast's time so the special's own 20s cooldown starts ticking.
  const setCd = (g, kind, owner) => {
    const cost = trainThreshold(kind);
    g.lastCast[owner + "_" + kind] = g.pulse;
    if (owner === 0) {
      g.trainProgress = Math.max(0, g.trainProgress - cost);
      syncSpecials(g);
    } else {
      g.aiTrain[owner] = Math.max(0, g.aiTrain[owner] - cost);
    }
  };

  // War fuels the train: every soldier that dies on the field — yours, an ally's, or
  // an enemy's, it doesn't matter which — nudges EVERY player's train forward a
  // little, symmetrically. Called with the number of deaths this tick.
  const gainTrainTime = (g, deaths) => {
    if (deaths <= 0) return;
    const seconds = deaths * TRAIN_KILL_GAIN;
    g.trainProgress = Math.min(TRAIN_MAX, g.trainProgress + seconds);
    for (let pid = 1; pid < g.numPlayers; pid++) {
      if (g.eliminated.has(pid)) continue;
      g.aiTrain[pid] = Math.min(TRAIN_MAX, g.aiTrain[pid] + seconds);
    }
  };

  // No new towers added — "storm" slot speeds up every existing defense tower the
  // caster's team owns (2x fire rate, TOWER_DEF_DURATION seconds). "fire" slot swaps
  // those towers to fire splash-damage boulders instead, at their normal fire rate.
  function castTowerDefense(g, owner, kind) {
    const boulder = kind === "fire";
    for (const t of g.towers) {
      if (!(sameTeam(g, t.owner, owner) || t.owner === owner)) continue;
      for (const d of t.defs) {
        if (boulder) {
          d.boulder = true;
          d.boulderExpiresAt = g.pulse + TOWER_DEF_DURATION;
        } else {
          d.rateMult = TOWER_DEF_RATE_MULT;
          d.rateExpiresAt = g.pulse + TOWER_DEF_DURATION;
        }
      }
      g.rings.push({
        x: t.x, y: t.y, life: 0,
        dur: boulder ? 0.8 : 0.6,
        color: boulder ? "#FF3B30" : "#FFD23F",
      });
    }
    const vol = owner === 0 ? 1 : 0.4;
    if (boulder) SoundEngine.towerDefense2(vol); else SoundEngine.towerDefense(vol);
    setCd(g, kind, owner);
  }

  function castSpeed(g, owner) {
    // Global, instant: every currently-marching soldier on the caster's team gets
    // +50% speed for the rest of its trip.
    for (const u of g.units) {
      if (sameTeam(g, u.owner, owner) || u.owner === owner) u.speedMul = SPEED_BOOST;
    }
    // Visual feedback: a quick pulse ring at every castle the caster owns.
    for (const t of g.towers) {
      if (sameTeam(g, t.owner, owner) || t.owner === owner) {
        g.rings.push({ x: t.x, y: t.y, life: 0, dur: 0.5, color: "#57E0C6" });
      }
    }
    SoundEngine.speed(owner === 0 ? 1 : 0.4);
    setCd(g, "speed", owner);
  }

  const readyFor = (g, kind, owner = 0) =>
    trainOf(g, owner) >= trainThreshold(kind) && cooldownRemaining(g, kind, owner) <= 0;

  // One-tap cast: no aiming/targeting step — the segment fires the moment it's tapped.
  const castPlayerSpecial = (kind) => {
    const g = gameRef.current;
    if (!g || g.over || paused) return;
    if (!readyFor(g, kind)) return;
    SoundEngine.resume();
    if (kind === "speed") castSpeed(g, 0);
    else if (kind === "storm") castTowerDefense(g, 0, "storm");
    else if (kind === "fire") castTowerDefense(g, 0, "fire");
    if (g.tutorial) {
      if (kind === "speed") g.tutorialFlags.castSpeed = true;
      else if (kind === "storm") g.tutorialFlags.castStorm = true;
      else if (kind === "fire") g.tutorialFlags.castFire = true;
    }
  };

  const handleDown = (e) => {
    const g = gameRef.current;
    if (!g || g.over || paused) return;
    SoundEngine.resume(); // real user gesture — Safari only reliably resumes a suspended context from here
    e.currentTarget.setPointerCapture?.(e.pointerId);
    const sp = canvasPos(e);
    const p = unproj(g, sp.x, sp.y);
    g.pointer = p;
    const region = regionAt(g, p);
    // Drag endpoint (x, y) lives in world coords; (ssx, ssy) keeps the screen
    // start so the tap-vs-drag threshold is measured in screen pixels.
    if (region && region.owner === 0) g.drag = { src: region.id, x: p.x, y: p.y, ssx: sp.x, ssy: sp.y };
  };

  const handleMove = (e) => {
    const g = gameRef.current;
    if (!g) return;
    const sp = canvasPos(e);
    const p = unproj(g, sp.x, sp.y);
    g.pointer = p;
    const hit = regionAt(g, p);
    g.hover = hit ? hit.id : null;
    if (g.drag) { g.drag.x = p.x; g.drag.y = p.y; }
  };

  const handleUp = (e) => {
    const g = gameRef.current;
    if (!g) return;
    const drag = g.drag;
    g.drag = null;
    if (!drag || g.over) return;
    const sp = canvasPos(e);
    const p = unproj(g, sp.x, sp.y);
    const target = regionAt(g, p); // any region: enemy, neutral, or your own
    const src = g.towers[drag.src];
    const moved = Math.hypot(sp.x - drag.ssx, sp.y - drag.ssy); // screen px

    // A tap (little movement) that lands back on your own castle → double-tap upgrades it
    if (moved < 14 && target && target.id === src.id && src.owner === 0) {
      const now = performance.now();
      if (g.lastTap && g.lastTap.id === src.id && now - g.lastTap.time < 350) {
        g.lastTap = null;
        if (canStartUpgrade(src)) {
          startUpgrade(g, src);
          // Tutorial's "upgraded" flag fires when the build actually finishes
          // (see the upgrade-build-completion block in the game loop), not here —
          // otherwise the tutorial would advance before the player sees the result.
        }
      } else {
        g.lastTap = { id: src.id, time: now };
      }
      return;
    }

    if (target && target.id !== src.id && src.owner === 0) {
      issueOrder(g, src, target, pctRef.current);
      // Tutorial's "captured" flag fires on actual capture (see unitArrives),
      // not on order-issue, so the step waits until the player really takes
      // the castle rather than advancing the instant they let go of the drag.
    }
  };

  const handleCancel = () => {
    const g = gameRef.current;
    if (g) g.drag = null;
  };

  // ----- AI -----
  // Hostile troops currently marching toward any of pid's team's castles — how
  // urgently Tower Defense would pay off right now.
  function incomingThreat(g, pid, isTeam) {
    let total = 0;
    for (const t of g.towers) {
      if (!isTeam(t.owner)) continue;
      for (const u of g.units) if (u.dst === t.id && !isTeam(u.owner)) total++;
      for (const o of g.orders) if (o.dst === t.id && !isTeam(o.owner) && o.remaining > 0) total += o.remaining;
    }
    return total;
  }

  // Each AI decides whether to spend its specials this tick.
  function aiSpecials(g) {
    for (let pid = 1; pid < g.numPlayers; pid++) {
      if (g.eliminated.has(pid)) continue;
      const isTeam = (owner) => owner === pid || sameTeam(g, owner, pid);

      // Tower Defense 2.0 — save the boulder barrage for serious incoming pressure.
      if (readyFor(g, "fire", pid)) {
        if (incomingThreat(g, pid, isTeam) >= 10) castTowerDefense(g, pid, "fire");
      }
      // Tower Defense — worth it against moderate pressure.
      if (readyFor(g, "storm", pid)) {
        if (incomingThreat(g, pid, isTeam) >= 5) castTowerDefense(g, pid, "storm");
      }
      // Speed — cast whenever it has a meaningful force marching to benefit from it.
      if (readyFor(g, "speed", pid)) {
        const marching = g.units.reduce((n, u) => n + (isTeam(u.owner) ? 1 : 0), 0);
        if (marching >= 5) castSpeed(g, pid);
      }
    }
  }

  function aiAct(g, pid) {
    const own = g.towers.filter((t) => t.owner === pid);
    if (own.length === 0) return;

    // Tally troops in flight toward every tower, split into "my team" vs "enemy".
    const isTeam = (owner) => owner === pid || sameTeam(g, owner, pid);
    const inc = {};
    for (const t of g.towers) inc[t.id] = { team: 0, enemy: 0 };
    for (const u of g.units) {
      const rec = inc[u.dst]; if (!rec) continue;
      if (isTeam(u.owner)) rec.team++; else rec.enemy++;
    }
    for (const o of g.orders) {
      if (o.remaining <= 0) continue;
      const rec = inc[o.dst]; if (!rec) continue;
      if (isTeam(o.owner)) rec.team += o.remaining; else rec.enemy += o.remaining;
    }

    const diag = Math.hypot(g.W, g.H);
    const spareFrom = (t) => Math.max(0, Math.floor(t.troops) - 2); // always keep a small garrison

    // Upgrade a maxed castle when it's safe to spend half the garrison
    const upgradable = own.filter((t) => canStartUpgrade(t) && inc[t.id].enemy < 2);
    if (upgradable.length && Math.random() < 0.6) {
      startUpgrade(g, upgradable.reduce((a, b) => (a.troops > b.troops ? a : b)));
      return;
    }

    const ATTACK_CAP = 75; // AI never commits more than 3/4 of a castle's garrison at once
    const bracket = (srcTroops, need) =>
      [25, 50, ATTACK_CAP].find((o) => Math.floor((srcTroops * o) / 100) >= need);

    // Nearest of my own towers that can spare troops, isn't itself under threat,
    // and is close enough that help would actually arrive in time.
    const helperFor = (target, exclude) => {
      let best = null, bd = Infinity;
      for (const s of own) {
        if (s.id === target.id || (exclude && s.id === exclude.id)) continue;
        if (spareFrom(s) < 1) continue;
        if (inc[s.id].enemy > s.troops * 0.6) continue; // don't strip a threatened tower
        const d = dist(s, target);
        if (d > diag * 0.62) continue;                  // too far to matter
        if (d < bd) { bd = d; best = s; }
      }
      return best;
    };

    // ---- 1) Defend a teammate (mine or an ally's, including the human) ----
    // Consider all towers on my team; find the one most likely to fall.
    let defend = null, worst = 0;
    for (const t of g.towers) {
      if (!isTeam(t.owner)) continue;
      const defense = t.troops + inc[t.id].team;
      const shortfall = inc[t.id].enemy - defense;   // >0 → projected to fall
      if (shortfall > 1 && shortfall > worst) { worst = shortfall; defend = t; }
    }
    if (defend) {
      const helper = helperFor(defend, defend.owner === pid ? defend : null);
      if (helper) {
        const canSend = spareFrom(helper);
        const need = worst + 1;
        // Only commit if it's not a waste: we can cover most of the shortfall.
        if (canSend >= need * 0.6) {
          const pct = bracket(helper.troops, Math.min(need, canSend)) || ATTACK_CAP;
          issueOrder(g, helper, defend, pct);
          return;
        }
      }
    }

    // ---- 2) Reinforce a teammate's attack that's coming up short ----
    let push = null, bestDeficit = 0;
    for (const t of g.towers) {
      if (isTeam(t.owner)) continue;                 // enemy or neutral
      const assault = inc[t.id].team;
      if (assault <= 0) continue;                     // nobody on my team is attacking it
      const garrison = Math.min(towerMax(t), t.troops + towerRegen(t) * 0.5);
      const deficit = garrison - assault;             // >0 → the assault falls short
      if (deficit > 0.5 && deficit > bestDeficit) { bestDeficit = deficit; push = t; }
    }
    if (push) {
      const helper = helperFor(push, null);
      if (helper) {
        const canSend = spareFrom(helper);
        const need = bestDeficit + 1;
        if (canSend >= Math.min(need, 2)) {
          const pct = bracket(helper.troops, Math.min(need, canSend)) || ATTACK_CAP;
          issueOrder(g, helper, push, pct);
          return;
        }
      }
    }

    // ---- 3) Otherwise, expand on its own ----
    const src = own.reduce((a, b) => (a.troops > b.troops ? a : b));
    if (src.troops < 3) return;
    const targets = g.towers.filter((t) => !isTeam(t.owner));
    if (targets.length === 0) return;

    const REVENGE_COOLDOWN = 8; // seconds before we'll consider retaking a castle we just lost
    const evalTarget = (t) => {
      const travel = dist(src, t) / UNIT_SPEED;
      // Reinforcements already inbound to this castle (from its owner, or anyone
      // else hostile to us) count toward its defense — otherwise we'll throw an
      // attack at a castle that's about to be re-garrisoned and lose for nothing.
      const garrison = Math.min(towerMax(t), t.troops + towerRegen(t) * travel) + inc[t.id].enemy;
      const rawNeed = garrison - inc[t.id].team; // don't pile onto what the team already has covered
      // The defense tower itself whittles down an approaching force — every shot
      // it gets off during the march (and during the time it takes to actually
      // deploy that many troops, since orders trickle out at SPAWN_RATE) kills
      // one attacker before they ever reach the garrison fight. Without this the
      // AI routinely sends forces that look sufficient on paper but arrive short
      // by exactly the number of arrows fired en route — the classic "attacked
      // and lost for nothing" case.
      if (t.defs && t.defs.length && rawNeed > 0) {
        const fireCd = towerFireCd(t) / (t.defs[0].rateMult || 1);
        const spawnDuration = rawNeed / SPAWN_RATE;
        const shots = (travel + spawnDuration) / fireCd;
        return rawNeed + shots;
      }
      return rawNeed;
    };
    // A castle we just lost is a trap unless we can hit it hard: demand a much
    // bigger margin during the cooldown window instead of pecking at it again
    // the moment it looks weak.
    const revengeMargin = (t) =>
      (t.lostBy === pid && g.pulse - t.lostAt < REVENGE_COOLDOWN) ? 2 : 1.3;

    let best = null, bestScore = Infinity;
    for (const t of targets) {
      const score = evalTarget(t) + dist(src, t) * 0.02;
      if (score < bestScore) { bestScore = score; best = t; }
    }
    if (!best) return;

    const need = evalTarget(best);
    // Only worth attacking if the force sent clears the defense with real room to
    // spare — sending barely more than the garrison means the attack can fail to
    // arithmetic rounding, regen ticks, or reinforcements landing a beat early.
    const minSend = need * revengeMargin(best);
    const choice = [25, 50, ATTACK_CAP].find(
      (o) => Math.floor((src.troops * o) / 100) >= minSend
    );

    if (choice) { issueOrder(g, src, best, choice); return; }

    // src alone can't clear the bar even at the 75% cap — pull in the nearest other
    // castle that can spare troops so the combined force still hits the bar,
    // rather than either overcommitting one castle or attacking too thin.
    const primarySend = Math.floor(src.troops * ATTACK_CAP / 100);
    const helper2 = own
      .filter((s) => s.id !== src.id && spareFrom(s) >= 1 && inc[s.id].enemy < s.troops * 0.5)
      .sort((a, b) => dist(a, best) - dist(b, best))[0];
    if (helper2) {
      const helperSend = Math.min(Math.floor(helper2.troops * ATTACK_CAP / 100), spareFrom(helper2));
      if (primarySend + helperSend >= minSend && primarySend >= 1 && helperSend >= 1) {
        issueOrder(g, src, best, ATTACK_CAP);
        issueOrder(g, helper2, best, ATTACK_CAP);
        return;
      }
    }

    if (Math.random() < 0.25 && own.length > 1) {
      const weak = own.reduce((a, b) => (a.troops < b.troops ? a : b));
      if (weak.id !== src.id) issueOrder(g, src, weak, 25);
    }
  }

  // ----- Castle upgrade -----
  // Kick off a 5-second upgrade. Cost (half the max) is paid up front; the level
  // (and its bigger cap, faster regen & arrow fire) lands when the build finishes.
  function startUpgrade(g, t) {
    t.troops = Math.max(0, t.troops - towerMax(t) / 2);
    t.upgrading = { time: 0, dur: 5 };
  }
  const canStartUpgrade = (t) =>
    t.level < MAX_LEVEL && !t.upgrading && t.troops >= towerMax(t);

  // ----- Arrival / capture -----
  function unitArrives(g, u, t) {
    if (sameTeam(g, t.owner, u.owner) || t.owner === u.owner) {
      t.troops += 1; // reinforce own or allied garrison (may exceed 100)
    } else if (t.troops >= 1) {
      t.troops -= 1;
    } else {
      t.lostBy = t.owner;      // who just lost this castle
      t.lostAt = g.pulse;      // game clock at the moment of capture
      t.owner = u.owner;
      t.level = Math.max(1, t.level - 1); // a defeated castle is knocked down a level
      t.upgrading = null;                 // cancel any build in progress
      t.troops = 1;
      if (g.tutorial && u.owner === 0) g.tutorialFlags.captured = true;
      // A captured castle loses any active Tower Defense / 2.0 buff — it doesn't
      // carry over to benefit whoever just took it.
      for (const d of t.defs) {
        d.rateMult = 1; d.rateExpiresAt = 0;
        d.boulder = false; d.boulderExpiresAt = 0;
      }
      // Any half-finished orders leaving this tower are cancelled by the capture
      for (const o of g.orders) if (o.src === t.id && o.owner !== u.owner) o.remaining = 0;
    }
  }

  // ================= Game loop =================
  useEffect(() => {
    if (screen !== "play") return;
    let raf, last = performance.now(), hudTimer = 0;

    const step = (now) => {
      const g = gameRef.current;
      const dt = Math.min(0.05, (now - last) / 1000);
      last = now;
      if (!g) return;
      g.pulse += dt;

      if (!g.over && !pausedRef.current) {
        // Battle heat decays continuously; feeds the ambient battle bed below.
        if (g.battleHeat > 0) g.battleHeat = Math.max(0, g.battleHeat - BATTLE_HEAT_DECAY * dt);

        // Regeneration — every tower, neutral included, climbs back toward 100
        for (const t of g.towers) {
          if (t.troops < towerMax(t)) {
            t.troops = Math.min(towerMax(t), t.troops + towerRegen(t) * dt);
          }
        }

        // Upgrade builds finishing
        for (const t of g.towers) {
          if (!t.upgrading) continue;
          t.upgrading.time += dt;
          if (t.upgrading.time >= t.upgrading.dur) {
            t.level += 1;
            t.upgrading = null;
            if (g.tutorial && t.owner === 0) g.tutorialFlags.upgraded = true;
            for (let i = 0; i < 14; i++) {
              const a = (i / 14) * Math.PI * 2;
              g.sparks.push({ x: t.x + Math.cos(a) * 22, y: t.y + Math.sin(a) * 22, life: 0.55, color: "#FFD86A" });
            }
          }
        }

        // Orders trickle soldiers out of the gate
        for (let i = g.orders.length - 1; i >= 0; i--) {
          const o = g.orders[i];
          const src = g.towers[o.src];
          if (o.remaining <= 0 || src.owner !== o.owner) { g.orders.splice(i, 1); continue; }
          o.accum += SPAWN_RATE * dt;
          while (o.accum >= 1 && o.remaining > 0 && src.troops >= 1) {
            o.accum -= 1;
            o.remaining -= 1;
            src.troops -= 1;
            const dstT = g.towers[o.dst];
            const ang = Math.atan2(dstT.y - src.y, dstT.x - src.x);
            g.units.push({
              uid: g.uidSeq++,
              owner: o.owner,
              x: src.x + Math.cos(ang) * 18 + (Math.random() - 0.5) * 8,
              y: src.y + Math.sin(ang) * 18 + (Math.random() - 0.5) * 8,
              dst: o.dst,
              off: (Math.random() - 0.5) * 26,   // marching-lane offset
              speed: UNIT_SPEED * (0.85 + Math.random() * 0.3),
              phase: Math.random() * Math.PI * 2,
            });
          }
          if (o.remaining <= 0) g.orders.splice(i, 1);
        }

        // March
        for (const u of g.units) {
          const t = g.towers[u.dst];
          const d = dist(u, t);
          let tx = t.x, ty = t.y;
          if (d > 60) { // hold formation lanes until close, then converge
            const px = -(t.y - u.y) / d, py = (t.x - u.x) / d;
            tx += px * u.off; ty += py * u.off;
          }
          const spd = u.speed * (u.speedMul || 1);
          const dd = Math.hypot(tx - u.x, ty - u.y) || 1;
          const wob = Math.sin(g.pulse * 9 + u.phase) * 6 * dt;
          u.x += ((tx - u.x) / dd) * spd * dt + (-(ty - u.y) / dd) * wob;
          u.y += ((ty - u.y) / dd) * spd * dt + ((tx - u.x) / dd) * wob;
        }

        // Field clashes: opposing soldiers kill each other where they meet
        const cell = 14, grid = new Map();
        const key = (x, y) => ((x / cell) | 0) + "," + ((y / cell) | 0);
        g.units.forEach((u, i) => {
          const k = key(u.x, u.y);
          if (!grid.has(k)) grid.set(k, []);
          grid.get(k).push(i);
        });
        const dead = new Set();
        for (let i = 0; i < g.units.length; i++) {
          if (dead.has(i)) continue;
          const u = g.units[i];
          const cx = (u.x / cell) | 0, cy = (u.y / cell) | 0;
          outer:
          for (let gx = cx - 1; gx <= cx + 1; gx++) {
            for (let gy = cy - 1; gy <= cy + 1; gy++) {
              const bucket = grid.get(gx + "," + gy);
              if (!bucket) continue;
              for (const j of bucket) {
                if (j <= i || dead.has(j)) continue;
                const v = g.units[j];
                if (sameTeam(g, v.owner, u.owner)) continue;
                if (dist(u, v) < COLLIDE_R) {
                  dead.add(i); dead.add(j);
                  const mx = (u.x + v.x) / 2, my = (u.y + v.y) / 2;
                  g.sparks.push({ x: mx, y: my, life: 0.45, color: "#FFE9C2" });
                  addBattleHeat(g, mx, my, 1);
                  break outer;
                }
              }
            }
          }
        }
        gainTrainTime(g, dead.size);
        if (dead.size) SoundEngine.clash();

        // Arrivals
        for (let i = g.units.length - 1; i >= 0; i--) {
          if (dead.has(i)) { g.units.splice(i, 1); continue; }
          const u = g.units[i];
          const t = g.towers[u.dst];
          if (dist(u, t) <= TOWER_HIT_R) {
            unitArrives(g, u, t);
            g.units.splice(i, 1);
          }
        }

        // Defensive towers: every region (including neutrals) shoots hostile troops
        // passing through it. Tower Defense speeds up firing; Tower Defense 2.0 swaps
        // to slower, splash-killing boulders at the normal rate — neither adds towers.
        const byUid = new Map();
        for (const u of g.units) byUid.set(u.uid, u);
        for (const t of g.towers) {
          if (!t.defs || !t.defs.length) continue;
          for (const d of t.defs) {
            // Expire either buff once its window is up
            if (d.rateMult && d.rateExpiresAt <= g.pulse) { d.rateMult = 1; d.rateExpiresAt = 0; }
            if (d.boulder && d.boulderExpiresAt <= g.pulse) { d.boulder = false; d.boulderExpiresAt = 0; }
            d.cd -= dt;
            if (d.cd > 0) continue;
            let nearest = null, nd = ARROW_RANGE;
            for (const u of g.units) {
              if (sameTeam(g, u.owner, t.owner)) continue;
              const dd = Math.hypot(u.x - t.x, u.y - t.y);
              if (dd < nd) { nd = dd; nearest = u; }
            }
            if (nearest) {
              g.arrows.push({
                x: d.x, y: d.y,
                targetUid: nearest.uid, owner: t.owner,
                lx: nearest.x, ly: nearest.y, life: 1.2,
                boulder: !!d.boulder,
              });
              d.cd = towerFireCd(t) / (d.rateMult || 1);
            }
          }
        }

        // Arrow flight — homes on its target, kills on contact. Boulders (Tower
        // Defense 2.0) fly slower and crush a small cluster on impact instead of
        // just the one target.
        const arrowKilled = new Set();
        for (let i = g.arrows.length - 1; i >= 0; i--) {
          const a = g.arrows[i];
          a.life -= dt;
          const tgt = byUid.get(a.targetUid);
          if (tgt && !arrowKilled.has(tgt.uid)) { a.lx = tgt.x; a.ly = tgt.y; }
          const d = Math.hypot(a.lx - a.x, a.ly - a.y) || 1;
          const v = (a.boulder ? BOULDER_SPEED : ARROW_SPEED) * dt;
          a.x += ((a.lx - a.x) / d) * v;
          a.y += ((a.ly - a.y) / d) * v;
          if (d <= v + 4) {
            if (tgt && !arrowKilled.has(tgt.uid)) {
              arrowKilled.add(tgt.uid);
              g.sparks.push({ x: tgt.x, y: tgt.y, life: 0.35, color: "#FFD27A" });
              if (a.boulder) {
                SoundEngine.boulderHit();
                addBattleHeat(g, tgt.x, tgt.y, 1.5);
                // Crush the nearest few enemies caught in the blast radius too
                const splashed = g.units
                  .filter((u) => u.uid !== tgt.uid && !arrowKilled.has(u.uid) &&
                    !sameTeam(g, u.owner, a.owner) && Math.hypot(u.x - tgt.x, u.y - tgt.y) <= BOULDER_SPLASH_RADIUS)
                  .sort((p, q) => Math.hypot(p.x - tgt.x, p.y - tgt.y) - Math.hypot(q.x - tgt.x, q.y - tgt.y))
                  .slice(0, BOULDER_SPLASH_COUNT - 1);
                for (const u of splashed) {
                  arrowKilled.add(u.uid);
                  g.sparks.push({ x: u.x, y: u.y, life: 0.35, color: "#C99060" });
                }
                // Dust-cloud burst at the impact point
                for (let k = 0; k < 6; k++) {
                  const ang = Math.random() * Math.PI * 2, r = Math.random() * BOULDER_SPLASH_RADIUS * 0.6;
                  g.sparks.push({
                    x: tgt.x + Math.cos(ang) * r, y: tgt.y + Math.sin(ang) * r,
                    life: 0.4, color: "#8a7660",
                  });
                }
              } else {
                SoundEngine.arrowHit();
                addBattleHeat(g, tgt.x, tgt.y, 0.6);
              }
            }
            g.arrows.splice(i, 1);
          } else if (a.life <= 0) {
            g.arrows.splice(i, 1);
          }
        }
        if (arrowKilled.size) {
          g.units = g.units.filter((u) => !arrowKilled.has(u.uid));
          gainTrainTime(g, arrowKilled.size);
        }

        // Sparks fade
        for (let i = g.sparks.length - 1; i >= 0; i--) {
          g.sparks[i].life -= dt;
          if (g.sparks[i].life <= 0) g.sparks.splice(i, 1);
        }

        // AI turns
        for (let pid = 1; pid < g.numPlayers; pid++) {
          if (g.eliminated.has(pid)) continue;
          g.aiTimers[pid] -= dt;
          if (g.aiTimers[pid] <= 0) {
            aiAct(g, pid);
            g.aiTimers[pid] = 1.1 + Math.random() * 1.6;
          }
          if (g.aiTrain[pid] < TRAIN_MAX) g.aiTrain[pid] = Math.min(TRAIN_MAX, g.aiTrain[pid] + dt);
        }
        // Evaluate AI specials a few times a second (keeps the cluster search cheap)
        g.aiFxTimer -= dt;
        if (g.aiFxTimer <= 0) {
          g.aiFxTimer = 0.5;
          aiSpecials(g);
        }

        // Eliminations & outcome (team-aware)
        for (let pid = 0; pid < g.numPlayers; pid++) {
          if (g.eliminated.has(pid)) continue;
          const alive =
            g.towers.some((t) => t.owner === pid) ||
            g.units.some((u) => u.owner === pid) ||
            g.orders.some((o) => o.owner === pid && o.remaining > 0);
          if (!alive) g.eliminated.add(pid);
        }
        const aliveTeams = new Set();
        for (let pid = 0; pid < g.numPlayers; pid++)
          if (!g.eliminated.has(pid)) aliveTeams.add(g.teams[pid]);
        const myTeam = g.teams[0];
        if (!g.tutorial && !aliveTeams.has(myTeam)) { g.over = true; setOutcome("lose"); SoundEngine.lose(); SoundEngine.stopBattle(); }
        else if (aliveTeams.size === 1) { g.over = true; setOutcome("win"); SoundEngine.win(); SoundEngine.stopBattle(); }

        // Tutorial: once the requested action is detected, hold the step open
        // for `settleFor` seconds so the player actually sees the effect (a
        // capture completing, a buff's full active window), then auto-pause
        // and advance to the next step (which may hand the player a fresh
        // resource via onEnter). Steps with no waitFor only advance via the
        // overlay's own Continue button, not here.
        if (g.tutorial) {
          const tStep = TUTORIAL_STEPS[tutorialStepRef.current];
          if (tStep && tStep.waitFor && g.tutorialFlags[tStep.waitFor]) {
            if (g.tutorialWaitStart == null) g.tutorialWaitStart = g.pulse;
            if (g.pulse - g.tutorialWaitStart >= (tStep.settleFor || 0)) {
              const next = tutorialStepRef.current + 1;
              if (TUTORIAL_STEPS[next]) { applyTutorialStep(g, next); setTutorialStep(next); }
              setPaused(true);
            }
          }
        }

        // Special "train" progress + effect animations
        if (g.trainProgress < TRAIN_MAX) g.trainProgress = Math.min(TRAIN_MAX, g.trainProgress + dt);
        for (let i = g.rings.length - 1; i >= 0; i--) {
          g.rings[i].life += dt;
          if (g.rings[i].life >= g.rings[i].dur) g.rings.splice(i, 1);
        }
      }

      draw(g);

      hudTimer += dt;
      if (hudTimer > 0.35) {
        hudTimer = 0;
        if (!g.over && !pausedRef.current) {
          SoundEngine.setBattleIntensity(g.battleHeat / BATTLE_HEAT_MAX);
        }
        const stats = [];
        for (let pid = 0; pid < g.numPlayers; pid++) {
          const mine = g.towers.filter((t) => t.owner === pid);
          const marching =
            g.units.filter((u) => u.owner === pid).length +
            g.orders.filter((o) => o.owner === pid).reduce((s, o) => s + o.remaining, 0);
          stats.push({
            pid,
            team: g.teams[pid],
            towers: mine.length,
            troops: Math.floor(mine.reduce((s, t) => s + t.troops, 0) + marching),
            dead: g.eliminated.has(pid),
          });
        }
        setHud(stats);
        setFireInfo({
          fireSecs: Math.ceil(Math.max(0, trainThreshold("fire") - g.trainProgress)),
          stormSecs: Math.ceil(Math.max(0, trainThreshold("storm") - g.trainProgress)),
          speedSecs: Math.ceil(Math.max(0, trainThreshold("speed") - g.trainProgress)),
          fireCd: Math.ceil(cooldownRemaining(g, "fire")),
          stormCd: Math.ceil(cooldownRemaining(g, "storm")),
          speedCd: Math.ceil(cooldownRemaining(g, "speed")),
          trainProgress: g.trainProgress,
        });
      }
      raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => { cancelAnimationFrame(raf); SoundEngine.stopBattle(); };
  }, [screen]);

  // ================= Rendering =================
  // A slim arrow tower that guards each region, neutrals included. Takes a specific
  // defender from t.defs so a castle with Tower Defense bonuses can draw several.
  // Drawn upright at the projected base — the translate/scale wrapper keeps
  // the sprite vertical while it scales with zoom and depth.
  function drawDefenseTower(ctx, t, def, g) {
    if (!def) return;
    const col = t.owner === NEUTRAL ? NEUTRAL_COLOR : FACTIONS[t.owner].color;
    const B = proj(g, def.x, def.y);
    ctx.save();
    ctx.translate(B.x, B.y);
    ctx.scale(B.s, B.s);
    ctx.translate(-def.x, -def.y);
    const x = def.x, y = def.y;
    const lvl = t.level || 1;
    const buff2 = def.rateMult === TOWER_DEF_RATE_MULT;  // Tower Defense (2x fire rate)
    const boulder = !!def.boulder;                        // Tower Defense 2.0 (splash boulders)
    const s = (1 + Math.min(lvl - 1, 6) * 0.09) * (boulder ? 1.15 : buff2 ? 1.15 : 1);
    const w = 11 * s, h = 22 * s;

    // Boulder mode gets a pulsing red menace-glow behind it; 2x fire rate gets a
    // softer gold glow.
    if (boulder) {
      const pulseT = 0.5 + 0.5 * Math.sin(g.pulse * 6);
      const glowR = w * (2.2 + 0.5 * pulseT);
      const glow = ctx.createRadialGradient(x, y - h * 0.3, 0, x, y - h * 0.3, glowR);
      glow.addColorStop(0, `rgba(255,40,20,${0.3 + 0.14 * pulseT})`);
      glow.addColorStop(1, "rgba(255,40,20,0)");
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(x, y - h * 0.3, glowR, 0, Math.PI * 2); ctx.fill();
    } else if (buff2) {
      const glowR = w * 1.8;
      const glow = ctx.createRadialGradient(x, y - h * 0.3, 0, x, y - h * 0.3, glowR);
      glow.addColorStop(0, "rgba(255,216,106,0.28)");
      glow.addColorStop(1, "rgba(255,216,106,0)");
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(x, y - h * 0.3, glowR, 0, Math.PI * 2); ctx.fill();
    }

    // Shadow
    ctx.fillStyle = "rgba(0,0,0,0.3)";
    ctx.beginPath();
    ctx.ellipse(x, y + h / 2 + 2, w * 0.7, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Shaft — same silhouette as the base tower, just retinted: boulder mode goes
    // dark scorched stone, the 2x buff gets a warm gold cast, unbuffed stays grey.
    const grad = ctx.createLinearGradient(x - w / 2, 0, x + w / 2, 0);
    if (boulder) {
      grad.addColorStop(0, "#5A4438"); grad.addColorStop(0.5, "#3A2A22"); grad.addColorStop(1, "#5A4438");
    } else if (buff2) {
      grad.addColorStop(0, "#FFD86A"); grad.addColorStop(1, "#C98A2E");
    } else {
      grad.addColorStop(0, "#6E7AA0"); grad.addColorStop(1, "#3b4463");
    }
    ctx.fillStyle = grad;
    ctx.fillRect(x - w / 2, y - h / 2, w, h);

    // Crenellated top
    ctx.fillStyle = boulder ? "#3A2A22" : buff2 ? "#FFD86A" : "#6E7AA0";
    ctx.fillRect(x - w / 2, y - h / 2 - 3, 3, 4);
    ctx.fillRect(x - 1.5, y - h / 2 - 3, 3, 4);
    ctx.fillRect(x + w / 2 - 3, y - h / 2 - 3, 3, 4);

    // Arrow slit — boulder mode glows hot ember-orange instead of faction color
    if (boulder) {
      const slitGlow = ctx.createRadialGradient(x, y - h / 2 + 8, 0, x, y - h / 2 + 8, 6);
      slitGlow.addColorStop(0, "rgba(255,190,110,0.95)");
      slitGlow.addColorStop(0.6, "rgba(255,90,30,0.75)");
      slitGlow.addColorStop(1, "rgba(255,90,30,0)");
      ctx.fillStyle = slitGlow;
      ctx.beginPath(); ctx.arc(x, y - h / 2 + 8, 6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#FFD8A0";
      ctx.fillRect(x - 1.5, y - h / 2 + 4, 3, 8);
    } else {
      ctx.fillStyle = col;
      ctx.fillRect(x - 1.5, y - h / 2 + 4, 3, 8);
    }
    ctx.restore();
  }

  // The troop counter for a castle. Drawn in its own pass AFTER every building,
  // so a tall castle in front can never paint over a counter behind it. The plate
  // sits just below the castle base; projected and scaled like the sprite.
  function drawGarrisonPlate(ctx, t, g) {
    const owned = t.owner !== NEUTRAL;
    const col = owned ? FACTIONS[t.owner].color : NEUTRAL_COLOR;
    const groundY = t.y + 14;                 // matches the sprite's base
    const B = proj(g, t.x, groundY + 17);     // project the plate's anchor point
    const s = B.s;
    ctx.save();
    ctx.translate(B.x, B.y);
    ctx.scale(s, s);
    const n = Math.floor(t.troops);
    ctx.font = "700 13px 'IBM Plex Mono', monospace";
    const plateW = ctx.measureText(n).width + 12;
    ctx.fillStyle = "rgba(10,14,24,0.9)";
    ctx.beginPath();
    ctx.roundRect(-plateW / 2, -9, plateW, 18, 5);
    ctx.fill();
    ctx.strokeStyle = t.troops > towerMax(t) ? col : "rgba(138,147,171,0.5)";
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = "#E8EBF2";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(n, 0, 0);
    ctx.restore();
  }

  function drawTowerSprite(ctx, t, g) {
    const owned = t.owner !== NEUTRAL;
    const col = owned ? FACTIONS[t.owner].color : NEUTRAL_COLOR;
    // Upright sprite at the projected base, scaled with zoom + depth
    const B = proj(g, t.x, t.y);
    ctx.save();
    ctx.translate(B.x, B.y);
    ctx.scale(B.s, B.s);
    ctx.translate(-t.x, -t.y);
    const x = t.x, y = t.y;
    const lvl = t.level || 1;

    // ---- Per-level castle geometry (grows more in width than height so tall
    // castles don't hide neighbours' troops). Each level has a distinct
    // silhouette: L1 plain · L2 roofed · L3 wide roofed gatehouse · L4 grand. ----
    const cfg = {
      1: { w: 34, keepH: 20, turretH: 24, roof: false, wide: false },
      2: { w: 35, keepH: 21, turretH: 30, roof: true,  wide: false },
      3: { w: 52, keepH: 30, turretH: 38, roof: false, wide: true },
      4: { w: 58, keepH: 38, turretH: 46, roof: true,  wide: true, grand: true },
    }[Math.min(lvl, 4)];
    const baseW = cfg.w;
    const turretW = 9;
    const keepW = baseW - turretW * 2 + 4;
    const groundY = y + 14;                 // fixed base; castle grows upward
    const turretTop = groundY - cfg.turretH;
    const keepTop = groundY - cfg.keepH;
    const totalH = Math.max(cfg.keepH, cfg.turretH) + (cfg.grand ? 12 : 0);
    const topY = groundY - totalH;
    const midY = groundY - totalH / 2;

    const stone = (cxx, cw, top, ht) => {
      const grad = ctx.createLinearGradient(cxx - cw / 2, 0, cxx + cw / 2, 0);
      grad.addColorStop(0, "#6E7AA0"); grad.addColorStop(0.55, "#525d80"); grad.addColorStop(1, "#3b4463");
      ctx.fillStyle = grad; ctx.fillRect(cxx - cw / 2, top, cw, ht);
    };
    const crenellate = (cxx, cw, top) => {
      ctx.fillStyle = "#6E7AA0"; const m = cw / 5;
      for (let i = 0; i < 3; i++) ctx.fillRect(cxx - cw / 2 + i * 2 * m, top - 4, m, 4);
    };
    const roofTop = (cxx, cw, top, hh) => {
      ctx.fillStyle = "#7d4a4a";
      ctx.beginPath();
      ctx.moveTo(cxx - cw / 2 - 1, top); ctx.lineTo(cxx, top - hh); ctx.lineTo(cxx + cw / 2 + 1, top);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = "rgba(0,0,0,0.25)"; ctx.lineWidth = 1; ctx.stroke();
    };
    const win = (wx, wy, ww, wh) => {
      ctx.fillStyle = "#20263c"; ctx.fillRect(wx - ww / 2, wy, ww, wh);
      ctx.fillStyle = col; ctx.globalAlpha = 0.9; ctx.fillRect(wx - ww / 2 + 0.8, wy + 0.8, ww - 1.6, wh - 1.6); ctx.globalAlpha = 1;
    };
    const flag = (fx, fy, dir) => {
      ctx.strokeStyle = "#8a93ab"; ctx.lineWidth = 1.3;
      ctx.beginPath(); ctx.moveTo(fx, fy); ctx.lineTo(fx, fy - 12); ctx.stroke();
      ctx.fillStyle = col; ctx.beginPath();
      ctx.moveTo(fx, fy - 12); ctx.lineTo(fx + 9 * dir, fy - 9.5); ctx.lineTo(fx, fy - 7); ctx.closePath(); ctx.fill();
    };

    // Ground shadow
    ctx.fillStyle = "rgba(0,0,0,0.35)";
    ctx.beginPath();
    ctx.ellipse(x, groundY + 3, baseW * 0.72, 7, 0, 0, Math.PI * 2);
    ctx.fill();

    // Team ring (2v2 only) — independent of per-player faction color, so an
    // ally never reads as a foe just because their faction hue looks hostile.
    if (owned && g.mode === "2v2") {
      const myTeam = g.teams[0];
