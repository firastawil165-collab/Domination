                    <span style={{ fontSize: 13 }}>{FACTIONS[s.pid].name}</span>
                    <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, color: "#8a93ab" }}>
                      {s.towers}⛫ · {s.troops}
                    </span>
                  </div>
                );

                if (gameRef.current?.mode !== "2v2") return hud.map(renderChip);

                const myTeam = hud.find((s) => s.pid === 0)?.team ?? 0;
                return [myTeam, myTeam === 0 ? 1 : 0].map((teamId, idx) => (
                  <React.Fragment key={teamId}>
                    {idx === 1 && (
                      <span style={{ fontSize: 12, fontWeight: 800, color: "#8a93ab", letterSpacing: 1 }}>VS</span>
                    )}
                    <div style={{
                      display: "flex", gap: 6, alignItems: "center",
                      padding: "4px 6px", borderRadius: 10,
                      border: `1px solid ${teamId === myTeam ? "rgba(255,210,63,0.4)" : "rgba(228,83,74,0.35)"}`,
                    }}>
                      <span style={{
                        fontSize: 10, letterSpacing: 1, fontWeight: 700,
                        color: teamId === myTeam ? "#FFD23F" : "#E4534A", padding: "0 2px",

                        {teamId === myTeam ? "YOUR TEAM" : "ENEMY"}
                      </span>
                      {hud.filter((s) => s.team === teamId).map(renderChip)}
                    </div>
                  </React.Fragment>
                ));
              })()}
            </div>
            <button onClick={() => setScreen("menu")}
              style={chip({ padding: "6px 14px", fontSize: 13, pointerEvents: "auto" })}>
              New map

          </div>

          {/* Outcome overlay */}
          {outcome && (
            <div style={{
              position: "absolute", top: 0, left: 0, right: 0,
              display: "flex", alignItems: "center", justifyContent: "space-between",
              gap: 12, padding: "10px 14px",
              background: "linear-gradient(to bottom, rgba(22,32,54,0.95), rgba(22,32,54,0.0))",
              pointerEvents: "none",
            }}>
              <div style={{ pointerEvents: "auto" }}>
                <div style={{
                  fontSize: 22, fontWeight: 800, letterSpacing: 2,
                  color: outcome === "win" ? "#4ADE5A" : "#E4534A",
                }}>
                  {outcome === "win" ? "SECTOR SECURED" : "OVERRUN"}

                  {outcome === "win"
                    ? (gameRef.current?.mode === "2v2" ? "Enemy team wiped out." : "Every rival eliminated.")
                    : (gameRef.current?.mode === "2v2" ? "Your team has fallen." : "Your last forces have fallen.")}
                </div>
              </div>
              <div style={{ display: "flex", gap: 8, pointerEvents: "auto" }}>
                <button onClick={() => startGame(gameRef.current.numPlayers, gameRef.current.mode)}
                  style={chip({ background: "#FFD23F", color: "#0A0E18", fontWeight: 800, border: "1px solid #FFD23F", padding: "8px 14px" })}>
                  Redeploy

                <button onClick={() => setScreen("menu")} style={chip({ padding: "8px 14px" })}>Menu</button>
              </div>
            </div>
          )}
        </>
      )}
      </div>
      {/* Map area ends here — everything below is a physically separate panel,
          not overlaid on the battlefield. */}

      {screen === "play" && (
        <div style={{
          flexShrink: 0,
          background: "#1c2942",
          borderTop: "1px solid #3a4d72",
          boxShadow: "0 -6px 18px rgba(0,0,0,0.35)",
          padding: "9px 12px calc(9px + env(safe-area-inset-bottom, 0px))",
          display: "flex", flexDirection: "column", alignItems: "center", gap: 9,
        }}>
          {/* Specials row — in the panel, never overlapping the map */}
          <div style={{ display: "flex", gap: 8, justifyContent: "center", width: "100%" }}>
            {(() => {
              const specials = [
                { kind: "fire", icon: "🔥", name: "Fireball", secs: fireInfo.fireSecs,
                  on: "#FF8C3C", ready: "#E4534A", readyTxt: "#FFD8B0",
                  aimBg: "rgba(255,140,60,0.28)", readyBg: "rgba(228,83,74,0.24)", glow: "rgba(255,110,50,0.55)" },
                { kind: "storm", icon: "🌩️", name: "Storm", secs: fireInfo.stormSecs,
                  on: "#8FB4FF", ready: "#5C7CC4", readyTxt: "#D2E0FF",
                  aimBg: "rgba(140,175,255,0.28)", readyBg: "rgba(92,124,196,0.26)", glow: "rgba(120,160,255,0.5)" },
                { kind: "speed", icon: "💨", name: "Speed", secs: fireInfo.speedSecs,
                  on: "#57E0C6", ready: "#2E9E8A", readyTxt: "#B8F5EA",
                  aimBg: "rgba(87,224,198,0.28)", readyBg: "rgba(46,158,138,0.26)", glow: "rgba(87,224,198,0.5)" },
              ];
              return specials.map((s) => {
                const ready = s.secs <= 0;
                const aiming = fireInfo.aiming === s.kind;
                return (
                  <button key={s.kind} className="special" onClick={() => toggleAim(s.kind)}
                    disabled={!ready && !aiming}
                    style={{
                      fontFamily: "'Oxanium', sans-serif",
                      flex: "1 1 0", maxWidth: 150, minWidth: 0,
                      display: "flex", alignItems: "center", gap: 7, justifyContent: "center",
                      minHeight: 44,
                      padding: "7px 10px",
                      borderRadius: 12,
                      border: `2px solid ${aiming ? s.on : ready ? s.ready : "#46577d"}`,
                      fontSize: 14, fontWeight: 800,
                      cursor: ready || aiming ? "pointer" : "default",
                      color: aiming ? s.on : ready ? s.readyTxt : "#8a93ab",
                      background: aiming ? s.aimBg : ready ? s.readyBg : "#28385a",
                      boxShadow: ready || aiming ? `0 0 12px ${s.glow}` : "none",
                      transition: "background 0.15s, box-shadow 0.15s, border-color 0.15s",
                    }}>
                    <span style={{ fontSize: 19, lineHeight: 1 }}>{aiming ? "✕" : s.icon}</span>
                    {aiming ? (
                      <span>Tap target</span>
                    ) : ready ? (
                      <span>{s.name}</span>
                    ) : (
                      <span style={{ display: "flex", flexDirection: "column", lineHeight: 1.15, alignItems: "flex-start" }}>
                        <span>{s.name}</span>
                        <span style={{ fontSize: 12, fontWeight: 600, opacity: 0.85 }}>{s.secs}s</span>
                      </span>
                    )}
                  </button>
                );
              });
            })()}
          </div>

          {/* Commit % row */}
          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
            <span style={{ fontSize: 12, letterSpacing: 3, color: "#8a93ab" }}>COMMIT</span>
            {[25, 50, 75, 100].map((p) => (
              <button key={p} onClick={() => setPct(p)}
                style={chip({
                  fontFamily: "'IBM Plex Mono', monospace",
                  padding: "9px 15px", fontSize: 14,
                  borderColor: pct === p ? "#FFD23F" : "#46577d",
                  color: pct === p ? "#FFD23F" : "#E8EBF2",
                  background: pct === p ? "rgba(255,210,63,0.18)" : "#28385a",
                })}>
                {p}%
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}


const boot = document.getElementById('boot');
if (boot) boot.remove();
ReactDOM.createRoot(document.getElementById('root')).render(<TowerConquest />);
</script>
</body>
</html>
