  // for 1st/2nd/3rd stage) — using the top-tier special always fully drains the train.
  // Also stamps this cast's time so the special's own 20s cooldown starts ticking.
  const setCd = (g, kind, owner) => {
    const cost = trainThreshold(kind);
    g.lastCast[owner + "_" + kind] = g.pulse;
    if (owner === 0) {
      g.trainProgress = Math.max(0, g.trainProgress - cost);
      syncSpecials(g);
    } else {
      g.aiTrain[owner] = Math.max(0, g.aiTrain[owner] - cost);
    }
  };

  // War fuels the train: every soldier that dies on the field — yours, an ally's, or
  // an enemy's, it doesn't matter which — nudges EVERY player's train forward a
  // little, symmetrically. Called with the number of deaths this tick.
  const gainTrainTime = (g, deaths) => {
    if (deaths <= 0) return;
    const seconds = deaths * TRAIN_KILL_GAIN;
    g.trainProgress = Math.min(TRAIN_MAX, g.trainProgress + seconds);
    for (let pid = 1; pid < g.numPlayers; pid++) {
      if (g.eliminated.has(pid)) continue;
      g.aiTrain[pid] = Math.min(TRAIN_MAX, g.aiTrain[pid] + seconds);
    }
  };

  // "storm" slot speeds up every tower the caster's team owns to +25% fire rate for
  // TOWER_DEF_DURATION seconds. Crucially, setting rateMult here is also what
  // temporarily "activates" firing capability in a CASTLE — castles have no defense
  // of their own otherwise (see the firing-eligibility check in the game loop) — so
  // casting this on a team that's mostly castles briefly turns every one of them
  // into a working tower for the buff's duration.
  function castTowerDefense(g, owner) {
    for (const t of g.towers) {
      if (!(sameTeam(g, t.owner, owner) || t.owner === owner)) continue;
      for (const d of t.defs) {
        d.rateMult = TOWER_DEF_RATE_MULT;
        d.rateExpiresAt = g.pulse + TOWER_DEF_DURATION;
      }
      g.rings.push({ x: t.x, y: t.y, life: 0, dur: 0.6, color: "#FFD23F" });
    }
    SoundEngine.towerDefense(owner === 0 ? 1 : 0.4);
    setCd(g, "storm", owner);
  }

  function castSpeed(g, owner) {
    // Global, instant: every currently-marching soldier on the caster's team gets
    // +50% speed for the rest of its trip.
    for (const u of g.units) {
      if (sameTeam(g, u.owner, owner) || u.owner === owner) u.speedMul = SPEED_BOOST;
    }
    // Visual feedback: a quick pulse ring at every castle the caster owns.
    for (const t of g.towers) {
      if (sameTeam(g, t.owner, owner) || t.owner === owner) {
        g.rings.push({ x: t.x, y: t.y, life: 0, dur: 0.5, color: "#57E0C6" });
      }
    }
    SoundEngine.speed(owner === 0 ? 1 : 0.4);
    setCd(g, "speed", owner);
  }

  // "slow" slot — the new 1st-stage special. Mirror image of castSpeed: global, instant,
  // no radius/targeting, but applies to every currently-marching HOSTILE soldier (anyone
  // not on the caster's team) instead of the caster's own — -25% speed for the rest of
  // their trip.
  function castSlow(g, owner) {
    for (const u of g.units) {
      if (!(sameTeam(g, u.owner, owner) || u.owner === owner)) u.speedMul = SLOW_DEBUFF;
    }
    // Visual feedback: a quick pulse ring at every castle the caster owns, same language
    // as castSpeed/castTowerDefense.
    for (const t of g.towers) {
      if (sameTeam(g, t.owner, owner) || t.owner === owner) {
        g.rings.push({ x: t.x, y: t.y, life: 0, dur: 0.5, color: "#8FA3C7" });
      }
    }
    SoundEngine.slow(owner === 0 ? 1 : 0.4);
    setCd(g, "slow", owner);
  }

  // "Second Wind" — a HERO-KIT ability from this session's hero-roster design
  // discussion (see DOMINATION_PROJECT.md). Heroes themselves aren't implemented
  // yet — there's no picker UI, and the specials train still only has 3 active
  // slots (slow/speed/storm) — so this isn't wired into the specials UI array,
  // the train's SPECIAL_STAGE mapping, or aiSpecials. It's fully implemented and
  // tested now (see the standalone Node simulation run this session) so it's a
  // drop-in slot the moment hero selection exists — same "banked, not deleted"
  // treatment as Barrage below.
  //
  // Instantly reinforces ONE of the caster's own buildings with a flat
  // SECOND_WIND_AMOUNT troops — never a teammate's, even in 2v2 (deliberately
  // NOT using the sameTeam-inclusive "mine" pattern every other special above
  // uses, per spec: this one stays strictly personal). Targets whichever of the
  // caster's own buildings is currently under the worst attack — the biggest
  // deficit between troops actually/about-to be marching at it right now
  // (hostile only) and its own momentum-adjusted garrison, same shape as the
  // AI's existing incoming-threat tally (see aiAct above) just scoped to one
  // player's own buildings instead of a whole team. If nothing is under attack,
  // falls back to the caster's weakest building by current troop count, so the
  // cast is never wasted on nothing.
  const SECOND_WIND_AMOUNT = 15;
  function castSecondWind(g, owner) {
    const mine = g.towers.filter((t) => t.owner === owner); // strictly this player's own — never a teammate's
    if (mine.length === 0) return;

    // Tally hostile troops (marching units + still-queued orders, same two
    // sources aiAct's own incoming-threat tally uses) aimed at each of the
    // caster's own buildings.
    const incoming = {};
    for (const t of mine) incoming[t.id] = 0;
    for (const u of g.units) {
      if (incoming[u.dst] === undefined) continue;
      if (sameTeam(g, u.owner, owner) || u.owner === owner) continue; // only hostile marches count as "under attack"
      incoming[u.dst]++;
    }
    for (const o of g.orders) {
      if (o.remaining <= 0) continue;
      if (incoming[o.dst] === undefined) continue;
      if (sameTeam(g, o.owner, owner) || o.owner === owner) continue;
      incoming[o.dst] += o.remaining;
    }

    let target = null, worstDeficit = -Infinity;
    for (const t of mine) {
      const inc = incoming[t.id];
      if (inc <= 0) continue; // not under attack at all
      const deficit = inc - t.troops * momentumMult(g, t.owner) * levelDefenseMult(t) * fortifyMult(g, t); // positive = currently losing this fight
      if (deficit > worstDeficit) { worstDeficit = deficit; target = t; }
    }
    if (!target) {
      // Nobody's under attack — fall back to the weakest building by current
      // troops so the cast is never wasted.
      target = mine.reduce((a, b) => (b.troops < a.troops ? b : a), mine[0]);
    }

    target.troops += SECOND_WIND_AMOUNT;
    g.rings.push({ x: target.x, y: target.y, life: 0, dur: 0.6, color: "#FFA94D" });
    for (let i = 0; i < 12; i++) {
      const a = (i / 12) * Math.PI * 2;
      g.sparks.push({ x: target.x + Math.cos(a) * 20, y: target.y + Math.sin(a) * 20, life: 0.55, color: "#FFA94D" });
    }
    SoundEngine.secondWind(owner === 0 ? 1 : 0.4);
    setCd(g, "secondWind", owner);
  }

  // "Rally" — hero-kit ability (Tier 1, design finalized this session; banked,
  // same as Second Wind above — not wired into the active specials UI/train/AI).
  // The simplest of the hero-kit abilities: an instant flat momentum boost to
  // the caster alone (never the team — "my hero, my problem" framing, matching
  // Second Wind's own-buildings-only scope). No troops, no targeting, nothing
  // else — thematically "your troops just got fired up" rather than a
  // mechanical troop/speed effect.
  const RALLY_MOMENTUM_BOOST = 0.10; // +10% — independently tunable from MOMENTUM_CAPTURE_BONUS (5%), not tied to it
  function castRally(g, owner) {
    if (g.momentum && owner >= 0 && owner < g.numPlayers) {
      g.momentum[owner] = clampMomentum(g.momentum[owner] + RALLY_MOMENTUM_BOOST);
    }
    // Visual feedback: a quick pulse ring at every castle the caster owns (not
    // the team's), same visual language as castSpeed/castSlow.
    for (const t of g.towers) {
      if (t.owner === owner) g.rings.push({ x: t.x, y: t.y, life: 0, dur: 0.5, color: "#FFD86A" });
    }
    SoundEngine.rally(owner === 0 ? 1 : 0.4);
    setCd(g, "rally", owner);
  }

  // "Sabotage" — hero-kit ability (Tier 3; banked, same as the others above).
  // Global, instant, no manual targeting, like every other special. Two parts:
  //   1. Weakens EVERY enemy building on the map (any building not on the
  //      caster's team, excluding still-neutral/unclaimed ones) by a combined
  //      SABOTAGE_TOTAL_DAMAGE (30) troops, split evenly across however many
  //      enemy buildings currently exist. Each one also gets a visible
  //      ninja-sword slash (see g.slashes / the render block in draw()) so
  //      the debuff reads as a strike, not just a number change.
  //   2. A small covert squad (SABOTAGE_SNEAK_TROOPS, 5) "sneaks in" against
  //      EVERY enemy building left under that threshold after the debuff —
  //      not just the single weakest one. A wide, shallow debuff (many
  //      buildings, so a small perBuilding split) can flip several
  //      already-undermanned buildings in one cast; a narrow, deep one (few
  //      buildings, so a big perBuilding split) more often only softens or
  //      takes the one. Each qualifying building is instantly captured for
  //      the caster via the same captureBuilding() path a normal siege
  //      capture uses (see below) — momentum bonus, level knockdown, buff
  //      reset, etc. apply per building captured. No real troops are
  //      deducted from the caster for this — the "5 troops" are a flat
  //      threshold check, not a marching squad, same as every other special
  //      being costless to cast beyond the shared train.
  const SABOTAGE_TOTAL_DAMAGE = 30;
  const SABOTAGE_SNEAK_TROOPS = 5;
  function castSabotage(g, owner) {
    const enemies = g.towers.filter((t) => t.owner !== NEUTRAL && !(sameTeam(g, t.owner, owner) || t.owner === owner));
    if (enemies.length === 0) return;

    const perBuilding = SABOTAGE_TOTAL_DAMAGE / enemies.length;
    for (const t of enemies) {
      t.troops = Math.max(0, t.troops - perBuilding);
      t.underAttackFlashAt = g.pulse; // hostile contact, same as any other attack
      g.sparks.push({ x: t.x, y: t.y, life: 0.5, color: "#C97A1E" });
      // A visible ninja-sword slash against every enemy building the debuff
      // touches (see the slash render block in draw()) — random angle per
      // building so a simultaneous wave of slashes doesn't look identical.
      g.slashes.push({ x: t.x, y: t.y - 8, life: 0, dur: 0.65, angle: Math.random() * Math.PI });
    }
    // Second pass, after every building's post-debuff troop count is final:
    // capture each one that landed under the threshold. Kept as a separate
    // pass (rather than checking-and-capturing inline above) so the debuff
    // damage is always applied to all enemies first, regardless of capture
    // order or how captureBuilding might otherwise mutate a building mid-loop.
    for (const t of enemies) {
      if (t.troops < SABOTAGE_SNEAK_TROOPS) {
        captureBuilding(g, t, owner);
        g.rings.push({ x: t.x, y: t.y, life: 0, dur: 0.7, color: "#C97A1E" });
      }
    }
    SoundEngine.sabotage(owner === 0 ? 1 : 0.4);
    setCd(g, "sabotage", owner);
  }

  // "Fortify" — hero-kit ability (Tier 3, design finalized this session;
  // banked, same as the others above). Temporarily grants every one of the
  // caster's (or team's) buildings +50% effective defensive troop strength
  // (FORTIFY_MULT, see its definition and fortifyMult() near the other
  // special constants) for FORTIFY_DURATION (10s) — attackers effectively
  // need 50% more troops to take a Fortified building during that window.
  function castFortify(g, owner) {
    for (const t of g.towers) {
      if (!(sameTeam(g, t.owner, owner) || t.owner === owner)) continue;
      t.fortifyExpiresAt = g.pulse + FORTIFY_DURATION;
      g.rings.push({ x: t.x, y: t.y, life: 0, dur: 0.6, color: "#A8C5DE" });
    }
    SoundEngine.fortify(owner === 0 ? 1 : 0.4);
    setCd(g, "fortify", owner);
  }

  // "Barrage" — hero-kit ability (Tier 2). This is the former "Tower Defense 2.0"
  // reworked and renamed: same boulder-splash mechanism (each impact destroys up
  // to BOULDER_SPLASH_COUNT enemies within BOULDER_SPLASH_RADIUS — see the arrow-
  // flight splash-kill logic that reads d.boulder), but deliberately TOWER-ONLY —
  // unlike Tower Defense, it does NOT touch the caster's castles at all, so it no
  // longer temporarily grants a castle firing capability. That's the whole point
  // of the rename: it reads as a distinct siege-weapon ability scoped to existing
  // towers, not a Tower-Defense reskin. Like the other hero-kit abilities above,
  // it's fully implemented and tested but not wired into the specials UI array,
  // SPECIAL_STAGE, or aiSpecials — a drop-in Tier-2 slot the moment hero
  // selection exists.
  function castBarrage(g, owner) {
    for (const t of g.towers) {
      if (t.type !== "tower") continue; // towers only — castles are untouched, unlike Tower Defense
      if (!(sameTeam(g, t.owner, owner) || t.owner === owner)) continue;
      for (const d of t.defs) {
        d.boulder = true;
        d.boulderExpiresAt = g.pulse + TOWER_DEF_DURATION;
      }
      g.rings.push({ x: t.x, y: t.y, life: 0, dur: 0.8, color: "#FF3B30" });
    }
    SoundEngine.barrage(owner === 0 ? 1 : 0.4);
    setCd(g, "barrage", owner);
  }

  // "Rage" — hero-kit ability (Tier 2). Global, instant, no targeting, same
  // shape as Speed — but a strength buff instead of a speed one: every
  // currently-marching soldier on the caster's team gets u.rageBoosted = true,
  // a permanent transformation for that unit for the rest of its march (no
  // duration, same "whoever's marching right now" shape castSpeed/castSlow/
  // castRollingStones already use). Worth RAGE_STRENGTH_MULT (1.5x, +50%)
  // strength at building-arrival damage/reinforcement — see unitArrives,
  // which is also where Rolling Stones' 4x is applied, and the two stack
  // multiplicatively if a unit somehow carries both.
  function castRage(g, owner) {
    for (const u of g.units) {
      if (sameTeam(g, u.owner, owner) || u.owner === owner) u.rageBoosted = true;
    }
    for (const t of g.towers) {
      if (sameTeam(g, t.owner, owner) || t.owner === owner) {
        g.rings.push({ x: t.x, y: t.y, life: 0, dur: 0.6, color: "#FF6B4A" });
      }
    }
    SoundEngine.rage(owner === 0 ? 1 : 0.4);
    setCd(g, "rage", owner);
  }

  // "Rolling Stones" — hero-kit ability (Tier 2). Turns every currently-
  // marching allied soldier into a Rolling Stone for the rest of its march —
  // a permanent transformation for that unit, same "no duration, applies to
  // whoever's marching right now" shape castSpeed/castSlow already use,
  // rather than a timed buff. Three effects, each threaded into a different
  // system:
  //   1. "4 times the strength" — see ROLLING_STONE_STRENGTH_MULT's own
  //      comment above; applied in unitArrives.
  //   2. "Can't be shot by towers" — u.rollingStone is checked and skipped in
  //      every tower-targeting loop (nearest-target search, arrow retarget,
  //      boulder splash) in the game loop below.
  //   3. "Can't take over a castle" — unitArrives special-cases a Rolling
  //      Stone hitting an enemy CASTLE specifically (not a tower): it still
  //      does full damage but can never be the arrival that flips ownership,
  //      clamped at 1 troop instead. A non-stone unit (or a later reinforcing
  //      wave) is still needed to finish that capture.
  function castRollingStones(g, owner) {
    for (const u of g.units) {
      if (sameTeam(g, u.owner, owner) || u.owner === owner) u.rollingStone = true;
    }
    for (const t of g.towers) {
      if (sameTeam(g, t.owner, owner) || t.owner === owner) {
        g.rings.push({ x: t.x, y: t.y, life: 0, dur: 0.7, color: "#8C7A63" });
      }
    }
    SoundEngine.rollingStones(owner === 0 ? 1 : 0.4);
    setCd(g, "rollingStones", owner);
  }

  // "Frost" — hero-kit ability (Tier 3). Global, instant, no targeting, same
  // shape as Slow Down — but a hard stop instead of a slow: every currently-
  // marching HOSTILE soldier gets u.frozen = true and a u.frozenUntil
  // timestamp FROST_DURATION out, thawing back to normal movement once that
  // passes (checked once per tick, right before the March step, in the game
  // loop below) — same lazy-expiry pattern Fortify already uses for buildings,
  // just applied to units. Deliberately a SEPARATE flag from u.speedMul rather
  // than setting speedMul = 0: the movement formula's `u.speedMul || 1`
  // fallback treats 0 as "unset" (JS falsy-zero) and would silently snap a
  // frozen unit back to full speed — a real footgun caught during testing, not
  // a hypothetical one.
  function castFrost(g, owner) {
    for (const u of g.units) {
      if (sameTeam(g, u.owner, owner) || u.owner === owner) continue; // hostiles only
      u.frozen = true;
      u.frozenUntil = g.pulse + FROST_DURATION;
    }
    for (const t of g.towers) {
      if (sameTeam(g, t.owner, owner) || t.owner === owner) {
        g.rings.push({ x: t.x, y: t.y, life: 0, dur: 0.6, color: "#BFE9FF" });
      }
    }
    SoundEngine.frost(owner === 0 ? 1 : 0.4);
    setCd(g, "frost", owner);
  }

  // "Instant Upgrade" — hero-kit ability (Tier 1). Picks ONE random building
  // among the caster's own that's eligible (below MAX_LEVEL, not already
  // mid-build) and completes an upgrade on it immediately — no troop cost,
  // no build timer, unlike a normal upgrade (see startUpgrade/canStartUpgrade)
  // — it's costless beyond the shared train, same as every other special.
  // Deliberately skips buildings already mid-upgrade/conversion rather than
  // interrupting them, and does nothing if nothing is eligible (nothing to
  // waste the cast on, mirrors Sabotage's empty-target no-op).
  function castInstantUpgrade(g, owner) {
    const eligible = g.towers.filter((t) => t.owner === owner && t.level < MAX_LEVEL && !t.upgrading);
    if (eligible.length === 0) return;
    const t = eligible[Math.floor(Math.random() * eligible.length)];
    t.level += 1;
    applyMomentumBuild(g, owner);
    // Same right-turret reattachment every other level-change path does
    // (build completion, capture, conversion) — the defense tower's anchor
    // point moves as the silhouette grows.
    if (t.defs && t.defs[0]) {
      const p = defenderPoint(t);
      t.defs[0].x = p.x; t.defs[0].y = p.y;
    }
    g.rings.push({ x: t.x, y: t.y, life: 0, dur: 0.6, color: "#FFC24A" });
    for (let i = 0; i < 14; i++) {
      const a = (i / 14) * Math.PI * 2;
      g.sparks.push({ x: t.x + Math.cos(a) * 22, y: t.y + Math.sin(a) * 22, life: 0.55, color: "#FFC24A" });
    }
    SoundEngine.instantUpgrade(owner === 0 ? 1 : 0.4);
    setCd(g, "instantUpgrade", owner);
  }

  // Single dispatch point from a `kind` string to its cast function — every
  // `cast____` above takes the same (g, owner) shape, so this is what lets
  // castPlayerSpecial and aiSpecials work generically off whichever 3 kinds a
  // player's assigned hero happens to carry, instead of a hardcoded if/else
  // chain that only knew about slow/speed/storm.
  const CAST_FNS = {
    slow: castSlow, speed: castSpeed, storm: castTowerDefense,
    secondWind: castSecondWind, rally: castRally, instantUpgrade: castInstantUpgrade,
    barrage: castBarrage, rage: castRage, rollingStones: castRollingStones,
    sabotage: castSabotage, fortify: castFortify, frost: castFrost,
  };

  const readyFor = (g, kind, owner = 0) =>
    trainOf(g, owner) >= trainThreshold(kind) && cooldownRemaining(g, kind, owner) <= 0;

  // One-tap cast: no aiming/targeting step — the segment fires the moment it's tapped.
  const castPlayerSpecial = (kind) => {
    const g = gameRef.current;
    if (!g || g.over || paused) return;
    if (!readyFor(g, kind)) return;
    SoundEngine.resume();
    const fn = CAST_FNS[kind];
    if (fn) fn(g, 0);
    if (g.tutorial) {
      // The tutorial script (see TUTORIAL_STEPS) only ever hands the player
      // Tempo's kit — see startGame, which forces heroes[0]="tempo" whenever
      // tutorial is true — so these three flags are the only ones that can
      // ever actually fire during a tutorial run.
      if (kind === "speed") g.tutorialFlags.castSpeed = true;
      else if (kind === "storm") g.tutorialFlags.castStorm = true;
      else if (kind === "rally") g.tutorialFlags.castRally = true;
    }
  };

  const handleDown = (e) => {
    const g = gameRef.current;
    if (!g || g.over || paused) return;
    SoundEngine.resume(); // real user gesture — Safari only reliably resumes a suspended context from here
    e.currentTarget.setPointerCapture?.(e.pointerId);
    setConvertConfirm(null); // a new press on the map dismisses any pending convert prompt
    const sp = canvasPos(e);
    const p = unproj(g, sp.x, sp.y);
    g.pointer = p;
    const region = regionAt(g, p);
    // Drag endpoint (x, y) lives in world coords; (ssx, ssy) keeps the screen
    // start so the tap-vs-drag threshold is measured in screen pixels.
    if (region && region.owner === 0) g.drag = { src: region.id, x: p.x, y: p.y, ssx: sp.x, ssy: sp.y, t0: performance.now() };
  };

  const handleMove = (e) => {
    const g = gameRef.current;
    if (!g) return;
    const sp = canvasPos(e);
    const p = unproj(g, sp.x, sp.y);
    g.pointer = p;
    const hit = regionAt(g, p);
    g.hover = hit ? hit.id : null;
    if (g.drag) { g.drag.x = p.x; g.drag.y = p.y; }
  };

  const handleUp = (e) => {
    const g = gameRef.current;
    if (!g) return;
    const drag = g.drag;
    g.drag = null;
    if (!drag || g.over) return;
    const sp = canvasPos(e);
    const p = unproj(g, sp.x, sp.y);
    const target = regionAt(g, p); // any region: enemy, neutral, or your own
    const src = g.towers[drag.src];
    const moved = Math.hypot(sp.x - drag.ssx, sp.y - drag.ssy); // screen px

    // A tap (little movement) that lands back on your own building → double-tap
    // upgrades it, or a long press-and-hold (no movement, held past HOLD_MS)
    // opens a confirm prompt to convert it between castle and tower — holding
    // no longer converts instantly, it just offers the option.
    if (moved < 14 && target && target.id === src.id && src.owner === 0) {
      const now = performance.now();
      if (drag.t0 != null && now - drag.t0 >= HOLD_MS) {
        g.lastTap = null;
        if (canConvert(src)) {
          const rect = canvasRef.current.getBoundingClientRect();
          const bx = Math.min(rect.width - 90, Math.max(90, sp.x));
          const by = Math.min(rect.height - 20, Math.max(70, sp.y));
          setConvertConfirm({ id: src.id, x: bx, y: by, toType: src.type === "tower" ? "castle" : "tower" });
        }
        return;
      }
      if (g.lastTap && g.lastTap.id === src.id && now - g.lastTap.time < 350) {
        g.lastTap = null;
        if (canStartUpgrade(src)) {
          startUpgrade(g, src);
          // Tutorial's "upgraded" flag fires when the build actually finishes
          // (see the upgrade-build-completion block in the game loop), not here —
          // otherwise the tutorial would advance before the player sees the result.
        }
      } else {
        g.lastTap = { id: src.id, time: now };
      }
      return;
    }

    if (target && target.id !== src.id && src.owner === 0) {
      issueOrder(g, src, target, pctRef.current);
      // Tutorial's "captured" flag fires on actual capture (see unitArrives),
      // not on order-issue, so the step waits until the player really takes
      // the castle rather than advancing the instant they let go of the drag.
    }
  };

  const handleCancel = () => {
    const g = gameRef.current;
    if (g) g.drag = null;
  };

  // ----- AI -----
  // Hostile troops currently marching toward any of pid's team's castles — how
  // urgently Tower Defense would pay off right now.
  function incomingThreat(g, pid, isTeam) {
    let total = 0;
    for (const t of g.towers) {
      if (!isTeam(t.owner)) continue;
      for (const u of g.units) if (u.dst === t.id && !isTeam(u.owner)) total++;
      for (const o of g.orders) if (o.dst === t.id && !isTeam(o.owner) && o.remaining > 0) total += o.remaining;
    }
    return total;
  }

  // Per-kind AI heuristic: given the tallies aiSpecials already computed for
  // this player this tick (incoming hostile pressure, own marching force,
  // current momentum), decide whether THIS particular ability is worth
  // spending now. Grouped by the shape of the underlying ability rather than
  // listed 12 times over — every kind in a given case shares the same
  // reasoning (e.g. all three "buff my marching/defending force" abilities
  // use the same incoming-threat bar Slow Down originated).
  function aiWantsToCast(g, pid, kind, incoming, marching) {
    switch (kind) {
      case "slow": return incoming >= 3;      // cheapest, fastest-reload tier — worth it early
      case "fortify": return incoming >= 3;   // same defensive bar as Slow Down
      case "storm": return incoming >= 5;     // stronger buff, held for real pressure
      case "barrage": return incoming >= 5;   // same bar as Tower Defense — same purpose, tower-only
      case "frost": return incoming >= 5;     // strongest defensive tool, held for a real wave
      case "speed": return marching >= 5;     // only useful with a meaningful force already marching
      case "rollingStones": return marching >= 5; // same bar as Speed — also wants a real force marching
      case "rage": return marching >= 5;      // same bar — also a per-unit strength buff on whoever's marching now
      case "rally": return momentumMult(g, pid) < MOMENTUM_MAX;   // never wasted, but skip if already capped
      case "secondWind": return true;   // self-correcting fallback target — never truly wasted
      case "instantUpgrade": return true; // free; no-ops safely if nothing's eligible
      case "sabotage": return true;     // always has a target while any enemy building exists
      default: return false;
    }
  }

  // Each AI decides whether to spend its specials this tick, working off
  // whichever hero it was assigned at match start (see startGame's `heroes`
  // array) rather than a hardcoded storm/speed/slow list — this is what makes
  // aiSpecials work for any of the 4 heroes' kits.
  function aiSpecials(g) {
    for (let pid = 1; pid < g.numPlayers; pid++) {
      if (g.eliminated.has(pid)) continue;
      const isTeam = (owner) => owner === pid || sameTeam(g, owner, pid);
      const kit = (HEROES[g.heroes && g.heroes[pid]] || HEROES.tempo).kit;
      const incoming = incomingThreat(g, pid, isTeam);
      const marching = g.units.reduce((n, u) => n + (isTeam(u.owner) ? 1 : 0), 0);
      for (let tier = 1; tier <= 3; tier++) {
        const kind = kit[tier];
        if (!readyFor(g, kind, pid)) continue;
        if (aiWantsToCast(g, pid, kind, incoming, marching)) {
          const fn = CAST_FNS[kind];
          if (fn) fn(g, pid);
        }
      }
    }
  }

  function aiAct(g, pid) {
    const own = g.towers.filter((t) => t.owner === pid);
    if (own.length === 0) return;

    // Own momentum, computed once — used throughout to size attacks correctly
    // (an attacker on a losing streak hits for less, per unitArrives' dmg
    // formula, so needs proportionally more troops to take anything) and to
    // shift posture toward defense when it's low (see MOMENTUM_CAUTIOUS below).
    const myMomentum = momentumMult(g, pid);
    const MOMENTUM_CAUTIOUS = 0.9; // below this, play it safer — react to smaller threats, demand a bigger margin before attacking, consolidate instead of gambling on expansion
    const cautious = myMomentum < MOMENTUM_CAUTIOUS;

    // Tally troops in flight toward every tower, split into "my team" vs "enemy".
    const isTeam = (owner) => owner === pid || sameTeam(g, owner, pid);
    const inc = {};
    for (const t of g.towers) inc[t.id] = { team: 0, enemy: 0 };
    for (const u of g.units) {
      const rec = inc[u.dst]; if (!rec) continue;
      if (isTeam(u.owner)) rec.team++; else rec.enemy++;
    }
    for (const o of g.orders) {
      if (o.remaining <= 0) continue;
      const rec = inc[o.dst]; if (!rec) continue;
      if (isTeam(o.owner)) rec.team += o.remaining; else rec.enemy += o.remaining;
    }

    const diag = Math.hypot(g.W, g.H);
    const spareFrom = (t) => Math.max(0, Math.floor(t.troops) - 2); // always keep a small garrison

    // Upgrade a maxed castle when it's safe to spend half the garrison
    const upgradable = own.filter((t) => canStartUpgrade(t) && inc[t.id].enemy < 2);
    if (upgradable.length && Math.random() < 0.6) {
      startUpgrade(g, upgradable.reduce((a, b) => (a.troops > b.troops ? a : b)));
      return;
    }

    const ATTACK_CAP = 75; // AI never commits more than 3/4 of a castle's garrison at once
    const bracket = (srcTroops, need) =>
      [25, 50, ATTACK_CAP].find((o) => Math.floor((srcTroops * o) / 100) >= need);

    // Nearest of my own towers that can spare troops, isn't itself under threat,
    // and is close enough that help would actually arrive in time.
    const helperFor = (target, exclude) => {
      let best = null, bd = Infinity;
      for (const s of own) {
        if (s.id === target.id || (exclude && s.id === exclude.id)) continue;
        if (spareFrom(s) < 1) continue;
        if (inc[s.id].enemy > s.troops * 0.6) continue; // don't strip a threatened tower
        const d = dist(s, target);
        if (d > diag * 0.62) continue;                  // too far to matter
        if (d < bd) { bd = d; best = s; }
      }
      return best;
    };

    // ---- 1) Defend a teammate (mine or an ally's, including the human) ----
    // Consider all towers on my team; find the one most likely to fall.
    // When I'm on a losing streak (cautious), react to smaller shortfalls
    // instead of waiting for a clear-cut one — better to overreact defensively
    // while weak than lose more ground and feed the spiral.
    const defendSensitivity = cautious ? 0.4 : 1;
    let defend = null, worst = 0;
    for (const t of g.towers) {
      if (!isTeam(t.owner)) continue;
      // A defender's own momentum and building level both make a building
      // tougher (see momentumMult/levelDefenseMult/unitArrives). Fortify
      // (if active on this building) adds further on top — see fortifyMult.
      const defense = (t.troops + inc[t.id].team) * momentumMult(g, t.owner) * levelDefenseMult(t) * fortifyMult(g, t);
      const shortfall = inc[t.id].enemy - defense;   // >0 → projected to fall
      if (shortfall > defendSensitivity && shortfall > worst) { worst = shortfall; defend = t; }
    }
    if (defend) {
      const helper = helperFor(defend, defend.owner === pid ? defend : null);
      if (helper) {
        const canSend = spareFrom(helper);
        const need = worst + 1;
        // Only commit if it's not a waste: we can cover most of the shortfall.
        if (canSend >= need * 0.6) {
          const pct = bracket(helper.troops, Math.min(need, canSend)) || ATTACK_CAP;
          issueOrder(g, helper, defend, pct);
          return;
        }
      }
    }

    // ---- 2) Reinforce a teammate's attack that's coming up short ----
    // Deliberately simple: base the requirement directly on what's actually IN
    // the target right now (plus any reinforcements already inbound to it) —
    // no regen/travel projection. Layered projection math kept producing
    // subtly-wrong estimates that undershot in practice (see project notes).
    // Require at least 50% more attackers than that — comfortably clears the
    // castle-capture math (20% bonus, see unitArrives) plus regen/arrow
    // uncertainty in one flat, robust margin.
    const ATTACK_MARGIN = 1.5;
    let push = null, bestDeficit = 0;
    for (const t of g.towers) {
      if (isTeam(t.owner)) continue;                 // enemy or neutral
      const assault = inc[t.id].team;
      if (assault <= 0) continue;                     // nobody on my team is attacking it
      // A defender's own momentum AND a higher building level both make them
      // tougher than their raw troop count suggests (see
      // momentumMult/levelDefenseMult/unitArrives) — account for both here
      // too. Fortify (if active) adds further on top — see fortifyMult.
      // Also divide by OUR momentum: real damage per attacker is
      // attackerMomentum / (defenderMomentum * levelDefenseMult) (see
      // unitArrives), so a losing streak means each of our marching troops
      // is individually weaker and we need more of them for the same effect.
      const currentDefense = (t.troops + inc[t.id].enemy) * momentumMult(g, t.owner) * levelDefenseMult(t) * fortifyMult(g, t);
      const required = (currentDefense * ATTACK_MARGIN) / myMomentum;
      const deficit = required - assault;             // >0 → the assault falls short
      if (deficit > 0.5 && deficit > bestDeficit) { bestDeficit = deficit; push = t; }
    }
    if (push) {
      const helper = helperFor(push, null);
      if (helper) {
        // Any hostile tower the helper's march route passes within range of
        // (the target itself, if it's a tower, or another tower along the
        // way) will pick off some of these reinforcements before they ever
        // arrive — send extra to cover that, not just the raw deficit.
        const losses = expectedLosses(g, helper, push, isTeam);
        const canSend = spareFrom(helper);
        const need = bestDeficit + losses + 1;
        // Only commit if it's not a waste: require covering most of the
        // deficit, same standard as the defend case above. The old check
        // here — canSend >= Math.min(need, 2) — collapses to "canSend >= 2"
        // for any need of 2 or more, so a helper with only a handful of
        // spare troops would pile them into an assault that needed dozens
        // more, e.g. reinforcing with 5 when 40 were actually required.
        if (canSend >= need * 0.6) {
          const pct = bracket(helper.troops, Math.min(need, canSend)) || ATTACK_CAP;
          issueOrder(g, helper, push, pct);
          return;
        }
      }
    }

    // ---- 3) Otherwise, expand on its own ----
    const src = own.reduce((a, b) => (a.troops > b.troops ? a : b));
    if (src.troops < 3) return;
    const targets = g.towers.filter((t) => !isTeam(t.owner));
    if (targets.length === 0) return;

    const REVENGE_COOLDOWN = 8; // seconds before we'll consider retaking a castle we just lost
    // Same deliberately-simple rule as section 2 above: what's actually in the
    // target right now (+ its own inbound reinforcements, − our team's own
    // inbound attackers already committed), times ATTACK_MARGIN (50% more) —
    // plus expected losses to any hostile tower the march route passes
    // through (the target itself, if it's a tower, or another one en route).
    // Also divided by our own momentum — see the note in section 2 above;
    // same reasoning, this is what actually accounts for "the AI itself is on
    // a losing streak" when sizing a fresh attack.
    const evalTarget = (t) => {
      const currentDefense = (t.troops + inc[t.id].enemy) * momentumMult(g, t.owner) * levelDefenseMult(t) * fortifyMult(g, t);
      const losses = expectedLosses(g, src, t, isTeam);
      const need = (currentDefense * ATTACK_MARGIN) / myMomentum - inc[t.id].team + losses;
      return Math.max(0, need);
    };
    // A castle we just lost is a trap unless we can hit it hard: demand extra
    // caution on top of the already-baked-in 50% margin during the cooldown
    // window instead of pecking at it again the moment it looks weak. Being on
    // a losing streak generally demands the same kind of extra caution, not
    // just against a specific castle — a weakened AI shouldn't be gambling on
    // expansion, so it insists on a bigger margin before committing anywhere.
    const revengeMargin = (t) =>
      ((t.lostBy === pid && g.pulse - t.lostAt < REVENGE_COOLDOWN) ? 1.3 : 1) * (cautious ? 1.25 : 1);

    let best = null, bestScore = Infinity;
    for (const t of targets) {
      const need = evalTarget(t);
      // A target we've already committed enough in-flight force to (need <=
      // 0, i.e. our own already-marching troops cover it) isn't a reason to
      // send MORE — the previous bug here was that a clamped-to-0 need still
      // trivially passed the smallest attack bracket's ">= 0" check below, so
      // the AI kept firing off minimum-size orders at an already-covered
      // target forever. Skip it from consideration entirely instead.
      if (need <= 0) continue;
      const score = need + dist(src, t) * 0.02;
      if (score < bestScore) { bestScore = score; best = t; }
    }
    if (!best) return; // nothing currently worth attacking

    const need = evalTarget(best);
    // Only worth attacking if the force sent clears the defense with real room to
    // spare — sending barely more than the garrison means the attack can fail to
    // arithmetic rounding, regen ticks, or reinforcements landing a beat early.
    const minSend = need * revengeMargin(best);
    if (minSend < 1) return; // nothing meaningful actually required right now
    const choice = [25, 50, ATTACK_CAP].find(
      (o) => Math.floor((src.troops * o) / 100) >= minSend
    );

    if (choice) { issueOrder(g, src, best, choice); return; }

    // src alone can't clear the bar even at the 75% cap — pull in the nearest other
    // castle that can spare troops so the combined force still hits the bar,
    // rather than either overcommitting one castle or attacking too thin.
    const primarySend = Math.floor(src.troops * ATTACK_CAP / 100);
    const helper2 = own
      .filter((s) => s.id !== src.id && spareFrom(s) >= 1 && inc[s.id].enemy < s.troops * 0.5)
      .sort((a, b) => dist(a, best) - dist(b, best))[0];
    if (helper2) {
      const helperSend = Math.min(Math.floor(helper2.troops * ATTACK_CAP / 100), spareFrom(helper2));
      if (primarySend + helperSend >= minSend && primarySend >= 1 && helperSend >= 1) {
        issueOrder(g, src, best, ATTACK_CAP);
        issueOrder(g, helper2, best, ATTACK_CAP);
        return;
      }
    }

    // Nothing qualified as worth attacking. Normally that's just idle — but
    // while cautious (losing streak), proactively shore up the weakest castle
    // instead of leaving it to chance: consolidating strength is the point of
    // playing defensively, not just declining to attack.
    if ((cautious || Math.random() < 0.25) && own.length > 1) {
      const weak = own.reduce((a, b) => (a.troops < b.troops ? a : b));
      if (weak.id !== src.id) issueOrder(g, src, weak, cautious ? 50 : 25);
    }
  }

  // ----- Castle upgrade -----
  // Kick off a 5-second upgrade. Cost (half the max) is paid up front; the level
  // (and its bigger cap, faster regen & arrow fire) lands when the build finishes.
  const UPGRADE_DUR = 5;   // seconds
  function startUpgrade(g, t) {
    t.troops = Math.max(0, t.troops - towerMax(t) / 2);
    t.upgrading = { time: 0, dur: UPGRADE_DUR, kind: "upgrade" };
  }
  const canStartUpgrade = (t) =>
    t.level < MAX_LEVEL && !t.upgrading && t.troops >= towerMax(t);

  // ----- Castle <-> tower conversion -----
  // Press-and-hold (no drag) on your own building past HOLD_MS opens a
  // confirm bubble (see convertConfirm state + its JSX); tapping Confirm
  // there starts a CONVERT_DUR-second build — same shape as an upgrade, and
  // sharing its "t.upgrading" build-in-progress state (so the two are
  // mutually exclusive and both show the same under-construction dust/hammer
  // animation): cost is paid up front, but the actual flip (type, reset to
  // level 1, defense tower reset) only lands once the build finishes — see
  // the build-completion loop below, which branches on t.upgrading.kind.
  // Previously this applied instantly on confirm; changed this session so
  // converting costs real time too, not just troops, matching upgrading.
  const CONVERT_DUR = 5;   // seconds — intentionally the same as UPGRADE_DUR
  const canConvert = (t) => !t.upgrading && t.troops >= CONVERT_COST;
  function startConversion(g, t) {
    if (!canConvert(t)) return;
    t.troops = Math.max(0, t.troops - CONVERT_COST);
    t.upgrading = { time: 0, dur: CONVERT_DUR, kind: "convert", toType: t.type === "tower" ? "castle" : "tower" };
  }

  // ----- Arrival / capture -----
  // No building type gets an automatic defense bonus anymore (see the
  // momentum block up top). Damage dealt per hostile arrival is the
  // attacker's momentum divided by the defending building's level-based
  // multiplier (levelDefenseMult — 1.1/1.2/1.3/1.4 for levels 1-4) — a
  // player who's been winning fights (momentum > 1) hits harder as the
  // attacker; a higher-level building defends better regardless of who owns
  // it or how their momentum is doing. Whether a unit's damage finishes the
  // garrison off is checked AFTER applying it (garrison <= 0 → that arrival
  // is the one that captures). Shared by unitArrives' combat-capture branch
  // and castSabotage's instant-capture check below, so the two can never
  // drift out of sync with each other.
  function captureBuilding(g, t, newOwner) {
    applyMomentumCapture(g, newOwner); // the capturer alone gains — losing a building costs the loser nothing extra
    t.lostBy = t.owner;      // who just lost this castle
    t.lostAt = g.pulse;      // game clock at the moment of capture
    t.owner = newOwner;
    t.level = Math.max(1, t.level - 1); // a defeated castle is knocked down a level
    t.upgrading = null;                 // cancel any build in progress
    t.troops = 1;
    t.fortifyExpiresAt = 0;             // a captured castle's Fortify buff doesn't carry over either
    t.underAttackFlashAt = g.pulse; // the capturing blow is hostile contact too
    if (g.tutorial && newOwner === 0) g.tutorialFlags.captured = true;
    // A captured castle loses any active Tower Defense / 2.0 buff — it doesn't
    // carry over to benefit whoever just took it. It also just changed level,
    // so re-attach the defender to the (now smaller) right turret.
    for (const d of t.defs) {
      d.rateMult = 1; d.rateExpiresAt = 0;
      d.boulder = false; d.boulderExpiresAt = 0;
    }
    if (t.defs[0]) { const p = defenderPoint(t); t.defs[0].x = p.x; t.defs[0].y = p.y; }
    // Any half-finished orders leaving this tower are cancelled by the capture
    for (const o of g.orders) if (o.src === t.id && o.owner !== newOwner) o.remaining = 0;
  }

  // Damage/reinforcement per arrival is 1 "unit" of strength by default,
  // scaled up by ROLLING_STONE_STRENGTH_MULT (4x) if the arriving unit is a
  // Rolling Stone and/or RAGE_STRENGTH_MULT (1.5x) if it's Rage-boosted (see
  // castRollingStones/castRage) — the two stack multiplicatively if a unit
  // somehow carries both (possible in 2v2 if one ally casts each). Momentum
  // scales the ATTACKER's side of that on top (momentumMult(u.owner)) —
  // the defender's side uses momentumMult(t.owner) * levelDefenseMult(t)
  // together: the defender's own momentum (dynamic, can swing either way)
  // multiplied by a small static bonus from the building's level.
  function unitArrives(g, u, t) {
    const strength = (u.rollingStone ? ROLLING_STONE_STRENGTH_MULT : 1) * (u.rageBoosted ? RAGE_STRENGTH_MULT : 1);
    if (sameTeam(g, t.owner, u.owner) || t.owner === u.owner) {
      t.troops += strength; // reinforce own or allied garrison — no per-building limit; see the regen step for the actual population budget (sum of towerCapacity across a TEAM's buildings in 2v2, a player's in FFA)
    } else if (u.rollingStone && t.type === "castle") {
      // Rolling Stones "can't take over a castle": full damage still lands,
      // but this arrival can never be the one that flips ownership — clamped
      // at 1 troop instead of letting the capture branch trigger. A non-stone
      // unit (or a later wave) is still needed to actually finish it off.
      t.troops = Math.max(1, t.troops - (strength * momentumMult(g, u.owner)) / (momentumMult(g, t.owner) * levelDefenseMult(t) * fortifyMult(g, t)));
      applyMomentumKill(g, u.owner, t.owner);
      t.underAttackFlashAt = g.pulse;
    } else if ((t.troops -= (strength * momentumMult(g, u.owner)) / (momentumMult(g, t.owner) * levelDefenseMult(t) * fortifyMult(g, t))) > 0) {
      applyMomentumKill(g, u.owner, t.owner); // this attacker died without finishing the defense — a kill "by castle"
      t.underAttackFlashAt = g.pulse; // hostile contact — flash the region (see draw())
    } else {
      captureBuilding(g, t, u.owner);
    }
  }

  // ================= Game loop =================
  useEffect(() => {
    if (screen !== "play") return;
    let raf, last = performance.now(), hudTimer = 0;

    const step = (now) => {
      const g = gameRef.current;
      const dt = Math.min(0.05, (now - last) / 1000);
      last = now;
      if (!g) return;
      g.pulse += dt;

      if (!g.over && !pausedRef.current) {
        // Battle heat decays continuously; feeds the ambient battle bed below.
        if (g.battleHeat > 0) g.battleHeat = Math.max(0, g.battleHeat - BATTLE_HEAT_DECAY * dt);

        // Momentum revert — everyone drifts back toward baseline (1.0) on
        // their own over time, from EITHER side: below it climbs up, above it
        // settles down, both at MOMENTUM_REVERT_STEP per
        // MOMENTUM_REVERT_INTERVAL seconds (applied as a continuous rate
        // rather than a discrete 5s tick, for smoothness — equivalent in
        // aggregate). Never overshoots past 1.0 in either direction — a kill
        // or capture during the same tick can still push it back out from
        // there, this is just steady background pressure toward the middle.
        if (g.momentum) {
          const revertRate = MOMENTUM_REVERT_STEP / MOMENTUM_REVERT_INTERVAL;
          for (let pid = 0; pid < g.numPlayers; pid++) {
            if (g.momentum[pid] < 1) g.momentum[pid] = Math.min(1, g.momentum[pid] + revertRate * dt);
            else if (g.momentum[pid] > 1) g.momentum[pid] = Math.max(1, g.momentum[pid] - revertRate * dt);
          }
        }

        // Regeneration — every non-tower building climbs back toward its own
        // towerCapacity (towerMax's upgrade threshold + CAPACITY_BONUS
        // headroom: 25/35/45/55) — a building not yet upgraded can still
        // passively regen a bit past its upgrade-ready point if left alone.
        // On top of that, each TEAM has a total-population budget equal to
        // the SUM of towerCapacity(t) across every building anyone on that
        // team owns — e.g. three level-1 buildings + one level-3 →
        // 25+25+25+45 = 120 total, not a flat count-times-constant. Towers
        // and castles count identically (towerCapacity is purely
        // level-based). In FFA every player is their own team (see
        // `generateMap`'s teams array), so this reduces to a per-player
        // budget exactly as before — the team-pooling only actually matters
        // in 2v2, where both allies draw from one shared pool instead of two
        // separate ones. Regen simply contributes nothing further once a
        // team's combined total hits that shared budget, even if a
        // particular building is still below its own capacity. The total
        // counts BOTH garrisoned troops AND troops currently marching
        // (g.units) — an army sent out still belongs to the team's
        // population, so it still counts against the shared budget and
        // throttles further regen while it's in transit, the same as if it
        // were sitting in a building. This budget only throttles regen —
        // reinforcement (unitArrives) is completely unbounded per-building (a
        // single building CAN hold far more than its own towerCapacity if the
        // team marches/consolidates troops in from elsewhere, including from
        // an ally's buildings now that the budget is shared), since moving
        // troops around — including between allies — doesn't create
        // population, it just redistributes/settles it within the team, so
        // it never needs to respect this budget itself. Second Wind
        // (`castSecondWind`) is likewise unaffected — it's a direct
        // `t.troops +=`, entirely outside this regen loop, so it isn't
        // throttled by the population budget either.
        const budgetCapacity = new Array(g.numPlayers).fill(0);
        const totalPop = new Array(g.numPlayers).fill(0);
        for (const t of g.towers) {
          if (t.owner === NEUTRAL) continue;
          const team = g.teams[t.owner];
          budgetCapacity[team] += towerCapacity(t);
          totalPop[team] += t.troops;
        }
        for (const u of g.units) {
          if (u.owner === NEUTRAL) continue; // units always belong to a real player, but guard for consistency with the towers loop above
          totalPop[g.teams[u.owner]] += 1; // each marching soldier is 1 troop of population, regardless of any Rolling Stones/Rage combat-strength multiplier — those affect damage, not headcount
        }
        for (const t of g.towers) {
          const cap = towerCapacity(t);
          if (t.troops >= cap) continue;
          let room = cap - t.troops; // this building's own capacity still allows this much
          if (t.owner !== NEUTRAL) {
            const team = g.teams[t.owner];
            room = Math.min(room, Math.max(0, budgetCapacity[team] - totalPop[team]));
          }
          // Tutorial: the enemy regenerates at half speed (owner 0, the human,
          // and neutral buildings are unaffected) — keeps the AI's economy
          // from quietly outpacing a player who's still reading each step.
          const tutorialRegenMult = (g.tutorial && t.owner !== 0 && t.owner !== NEUTRAL) ? 0.5 : 1;
          const grown = Math.min(room, towerRegen(t) * dt * tutorialRegenMult);
          if (grown > 0) {
            t.troops += grown;
            if (t.owner !== NEUTRAL) totalPop[g.teams[t.owner]] += grown; // keep the running total accurate within this tick
          }
        }

        // Upgrade / conversion builds finishing
        for (const t of g.towers) {
          if (!t.upgrading) continue;
          t.upgrading.time += dt;
          if (t.upgrading.time >= t.upgrading.dur) {
            if (t.upgrading.kind === "convert") {
              t.type = t.upgrading.toType;
              t.level = 1;
              t.upgrading = null;
              applyMomentumBuild(g, t.owner);
              // The defense tower lives on the right turret; reset any active
              // buffs and re-attach it at the new building type's position.
              if (t.defs && t.defs[0]) {
                t.defs[0].rateMult = 1; t.defs[0].rateExpiresAt = 0;
                t.defs[0].boulder = false; t.defs[0].boulderExpiresAt = 0;
                const p = defenderPoint(t);
                t.defs[0].x = p.x; t.defs[0].y = p.y;
              }
              g.rings.push({ x: t.x, y: t.y, life: 0, dur: 0.6, color: "#8AD1FF" });
              for (let i = 0; i < 10; i++) {
                const a = (i / 10) * Math.PI * 2;
                g.sparks.push({ x: t.x + Math.cos(a) * 20, y: t.y + Math.sin(a) * 20, life: 0.5, color: "#8AD1FF" });
              }
              continue;
            }
            t.level += 1;
            t.upgrading = null;
            applyMomentumBuild(g, t.owner);
            // The defense tower lives on the right turret, which moves as the
            // silhouette grows — keep it attached at the new level's position.
            if (t.defs && t.defs[0]) {
              const p = defenderPoint(t);
              t.defs[0].x = p.x; t.defs[0].y = p.y;
            }
            if (g.tutorial && t.owner === 0) g.tutorialFlags.upgraded = true;
            for (let i = 0; i < 14; i++) {
              const a = (i / 14) * Math.PI * 2;
              g.sparks.push({ x: t.x + Math.cos(a) * 22, y: t.y + Math.sin(a) * 22, life: 0.55, color: "#FFD86A" });
            }
          }
        }

        // Orders release soldiers out of the gate — a full row of 4 at a
        // time (or a smaller final row, if fewer than 4 remain), not one
        // trickling out individually. A row used to just be a pre-assigned
        // destination that filled in asynchronously over several spawn
        // ticks, which didn't actually read as an organized formation —
        // this makes the whole rank appear together in one instant.
        for (let i = g.orders.length - 1; i >= 0; i--) {
          const o = g.orders[i];
          const src = g.towers[o.src];
          if (o.remaining <= 0 || src.owner !== o.owner) { g.orders.splice(i, 1); continue; }
          o.accum += SPAWN_RATE * dt;
          while (o.accum >= 4 && o.remaining > 0 && src.troops >= 1) {
            const rowSize = Math.min(4, o.remaining, Math.floor(src.troops));
            if (rowSize <= 0) break;
            o.accum -= 4; // always consumed as a full row's worth, even for a smaller final row
            const dstT = g.towers[o.dst];
            const ang = Math.atan2(dstT.y - src.y, dstT.x - src.x);
            const px = -Math.sin(ang), py = Math.cos(ang); // perpendicular to the march direction
            const row = Math.floor(o.spawned / 4) % 3; // cycle after 3 ranks — keeps even a huge order's spawn point tight near the gate instead of drifting arbitrarily far back
            const gateDist = 18 - row * 1; // later rows start further back, catching up as they march — reduced further this session (was 2.5, then 5, originally 10); the bigger contributor to row spacing was actually SPAWN_RATE (time between releases), addressed above
            const rowPhase = Math.random() * Math.PI * 2; // one shared sway phase for the whole row, so its 4 members sway in sync instead of independently wobbling out of step
            for (let c = 0; c < rowSize; c++) {
              // Centered on the row regardless of rowSize, so a smaller final
              // row (1-3 stragglers) still lines up centered rather than
              // bunched to one side.
              const lateral = (c - (rowSize - 1) / 2) * 9;
              o.spawned++;
              o.remaining--;
              src.troops -= 1;
              g.units.push({
                uid: g.uidSeq++,
                owner: o.owner,
                x: src.x + Math.cos(ang) * gateDist + px * lateral,
                y: src.y + Math.sin(ang) * gateDist + py * lateral,
                dst: o.dst,
                off: lateral,   // marching-lane offset — matches the spawn column, so the row-of-4 formation holds during the march
                speed: UNIT_SPEED, // uniform — no per-unit variance, so a row doesn't drift apart from itself as it marches (momentum still scales this per-owner in the March step)
                phase: rowPhase,
              });
            }
          }
          // Cutoff: an order's percentage is deliberately computed from
          // whatever the garrison shows at the moment it's issued (so
          // stacking several orders while earlier ones are still draining
          // can legitimately promise more than the castle currently holds —
          // that's expected). But if the castle actually runs dry before
          // this order finishes, the leftover backlog is void — it must NOT
          // sit here waiting, because regen or a later reinforcement arrival
          // would otherwise top the garrison back up and this stale order
          // would immediately ship those troops back out again, which reads
          // as troops entering the castle only to be auto-sent right back
          // out. Once troops hit 0, drop whatever's left unsent.
          if (src.troops < 1 && o.remaining > 0) o.remaining = 0;
          if (o.remaining <= 0) g.orders.splice(i, 1);
        }

        // Frost thaw: once a frozen unit's window passes, it resumes marching —
        // a lazy expiry check, same pattern Fortify already uses for buildings,
        // just applied per-unit (see castFrost).
        for (const u of g.units) {
          if (u.frozenUntil && g.pulse >= u.frozenUntil) { u.frozenUntil = 0; u.frozen = false; }
        }

        // March. Speed is affected by u.speedMul (Speed/Slow Down specials),
        // u.frozen (Frost — a hard override, takes priority over everything
        // else including momentum: a frozen unit doesn't move no matter how
        // high its owner's momentum is), AND the owner's own momentum — a
        // player on a losing streak (momentum < 1) marches slower as well as
        // hitting weaker, and a winning streak marches faster, same
        // multiplier as the attack-damage formula in unitArrives uses.
        for (const u of g.units) {
          const t = g.towers[u.dst];
          const d = dist(u, t);
          let tx = t.x, ty = t.y;
          if (d > 60) { // hold formation lanes until close, then converge
            const px = -(t.y - u.y) / d, py = (t.x - u.x) / d;
            tx += px * u.off; ty += py * u.off;
          }
          const spd = u.frozen ? 0 : u.speed * (u.speedMul || 1) * momentumMult(g, u.owner);
          const dd = Math.hypot(tx - u.x, ty - u.y) || 1;
          const wob = Math.sin(g.pulse * 9 + u.phase) * 6 * dt;
          u.x += ((tx - u.x) / dd) * spd * dt + (-(ty - u.y) / dd) * wob;
          u.y += ((ty - u.y) / dd) * spd * dt + ((tx - u.x) / dd) * wob;
        }

        // Field clashes: opposing soldiers kill each other where they meet
        const cell = 14, grid = new Map();
        const key = (x, y) => ((x / cell) | 0) + "," + ((y / cell) | 0);
        g.units.forEach((u, i) => {
          const k = key(u.x, u.y);
          if (!grid.has(k)) grid.set(k, []);
          grid.get(k).push(i);
        });
        const dead = new Set();
        for (let i = 0; i < g.units.length; i++) {
          if (dead.has(i)) continue;
          const u = g.units[i];
          const cx = (u.x / cell) | 0, cy = (u.y / cell) | 0;
          outer:
          for (let gx = cx - 1; gx <= cx + 1; gx++) {
            for (let gy = cy - 1; gy <= cy + 1; gy++) {
              const bucket = grid.get(gx + "," + gy);
              if (!bucket) continue;
              for (const j of bucket) {
                if (j <= i || dead.has(j)) continue;
                const v = g.units[j];
                if (sameTeam(g, v.owner, u.owner)) continue;
                if (dist(u, v) < COLLIDE_R) {
                  dead.add(i); dead.add(j);
                  const mx = (u.x + v.x) / 2, my = (u.y + v.y) / 2;
                  g.sparks.push({ x: mx, y: my, life: 0.45, color: "#FFE9C2" });
                  g.puffs.push({ x: mx, y: my, age: 0, dur: 0.4, r: 16 });
                  addBattleHeat(g, mx, my, 1);
                  break outer;
                }
              }
            }
          }
        }
        gainTrainTime(g, dead.size);
        if (dead.size) SoundEngine.clash();

        // Arrivals
        for (let i = g.units.length - 1; i >= 0; i--) {
          if (dead.has(i)) { g.units.splice(i, 1); continue; }
          const u = g.units[i];
          const t = g.towers[u.dst];
          if (dist(u, t) <= TOWER_HIT_R) {
            unitArrives(g, u, t);
            g.units.splice(i, 1);
          }
        }

        // Defensive fire: only TOWER-type buildings shoot hostile troops passing
        // through them by default — castles no longer have a built-in defense
        // tower. A castle temporarily gains firing capability while a Tower
        // Defense (rateMult) buff is active on it — the special "activates"
        // tower behavior in a castle for the buff's duration. Barrage (boulder)
        // deliberately does NOT do this — it's tower-only. Range grows with
        // level (see towerRange()).
        const byUid = new Map();
        for (const u of g.units) byUid.set(u.uid, u);
        for (const t of g.towers) {
          if (!t.defs || !t.defs.length) continue;
          for (const d of t.defs) {
            // Expire either buff once its window is up
            if (d.rateMult && d.rateExpiresAt <= g.pulse) { d.rateMult = 1; d.rateExpiresAt = 0; }
            if (d.boulder && d.boulderExpiresAt <= g.pulse) { d.boulder = false; d.boulderExpiresAt = 0; }
            const canFire = t.type === "tower" || d.rateMult > 1 || d.boulder;
            if (!canFire) continue;
            d.cd -= dt;
            if (d.cd > 0) continue;
            let nearest = null, nd = towerRange(t);
            for (const u of g.units) {
              if (sameTeam(g, u.owner, t.owner)) continue;
              if (u.rollingStone) continue; // "can't be shot by towers" — see castRollingStones
              const dd = Math.hypot(u.x - t.x, u.y - t.y);
              if (dd < nd) { nd = dd; nearest = u; }
            }
            if (nearest) {
              g.arrows.push({
                x: d.x, y: d.y,
                targetUid: nearest.uid, owner: t.owner,
                lx: nearest.x, ly: nearest.y, life: 1.2,
                boulder: !!d.boulder,
              });
              d.cd = towerFireCd(t) / (d.rateMult || 1);
            }
          }
        }

        // Arrow flight — homes on its target, kills on contact. Boulders (Tower
        // Defense 2.0) fly slower and crush a small cluster on impact instead of
        // just the one target.
        const arrowKilled = new Set();
        const momentumKills = []; // {attacker, defender} — one per unit killed by this volley, for momentum
        const RETARGET_RADIUS = 160; // px — how far an arrow will "snap" to a fresh target
        for (let i = g.arrows.length - 1; i >= 0; i--) {
          const a = g.arrows[i];
          a.life -= dt;
          let tgt = byUid.get(a.targetUid);
          // Original target died (clash, another arrow) or arrived at its
          // destination between the frame this arrow launched and now. Left
          // alone the arrow would keep coasting toward that now-empty point
          // and simply vanish on arrival with no impact — reading as a
          // "miss" even though nothing was ever there to hit. Snap onto the
          // nearest still-living hostile instead, once per arrow, so a shot
          // is only wasted when there's genuinely nothing left nearby.
          if ((!tgt || arrowKilled.has(tgt.uid)) && !a.retargeted) {
            a.retargeted = true;
            let cand = null, cd = RETARGET_RADIUS;
            for (const u of g.units) {
              if (arrowKilled.has(u.uid) || sameTeam(g, u.owner, a.owner)) continue;
              if (u.rollingStone) continue; // "can't be shot by towers" — see castRollingStones
              const dd = Math.hypot(u.x - a.x, u.y - a.y);
              if (dd < cd) { cd = dd; cand = u; }
            }
            if (cand) { a.targetUid = cand.uid; tgt = cand; }
          }
          if (tgt && !arrowKilled.has(tgt.uid)) { a.lx = tgt.x; a.ly = tgt.y; }
          const d = Math.hypot(a.lx - a.x, a.ly - a.y) || 1;
          const v = (a.boulder ? BOULDER_SPEED : ARROW_SPEED) * dt;
          a.x += ((a.lx - a.x) / d) * v;
          a.y += ((a.ly - a.y) / d) * v;
          if (d <= v + 4) {
            if (tgt && !arrowKilled.has(tgt.uid)) {
              arrowKilled.add(tgt.uid);
              momentumKills.push({ attacker: tgt.owner, defender: a.owner });
              g.sparks.push({ x: tgt.x, y: tgt.y, life: 0.35, color: "#FFD27A" });
              if (a.boulder) {
                SoundEngine.boulderHit();
                g.puffs.push({ x: tgt.x, y: tgt.y, age: 0, dur: 0.6, r: BOULDER_SPLASH_RADIUS * 0.9 });
                addBattleHeat(g, tgt.x, tgt.y, 1.5);
                // Crush the nearest few enemies caught in the blast radius too
                const splashed = g.units
                  .filter((u) => u.uid !== tgt.uid && !arrowKilled.has(u.uid) && !u.rollingStone &&
                    !sameTeam(g, u.owner, a.owner) && Math.hypot(u.x - tgt.x, u.y - tgt.y) <= BOULDER_SPLASH_RADIUS)
                  .sort((p, q) => Math.hypot(p.x - tgt.x, p.y - tgt.y) - Math.hypot(q.x - tgt.x, q.y - tgt.y))
                  .slice(0, BOULDER_SPLASH_COUNT - 1);
                for (const u of splashed) {
                  arrowKilled.add(u.uid);
                  momentumKills.push({ attacker: u.owner, defender: a.owner });
                  g.sparks.push({ x: u.x, y: u.y, life: 0.35, color: "#C99060" });
                }
                // Dust-cloud burst at the impact point
                for (let k = 0; k < 6; k++) {
                  const ang = Math.random() * Math.PI * 2, r = Math.random() * BOULDER_SPLASH_RADIUS * 0.6;
                  g.sparks.push({
                    x: tgt.x + Math.cos(ang) * r, y: tgt.y + Math.sin(ang) * r,
                    life: 0.4, color: "#8a7660",
                  });
                }
              } else {
                SoundEngine.arrowHit();
                addBattleHeat(g, tgt.x, tgt.y, 0.6);
              }
            }
            g.arrows.splice(i, 1);
          } else if (a.life <= 0) {
            g.arrows.splice(i, 1);
          }
        }
        for (const k of momentumKills) applyMomentumKill(g, k.attacker, k.defender);
        if (arrowKilled.size) {
          g.units = g.units.filter((u) => !arrowKilled.has(u.uid));
          gainTrainTime(g, arrowKilled.size);
        }

        // Sparks fade
        for (let i = g.sparks.length - 1; i >= 0; i--) {
          g.sparks[i].life -= dt;
          if (g.sparks[i].life <= 0) g.sparks.splice(i, 1);
        }

        // Impact puffs fade
        for (let i = g.puffs.length - 1; i >= 0; i--) {
          g.puffs[i].age += dt;
          if (g.puffs[i].age >= g.puffs[i].dur) g.puffs.splice(i, 1);
        }

        // AI turns — suppressed during the tutorial. aiAct is what actually
        // decides to attack (sizes up assaults, sends real armies at the
        // player's buildings) — the tutorial should never have the AI
        // opponent do that; the only enemy activity the player should ever
        // see is the deliberately small, controlled trickle below
        // (tutorialAutoWave), timed specifically for the Tower Defense demo
        // steps. Timers/train still advance normally so nothing looks stuck
        // if the tutorial is ever extended to call aiAct later.
        for (let pid = 1; pid < g.numPlayers; pid++) {
          if (g.eliminated.has(pid)) continue;
          g.aiTimers[pid] -= dt;
          if (g.aiTimers[pid] <= 0) {
            if (!g.tutorial) aiAct(g, pid);
            g.aiTimers[pid] = 1.1 + Math.random() * 1.6;
          }
          if (g.aiTrain[pid] < TRAIN_MAX) g.aiTrain[pid] = Math.min(TRAIN_MAX, g.aiTrain[pid] + dt);
        }

        // Tutorial-only: keep a small enemy trickle marching at the player during
        // the Tower Defense special steps, so casting the special always has
        // something nearby for the buffed tower to actually fire on.
        if (g.tutorial && g.tutorialAutoWave) {
          g.tutorialWaveTimer -= dt;
          if (g.tutorialWaveTimer <= 0) {
            tutorialSendWave(g);
            g.tutorialWaveTimer = 2.5 + Math.random() * 1.5;
          }
        }
        // Evaluate AI specials a few times a second (keeps the cluster search cheap)
        g.aiFxTimer -= dt;
        if (g.aiFxTimer <= 0) {
          g.aiFxTimer = 0.5;
          aiSpecials(g);
        }

        // Eliminations & outcome (team-aware)
        for (let pid = 0; pid < g.numPlayers; pid++) {
          if (g.eliminated.has(pid)) continue;
          const alive =
            g.towers.some((t) => t.owner === pid) ||
            g.units.some((u) => u.owner === pid) ||
            g.orders.some((o) => o.owner === pid && o.remaining > 0);
          if (!alive) g.eliminated.add(pid);
        }
        const aliveTeams = new Set();
        for (let pid = 0; pid < g.numPlayers; pid++)
          if (!g.eliminated.has(pid)) aliveTeams.add(g.teams[pid]);
        const myTeam = g.teams[0];
        if (!g.tutorial && !aliveTeams.has(myTeam)) { g.over = true; setOutcome("lose"); SoundEngine.lose(); SoundEngine.stopBattle(); }
        else if (aliveTeams.size === 1) { g.over = true; setOutcome("win"); SoundEngine.win(); SoundEngine.stopBattle(); }

        // Tutorial: once the requested action is detected, hold the step open
        // for `settleFor` seconds so the player actually sees the effect (a
        // capture completing, a buff's full active window), then auto-pause
        // and advance to the next step (which may hand the player a fresh
        // resource via onEnter). Steps with no waitFor only advance via the
        // overlay's own Continue button, not here.
        if (g.tutorial) {
          const tStep = TUTORIAL_STEPS[tutorialStepRef.current];
          if (tStep && tStep.waitFor && g.tutorialFlags[tStep.waitFor]) {
            if (g.tutorialWaitStart == null) g.tutorialWaitStart = g.pulse;
            if (g.pulse - g.tutorialWaitStart >= (tStep.settleFor || 0)) {
              const next = tutorialStepRef.current + 1;
              if (TUTORIAL_STEPS[next]) { applyTutorialStep(g, next); setTutorialStep(next); }
              setPaused(true);
            }
          }
        }

        // Special "train" progress + effect animations
        if (g.trainProgress < TRAIN_MAX) g.trainProgress = Math.min(TRAIN_MAX, g.trainProgress + dt);
        for (let i = g.rings.length - 1; i >= 0; i--) {
          g.rings[i].life += dt;
          if (g.rings[i].life >= g.rings[i].dur) g.rings.splice(i, 1);
        }
        for (let i = g.slashes.length - 1; i >= 0; i--) {
          g.slashes[i].life += dt;
          if (g.slashes[i].life >= g.slashes[i].dur) g.slashes.splice(i, 1);
        }
      }

      draw(g);

      hudTimer += dt;
      if (hudTimer > 0.35) {
        hudTimer = 0;
        if (!g.over && !pausedRef.current) {
          SoundEngine.setBattleIntensity(g.battleHeat / BATTLE_HEAT_MAX);
        }
        const stats = [];
        for (let pid = 0; pid < g.numPlayers; pid++) {
          const mine = g.towers.filter((t) => t.owner === pid);
          const marching =
            g.units.filter((u) => u.owner === pid).length +
            g.orders.filter((o) => o.owner === pid).reduce((s, o) => s + o.remaining, 0);
          stats.push({
            pid,
            team: g.teams[pid],
            towers: mine.length,
            troops: Math.floor(mine.reduce((s, t) => s + t.troops, 0) + marching),
            dead: g.eliminated.has(pid),
            momentum: momentumMult(g, pid),
            trainPct: trainOf(g, pid) / TRAIN_MAX, // 0..1 — see the per-player mini loading bar in the standings row
          });
        }
        setHud(stats);
        syncSpecials(g);
      }
      raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => { cancelAnimationFrame(raf); SoundEngine.stopBattle(); };
  }, [screen]);

  // ================= Rendering =================
  // The troop counter for a castle. Drawn in its own pass AFTER every building,
  // so a tall castle in front can never paint over a counter behind it. The plate
  // sits just below the castle base; projected and scaled like the sprite.
  function drawGarrisonPlate(ctx, t, g) {
    const owned = t.owner !== NEUTRAL;
    const col = owned ? FACTIONS[t.owner].color : NEUTRAL_COLOR;
    const groundY = t.y + 14;                 // matches the sprite's base
    const B = proj(g, t.x, groundY + 17);     // project the plate's anchor point
    const s = B.s;
    ctx.save();
    ctx.translate(B.x, B.y);
    ctx.scale(s, s);
    const n = Math.floor(t.troops);
    ctx.font = "700 13px 'IBM Plex Mono', monospace";
    const plateW = ctx.measureText(n).width + 12;
    ctx.fillStyle = "rgba(10,14,24,0.9)";
    ctx.beginPath();
    ctx.roundRect(-plateW / 2, -9, plateW, 18, 5);
    ctx.fill();
    ctx.strokeStyle = t.troops > towerCapacity(t) ? col : "rgba(138,147,171,0.5)";
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = "#E8EBF2";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(n, 0, 0);
    ctx.restore();
  }

  function drawTowerSprite(ctx, t, g) {
    const owned = t.owner !== NEUTRAL;
    const col = owned ? FACTIONS[t.owner].color : NEUTRAL_COLOR;
    // Upright sprite at the projected base, scaled with zoom + depth
    const B = proj(g, t.x, t.y);
    ctx.save();
    ctx.translate(B.x, B.y);
    ctx.scale(B.s, B.s);
    ctx.translate(-t.x, -t.y);
    const x = t.x, y = t.y;
    const lvl = t.level || 1;

    // Per-level castle geometry — see CASTLE_LEVEL_CFG (shared with defenderPoint).
    const cfg = CASTLE_LEVEL_CFG[Math.min(lvl, 4)];
    const baseW = cfg.w;
    const turretW = 9;
    const keepW = baseW - turretW * 2 + 4;
    const groundY = y + 14;                 // fixed base; castle grows upward
    const turretTop = groundY - cfg.turretH;
    const keepTop = groundY - cfg.keepH;

    // The right turret is this castle's defense tower — when a Tower Defense
    // buff is active it visibly grows (not just recolors), so the buff reads
    // at a glance from across the map. Computed up here so the enlarged
    // turret is included in the castle's overall bounding box (totalH)
    // below. `boulder` mirrors the same styling logic drawWatchtowerSprite
    // uses for real towers, but is effectively dead here — Barrage (the
    // renamed, tower-only ability that sets `boulder`) never touches castles,
    // so this branch is kept only so the two sprites' buff-styling code stays
    // in sync if that ever changes.
    const def = t.defs && t.defs[0];
    const buff2 = def && def.rateMult === TOWER_DEF_RATE_MULT; // Tower Defense (+25% fire rate)
    const boulder = def && !!def.boulder;                       // Barrage (splash boulders) — see note above
    const buffed = buff2 || boulder;
    const fortified = fortifyMult(g, t) > 1; // Fortify — see METALLIC_COLORS comment above
    const rTurretW = turretW * (buffed ? 1.45 : 1);
    const rTurretH = cfg.turretH * (buffed ? 1.25 : 1);
    const rTurretTop = groundY - rTurretH;

    const totalH = Math.max(cfg.keepH, rTurretH) + (cfg.grand ? 12 : 0);
    const topY = groundY - totalH;
    const midY = groundY - totalH / 2;

    // Shrink the whole castle (and everything drawn relative to it below —
    // shadow, team ring, body, flags, drag/hover rings, upgrade dust) around
    // its ground point, so it still sits in the same spot in its region but
    // takes up less room where neighbouring castles' sprites would otherwise
    // start overlapping.
    ctx.translate(x, groundY);
    ctx.scale(CASTLE_SCALE, CASTLE_SCALE);
    ctx.translate(-x, -groundY);

    // Which local side is lit is derived from LIGHT_DIR.x, not hardcoded, so
    // castle shading stays locked to the same light source as the terrain and
    // the ground shadow — change LIGHT_DIR and these follow automatically.
    const litLeft = LIGHT_DIR.x < 0;
    const stone = (cxx, cw, top, ht, colors) => {
      const grad = ctx.createLinearGradient(cxx - cw / 2, 0, cxx + cw / 2, 0);
      let [c1, c2, c3] = colors || ["#6E7AA0", "#525d80", "#3b4463"];
      if (!litLeft) { [c1, c3] = [c3, c1]; }
      grad.addColorStop(0, c1); grad.addColorStop(0.55, c2); grad.addColorStop(1, c3);
      ctx.fillStyle = grad; ctx.fillRect(cxx - cw / 2, top, cw, ht);
    };
    const crenellate = (cxx, cw, top, color) => {
      ctx.fillStyle = color || "#6E7AA0"; const m = cw / 5;
      for (let i = 0; i < 3; i++) ctx.fillRect(cxx - cw / 2 + i * 2 * m, top - 4, m, 4);
    };
    const roofTop = (cxx, cw, top, hh) => {
      const grad = ctx.createLinearGradient(cxx - cw / 2, 0, cxx + cw / 2, 0);
      const [r1, r2] = litLeft ? ["#96604f", "#6b3f34"] : ["#6b3f34", "#96604f"];
      grad.addColorStop(0, r1); grad.addColorStop(1, r2);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(cxx - cw / 2 - 1, top); ctx.lineTo(cxx, top - hh); ctx.lineTo(cxx + cw / 2 + 1, top);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = "rgba(0,0,0,0.25)"; ctx.lineWidth = 1; ctx.stroke();
    };
    const win = (wx, wy, ww, wh) => {
      ctx.fillStyle = "#20263c"; ctx.fillRect(wx - ww / 2, wy, ww, wh);
      ctx.fillStyle = col; ctx.globalAlpha = 0.9; ctx.fillRect(wx - ww / 2 + 0.8, wy + 0.8, ww - 1.6, wh - 1.6); ctx.globalAlpha = 1;
    };
    const flag = (fx, fy, dir) => {
      ctx.strokeStyle = "#8a93ab"; ctx.lineWidth = 1.3;
      ctx.beginPath(); ctx.moveTo(fx, fy); ctx.lineTo(fx, fy - 12); ctx.stroke();
      ctx.fillStyle = col; ctx.beginPath();
      ctx.moveTo(fx, fy - 12); ctx.lineTo(fx + 9 * dir, fy - 9.5); ctx.lineTo(fx, fy - 7); ctx.closePath(); ctx.fill();
    };

    // Ground shadow — offset opposite LIGHT_DIR so it agrees with the terrain's
    // directional light instead of sitting perfectly centered under the castle.
    ctx.fillStyle = "rgba(0,0,0,0.35)";
    ctx.beginPath();
    ctx.ellipse(x - LIGHT_DIR.x * 6, groundY + 3 - LIGHT_DIR.y * 2, baseW * 0.72, 7, 0, 0, Math.PI * 2);
    ctx.fill();

    // Team ring (2v2 only) — independent of per-player faction color, so an
    // ally never reads as a foe just because their faction hue looks hostile.
    if (owned && g.mode === "2v2") {
      const myTeam = g.teams[0];
      const ringCol = g.teams[t.owner] === myTeam ? "#FFD23F" : "#E4534A";
      ctx.strokeStyle = ringCol;
      ctx.lineWidth = 2.4;
      ctx.beginPath();
      ctx.ellipse(x, groundY + 3, baseW * 0.72 + 5, 9.5, 0, 0, Math.PI * 2);
      ctx.stroke();
    }

    const lx = x - baseW / 2, rx = x + baseW / 2;
    const off = keepW * 0.28, blockW = keepW * 0.62;

    // Body / keep — metallic (see METALLIC_COLORS) when Fortify is active,
    // plain stone otherwise. `mc`/`mcCren` below are just shorthand so every
    // stone()/crenellate() call in this section doesn't need its own ternary.
    const mc = fortified ? METALLIC_COLORS : undefined;
    const mcCren = fortified ? METALLIC_CREN : undefined;
    if (cfg.wide) {
      if (cfg.grand) {
        // L4: one solid wide body + a raised central keep with roof
        stone(x, keepW + off * 2, keepTop, cfg.keepH, mc);
        crenellate(x - off, blockW, keepTop, mcCren);
        crenellate(x + off, blockW, keepTop, mcCren);
        const centTop = keepTop - 12, centW = blockW * 1.15;
        stone(x, centW, centTop, cfg.keepH + 12, mc);
        roofTop(x, centW, centTop, 15);
      } else {
        // L3: twin-block gatehouse with a roofed raised center block
        stone(x - off, blockW, keepTop, cfg.keepH, mc);
        stone(x + off, blockW, keepTop, cfg.keepH, mc);
        crenellate(x - off, blockW, keepTop, mcCren);
        crenellate(x + off, blockW, keepTop, mcCren);
        const centTop = keepTop - 6, centW = off * 1.7;
        stone(x, centW, centTop, groundY - centTop, mc);
        roofTop(x, centW, centTop, 12);
      }
    } else {
      stone(x, keepW, keepTop, cfg.keepH, mc);
      if (cfg.roof) roofTop(x, keepW, keepTop, 12);
      else crenellate(x, keepW, keepTop, mcCren);
    }

    // Right turret doubles as this castle's defense tower — there's no separate
    // structure floating elsewhere in the region anymore. An active buff isn't
    // just a small accent: the whole turret grows (rTurretW/H, set above) and
    // is fully recolored, plus a glow halo behind it, so the effect reads at a
    // glance instead of requiring a close look for a tinted window.
    const defMidY = rTurretTop + rTurretH * 0.42;
    if (boulder) {
      const pulseT = 0.5 + 0.5 * Math.sin(g.pulse * 6);
      const glowR = rTurretW * (2.4 + 0.6 * pulseT);
      const glow = ctx.createRadialGradient(rx, defMidY, 0, rx, defMidY, glowR);
