        // Field clashes: opposing soldiers kill each other where they meet
        const cell = 14, grid = new Map();
        const key = (x, y) => ((x / cell) | 0) + "," + ((y / cell) | 0);
        g.units.forEach((u, i) => {
          const k = key(u.x, u.y);
          if (!grid.has(k)) grid.set(k, []);
          grid.get(k).push(i);
        });
        const dead = new Set();
        for (let i = 0; i < g.units.length; i++) {
          if (dead.has(i)) continue;
          const u = g.units[i];
          const cx = (u.x / cell) | 0, cy = (u.y / cell) | 0;
          outer:
          for (let gx = cx - 1; gx <= cx + 1; gx++) {
            for (let gy = cy - 1; gy <= cy + 1; gy++) {
              const bucket = grid.get(gx + "," + gy);
              if (!bucket) continue;
              for (const j of bucket) {
                if (j <= i || dead.has(j)) continue;
                const v = g.units[j];
                if (sameTeam(g, v.owner, u.owner)) continue;
                if (dist(u, v) < COLLIDE_R) {
                  dead.add(i); dead.add(j);
                  const mx = (u.x + v.x) / 2, my = (u.y + v.y) / 2;
                  g.sparks.push({ x: mx, y: my, life: 0.45, color: "#FFE9C2" });
                  g.puffs.push({ x: mx, y: my, age: 0, dur: 0.4, r: 16 });
                  addBattleHeat(g, mx, my, 1);
                  break outer;
                }
              }
            }
          }
        }
        gainTrainTime(g, dead.size);
        if (dead.size) SoundEngine.clash();

        // Arrivals
        for (let i = g.units.length - 1; i >= 0; i--) {
          if (dead.has(i)) { g.units.splice(i, 1); continue; }
          const u = g.units[i];
          const t = g.towers[u.dst];
          if (dist(u, t) <= TOWER_HIT_R) {
            unitArrives(g, u, t);
            g.units.splice(i, 1);
          }
        }

        // Defensive fire: only TOWER-type buildings shoot hostile troops passing
        // through them by default — castles no longer have a built-in defense
        // tower. A castle temporarily gains firing capability while a Tower
        // Defense (rateMult) buff is active on it — the special "activates"
        // tower behavior in a castle for the buff's duration. Barrage (boulder)
        // deliberately does NOT do this — it's tower-only. Range grows with
        // level (see towerRange()).
        const byUid = new Map();
        for (const u of g.units) byUid.set(u.uid, u);
        for (const t of g.towers) {
          if (!t.defs || !t.defs.length) continue;
          for (const d of t.defs) {
            // Expire either buff once its window is up
            if (d.rateMult && d.rateExpiresAt <= g.pulse) { d.rateMult = 1; d.rateExpiresAt = 0; }
            if (d.boulder && d.boulderExpiresAt <= g.pulse) { d.boulder = false; d.boulderExpiresAt = 0; }
            const canFire = t.type === "tower" || d.rateMult > 1 || d.boulder;
            if (!canFire) continue;
            d.cd -= dt;
            if (d.cd > 0) continue;
            let nearest = null, nd = towerRange(t);
            for (const u of g.units) {
              if (sameTeam(g, u.owner, t.owner)) continue;
              if (u.rollingStone) continue; // "can't be shot by towers" — see castRollingStones
              const dd = Math.hypot(u.x - t.x, u.y - t.y);
              if (dd < nd) { nd = dd; nearest = u; }
            }
            if (nearest) {
              g.arrows.push({
                x: d.x, y: d.y,
                targetUid: nearest.uid, owner: t.owner,
                lx: nearest.x, ly: nearest.y, life: 1.2,
                boulder: !!d.boulder,
              });
              d.cd = towerFireCd(t) / (d.rateMult || 1);
            }
          }
        }

        // Arrow flight — homes on its target, kills on contact. Boulders (Tower
        // Defense 2.0) fly slower and crush a small cluster on impact instead of
        // just the one target.
        const arrowKilled = new Set();
        const momentumKills = []; // {attacker, defender} — one per unit killed by this volley, for momentum
        const RETARGET_RADIUS = 160; // px — how far an arrow will "snap" to a fresh target
        for (let i = g.arrows.length - 1; i >= 0; i--) {
          const a = g.arrows[i];
          a.life -= dt;
          let tgt = byUid.get(a.targetUid);
          // Original target died (clash, another arrow) or arrived at its
          // destination between the frame this arrow launched and now. Left
          // alone the arrow would keep coasting toward that now-empty point
          // and simply vanish on arrival with no impact — reading as a
          // "miss" even though nothing was ever there to hit. Snap onto the
          // nearest still-living hostile instead, once per arrow, so a shot
          // is only wasted when there's genuinely nothing left nearby.
          if ((!tgt || arrowKilled.has(tgt.uid)) && !a.retargeted) {
            a.retargeted = true;
            let cand = null, cd = RETARGET_RADIUS;
            for (const u of g.units) {
              if (arrowKilled.has(u.uid) || sameTeam(g, u.owner, a.owner)) continue;
              if (u.rollingStone) continue; // "can't be shot by towers" — see castRollingStones
              const dd = Math.hypot(u.x - a.x, u.y - a.y);
              if (dd < cd) { cd = dd; cand = u; }
            }
            if (cand) { a.targetUid = cand.uid; tgt = cand; }
          }
          if (tgt && !arrowKilled.has(tgt.uid)) { a.lx = tgt.x; a.ly = tgt.y; }
          const d = Math.hypot(a.lx - a.x, a.ly - a.y) || 1;
          const v = (a.boulder ? BOULDER_SPEED : ARROW_SPEED) * dt;
          a.x += ((a.lx - a.x) / d) * v;
          a.y += ((a.ly - a.y) / d) * v;
          if (d <= v + 4) {
            if (tgt && !arrowKilled.has(tgt.uid)) {
              arrowKilled.add(tgt.uid);
              momentumKills.push({ attacker: tgt.owner, defender: a.owner });
              g.sparks.push({ x: tgt.x, y: tgt.y, life: 0.35, color: "#FFD27A" });
              if (a.boulder) {
                SoundEngine.boulderHit();
                g.puffs.push({ x: tgt.x, y: tgt.y, age: 0, dur: 0.6, r: BOULDER_SPLASH_RADIUS * 0.9 });
                addBattleHeat(g, tgt.x, tgt.y, 1.5);
                // Crush the nearest few enemies caught in the blast radius too
                const splashed = g.units
                  .filter((u) => u.uid !== tgt.uid && !arrowKilled.has(u.uid) && !u.rollingStone &&
                    !sameTeam(g, u.owner, a.owner) && Math.hypot(u.x - tgt.x, u.y - tgt.y) <= BOULDER_SPLASH_RADIUS)
                  .sort((p, q) => Math.hypot(p.x - tgt.x, p.y - tgt.y) - Math.hypot(q.x - tgt.x, q.y - tgt.y))
                  .slice(0, BOULDER_SPLASH_COUNT - 1);
                for (const u of splashed) {
                  arrowKilled.add(u.uid);
                  momentumKills.push({ attacker: u.owner, defender: a.owner });
                  g.sparks.push({ x: u.x, y: u.y, life: 0.35, color: "#C99060" });
                }
                // Dust-cloud burst at the impact point
                for (let k = 0; k < 6; k++) {
                  const ang = Math.random() * Math.PI * 2, r = Math.random() * BOULDER_SPLASH_RADIUS * 0.6;
                  g.sparks.push({
                    x: tgt.x + Math.cos(ang) * r, y: tgt.y + Math.sin(ang) * r,
                    life: 0.4, color: "#8a7660",
                  });
                }
              } else {
                SoundEngine.arrowHit();
                addBattleHeat(g, tgt.x, tgt.y, 0.6);
              }
            }
            g.arrows.splice(i, 1);
          } else if (a.life <= 0) {
            g.arrows.splice(i, 1);
          }
        }
        for (const k of momentumKills) applyMomentumKill(g, k.attacker, k.defender);
        if (arrowKilled.size) {
          g.units = g.units.filter((u) => !arrowKilled.has(u.uid));
          gainTrainTime(g, arrowKilled.size);
        }

        // Sparks fade
        for (let i = g.sparks.length - 1; i >= 0; i--) {
          g.sparks[i].life -= dt;
          if (g.sparks[i].life <= 0) g.sparks.splice(i, 1);
        }

        // Impact puffs fade
        for (let i = g.puffs.length - 1; i >= 0; i--) {
          g.puffs[i].age += dt;
          if (g.puffs[i].age >= g.puffs[i].dur) g.puffs.splice(i, 1);
        }

        // AI turns — suppressed during the tutorial. aiAct is what actually
        // decides to attack (sizes up assaults, sends real armies at the
        // player's buildings) — the tutorial should never have the AI
        // opponent do that; the only enemy activity the player should ever
        // see is the deliberately small, controlled trickle below
        // (tutorialAutoWave), timed specifically for the Tower Defense demo
        // steps. Timers/train still advance normally so nothing looks stuck
        // if the tutorial is ever extended to call aiAct later.
        for (let pid = 1; pid < g.numPlayers; pid++) {
          if (!stillCasting(g, pid)) continue; // fully-dead team: nothing left to tick
          // An eliminated-but-team-alive AI takes no aiAct turn (it has no
          // buildings or troops to move) but its train keeps loading so it can
          // keep casting team-scoped specials for its surviving partner.
          if (!g.eliminated.has(pid)) {
            g.aiTimers[pid] -= dt;
            if (g.aiTimers[pid] <= 0) {
              if (!g.tutorial) aiAct(g, pid);
              g.aiTimers[pid] = 1.1 + Math.random() * 1.6;
            }
          }
          if (g.aiTrain[pid] < trainMax()) g.aiTrain[pid] = Math.min(trainMax(), g.aiTrain[pid] + dt);
        }

        // Tutorial-only: keep a small enemy trickle marching at the player during
        // the Tower Defense special steps, so casting the special always has
        // something nearby for the buffed tower to actually fire on.
        if (g.tutorial && g.tutorialAutoWave) {
          g.tutorialWaveTimer -= dt;
          if (g.tutorialWaveTimer <= 0) {
            tutorialSendWave(g);
            g.tutorialWaveTimer = 2.5 + Math.random() * 1.5;
          }
        }
        // Evaluate AI specials a few times a second (keeps the cluster search cheap)
        g.aiFxTimer -= dt;
        if (g.aiFxTimer <= 0) {
          g.aiFxTimer = 0.5;
          aiSpecials(g);
        }

        // Eliminations & outcome (team-aware)
        for (let pid = 0; pid < g.numPlayers; pid++) {
          if (g.eliminated.has(pid)) continue;
          const alive =
            g.towers.some((t) => t.owner === pid) ||
            g.units.some((u) => u.owner === pid) ||
            g.orders.some((o) => o.owner === pid && o.remaining > 0);
          if (!alive) {
            g.eliminated.add(pid);
            // Tutorial's closing step waits on this: the rival is beaten the
            // moment they hold nothing at all. Set on the elimination sweep
            // rather than in captureBuilding because taking the last CASTLE
            // isn't the same as elimination — troops still in flight or a
            // queued order keep a player alive for a beat afterwards, and the
            // step should only clear once they're genuinely gone.
            if (g.tutorial && pid !== 0) g.tutorialFlags.finished = true;
          }
        }
        const aliveTeams = new Set();
        for (let pid = 0; pid < g.numPlayers; pid++)
          if (!g.eliminated.has(pid)) aliveTeams.add(g.teams[pid]);
        const myTeam = g.teams[0];
        if (!g.tutorial && !aliveTeams.has(myTeam)) { g.over = true; setOutcome("lose"); SoundEngine.lose(); SoundEngine.stopBattle(); }
        // The tutorial deliberately does NOT end on a win: the player wiping out the
        // rival is the second-to-last STEP, and slamming the victory screen up here
        // would skip the wrap-up step entirely. The tutorial ends when the player
        // taps "Finish Tutorial" on that final overlay instead.
        else if (!g.tutorial && aliveTeams.size === 1) { g.over = true; setOutcome("win"); SoundEngine.win(); SoundEngine.stopBattle(); }

        // Tutorial: once the requested action is detected, hold the step open
        // for `settleFor` seconds so the player actually sees the effect (a
        // capture completing, a buff's full active window), then auto-pause
        // and advance to the next step (which may hand the player a fresh
        // resource via onEnter). Steps with no waitFor only advance via the
        // overlay's own Continue button, not here.
        if (g.tutorial) {
          const tStep = TUTORIAL_STEPS[tutorialStepRef.current];
          if (tStep && tStep.waitFor && g.tutorialFlags[tStep.waitFor]) {
            if (g.tutorialWaitStart == null) g.tutorialWaitStart = g.pulse;
            if (g.pulse - g.tutorialWaitStart >= (tStep.settleFor || 0)) {
              const next = tutorialStepRef.current + 1;
              if (TUTORIAL_STEPS[next]) { applyTutorialStep(g, next); setTutorialStep(next); }
              setPaused(true);
            }
          }
        }

        // Special "train" progress + effect animations
        if (g.trainProgress < trainMax()) g.trainProgress = Math.min(trainMax(), g.trainProgress + dt);
        for (let i = g.rings.length - 1; i >= 0; i--) {
          g.rings[i].life += dt;
          if (g.rings[i].life >= g.rings[i].dur) g.rings.splice(i, 1);
        }
        for (let i = g.slashes.length - 1; i >= 0; i--) {
          g.slashes[i].life += dt;
          if (g.slashes[i].life >= g.slashes[i].dur) g.slashes.splice(i, 1);
        }
      }

      draw(g);

      hudTimer += dt;
      if (hudTimer > 0.35) {
        hudTimer = 0;
        if (!g.over && !pausedRef.current) {
          SoundEngine.setBattleIntensity(g.battleHeat / BATTLE_HEAT_MAX);
        }
        const stats = [];
        for (let pid = 0; pid < g.numPlayers; pid++) {
          const mine = g.towers.filter((t) => t.owner === pid);
          const marching =
            g.units.filter((u) => u.owner === pid).length +
            g.orders.filter((o) => o.owner === pid).reduce((s, o) => s + o.remaining, 0);
          stats.push({
            pid,
            team: g.teams[pid],
            towers: mine.length,
            troops: Math.floor(mine.reduce((s, t) => s + t.troops, 0) + marching),
            dead: g.eliminated.has(pid),
            momentum: momentumMult(g, pid),
            trainPct: trainOf(g, pid) / trainMax(), // 0..1 — see the per-player mini loading bar in the standings row
          });
        }
        setHud(stats);
        syncSpecials(g);
      }
      raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => { cancelAnimationFrame(raf); SoundEngine.stopBattle(); };
  }, [screen]);

  // ================= Rendering =================
  // The troop counter for a castle. Drawn in its own pass AFTER every building,
  // so a tall castle in front can never paint over a counter behind it. The plate
  // sits just below the castle base; projected and scaled like the sprite.
  function drawGarrisonPlate(ctx, t, g) {
    const owned = t.owner !== NEUTRAL;
    const col = owned ? FACTIONS[t.owner].color : NEUTRAL_COLOR;
    const groundY = t.y + 14;                 // matches the sprite's base
    const B = proj(g, t.x, groundY + 17);     // project the plate's anchor point
    const s = B.s;
    ctx.save();
    ctx.translate(B.x, B.y);
    ctx.scale(s, s);
    const n = Math.floor(t.troops);
    ctx.font = "700 13px 'IBM Plex Mono', monospace";
    const plateW = ctx.measureText(n).width + 12;
    ctx.fillStyle = "rgba(10,14,24,0.9)";
    ctx.beginPath();
    ctx.roundRect(-plateW / 2, -9, plateW, 18, 5);
    ctx.fill();
    ctx.strokeStyle = t.troops > towerCapacity(t) ? col : "rgba(138,147,171,0.5)";
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = "#E8EBF2";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(n, 0, 0);
    ctx.restore();
  }

  function drawTowerSprite(ctx, t, g) {
    const owned = t.owner !== NEUTRAL;
    const col = owned ? FACTIONS[t.owner].color : NEUTRAL_COLOR;
    // Upright sprite at the projected base, scaled with zoom + depth
    const B = proj(g, t.x, t.y);
    ctx.save();
    ctx.translate(B.x, B.y);
    ctx.scale(B.s, B.s);
    ctx.translate(-t.x, -t.y);
    const x = t.x, y = t.y;
    const lvl = t.level || 1;

    // Per-level castle geometry — see CASTLE_LEVEL_CFG (shared with defenderPoint).
    const cfg = CASTLE_LEVEL_CFG[Math.min(lvl, 4)];
    const baseW = cfg.w;
    const turretW = 9;
    const keepW = baseW - turretW * 2 + 4;
    const groundY = y + 14;                 // fixed base; castle grows upward
    const turretTop = groundY - cfg.turretH;
    const keepTop = groundY - cfg.keepH;

    // The right turret is this castle's defense tower — when a Tower Defense
    // buff is active it visibly grows (not just recolors), so the buff reads
    // at a glance from across the map. Computed up here so the enlarged
    // turret is included in the castle's overall bounding box (totalH)
    // below. `boulder` mirrors the same styling logic drawWatchtowerSprite
    // uses for real towers, but is effectively dead here — Barrage (the
    // renamed, tower-only ability that sets `boulder`) never touches castles,
    // so this branch is kept only so the two sprites' buff-styling code stays
    // in sync if that ever changes.
    const def = t.defs && t.defs[0];
    const buff2 = def && def.rateMult === TOWER_DEF_RATE_MULT; // Tower Defense (+25% fire rate)
    const boulder = def && !!def.boulder;                       // Barrage (splash boulders) — see note above
    const buffed = buff2 || boulder;
    const fortified = fortifyMult(g, t) > 1; // Fortify — see METALLIC_COLORS comment above
    const rTurretW = turretW * (buffed ? 1.45 : 1);
    const rTurretH = cfg.turretH * (buffed ? 1.25 : 1);
    const rTurretTop = groundY - rTurretH;

    const totalH = Math.max(cfg.keepH, rTurretH) + (cfg.grand ? 12 : 0);
    const topY = groundY - totalH;
    const midY = groundY - totalH / 2;

    // Shrink the whole castle (and everything drawn relative to it below —
    // shadow, team ring, body, flags, drag/hover rings, upgrade dust) around
    // its ground point, so it still sits in the same spot in its region but
    // takes up less room where neighbouring castles' sprites would otherwise
    // start overlapping.
    ctx.translate(x, groundY);
    ctx.scale(CASTLE_SCALE, CASTLE_SCALE);
    ctx.translate(-x, -groundY);

    // Which local side is lit is derived from LIGHT_DIR.x, not hardcoded, so
    // castle shading stays locked to the same light source as the terrain and
    // the ground shadow — change LIGHT_DIR and these follow automatically.
    const litLeft = LIGHT_DIR.x < 0;
    const stone = (cxx, cw, top, ht, colors) => {
      const grad = ctx.createLinearGradient(cxx - cw / 2, 0, cxx + cw / 2, 0);
      let [c1, c2, c3] = colors || ["#6E7AA0", "#525d80", "#3b4463"];
      if (!litLeft) { [c1, c3] = [c3, c1]; }
      grad.addColorStop(0, c1); grad.addColorStop(0.55, c2); grad.addColorStop(1, c3);
      ctx.fillStyle = grad; ctx.fillRect(cxx - cw / 2, top, cw, ht);
    };
    const crenellate = (cxx, cw, top, color) => {
      ctx.fillStyle = color || "#6E7AA0"; const m = cw / 5;
      for (let i = 0; i < 3; i++) ctx.fillRect(cxx - cw / 2 + i * 2 * m, top - 4, m, 4);
    };
    const roofTop = (cxx, cw, top, hh) => {
      const grad = ctx.createLinearGradient(cxx - cw / 2, 0, cxx + cw / 2, 0);
      const [r1, r2] = litLeft ? ["#96604f", "#6b3f34"] : ["#6b3f34", "#96604f"];
      grad.addColorStop(0, r1); grad.addColorStop(1, r2);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(cxx - cw / 2 - 1, top); ctx.lineTo(cxx, top - hh); ctx.lineTo(cxx + cw / 2 + 1, top);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = "rgba(0,0,0,0.25)"; ctx.lineWidth = 1; ctx.stroke();
    };
    const win = (wx, wy, ww, wh) => {
      ctx.fillStyle = "#20263c"; ctx.fillRect(wx - ww / 2, wy, ww, wh);
      ctx.fillStyle = col; ctx.globalAlpha = 0.9; ctx.fillRect(wx - ww / 2 + 0.8, wy + 0.8, ww - 1.6, wh - 1.6); ctx.globalAlpha = 1;
    };
    const flag = (fx, fy, dir) => {
      ctx.strokeStyle = "#8a93ab"; ctx.lineWidth = 1.3;
      ctx.beginPath(); ctx.moveTo(fx, fy); ctx.lineTo(fx, fy - 12); ctx.stroke();
      ctx.fillStyle = col; ctx.beginPath();
      ctx.moveTo(fx, fy - 12); ctx.lineTo(fx + 9 * dir, fy - 9.5); ctx.lineTo(fx, fy - 7); ctx.closePath(); ctx.fill();
    };

    // Ground shadow — offset opposite LIGHT_DIR so it agrees with the terrain's
    // directional light instead of sitting perfectly centered under the castle.
    ctx.fillStyle = "rgba(0,0,0,0.35)";
    ctx.beginPath();
    ctx.ellipse(x - LIGHT_DIR.x * 6, groundY + 3 - LIGHT_DIR.y * 2, baseW * 0.72, 7, 0, 0, Math.PI * 2);
    ctx.fill();

    // Team ring (2v2 only) — independent of per-player faction color, so an
    // ally never reads as a foe just because their faction hue looks hostile.
    if (owned && g.mode === "2v2") {
      const myTeam = g.teams[0];
      const ringCol = g.teams[t.owner] === myTeam ? "#FFD23F" : "#E4534A";
      ctx.strokeStyle = ringCol;
      ctx.lineWidth = 2.4;
      ctx.beginPath();
      ctx.ellipse(x, groundY + 3, baseW * 0.72 + 5, 9.5, 0, 0, Math.PI * 2);
      ctx.stroke();
    }

    const lx = x - baseW / 2, rx = x + baseW / 2;
    const off = keepW * 0.28, blockW = keepW * 0.62;

    // Body / keep — metallic (see METALLIC_COLORS) when Fortify is active,
    // plain stone otherwise. `mc`/`mcCren` below are just shorthand so every
    // stone()/crenellate() call in this section doesn't need its own ternary.
    const mc = fortified ? METALLIC_COLORS : undefined;
    const mcCren = fortified ? METALLIC_CREN : undefined;
    if (cfg.wide) {
      if (cfg.grand) {
        // L4: one solid wide body + a raised central keep with roof
        stone(x, keepW + off * 2, keepTop, cfg.keepH, mc);
        crenellate(x - off, blockW, keepTop, mcCren);
        crenellate(x + off, blockW, keepTop, mcCren);
        const centTop = keepTop - 12, centW = blockW * 1.15;
        stone(x, centW, centTop, cfg.keepH + 12, mc);
        roofTop(x, centW, centTop, 15);
      } else {
        // L3: twin-block gatehouse with a roofed raised center block
        stone(x - off, blockW, keepTop, cfg.keepH, mc);
        stone(x + off, blockW, keepTop, cfg.keepH, mc);
        crenellate(x - off, blockW, keepTop, mcCren);
        crenellate(x + off, blockW, keepTop, mcCren);
        const centTop = keepTop - 6, centW = off * 1.7;
        stone(x, centW, centTop, groundY - centTop, mc);
        roofTop(x, centW, centTop, 12);
      }
    } else {
      stone(x, keepW, keepTop, cfg.keepH, mc);
      if (cfg.roof) roofTop(x, keepW, keepTop, 12);
      else crenellate(x, keepW, keepTop, mcCren);
    }

    // Right turret doubles as this castle's defense tower — there's no separate
    // structure floating elsewhere in the region anymore. An active buff isn't
    // just a small accent: the whole turret grows (rTurretW/H, set above) and
    // is fully recolored, plus a glow halo behind it, so the effect reads at a
    // glance instead of requiring a close look for a tinted window.
    const defMidY = rTurretTop + rTurretH * 0.42;
    if (boulder) {
      const pulseT = 0.5 + 0.5 * Math.sin(g.pulse * 6);
      const glowR = rTurretW * (2.4 + 0.6 * pulseT);
      const glow = ctx.createRadialGradient(rx, defMidY, 0, rx, defMidY, glowR);
      glow.addColorStop(0, `rgba(255,40,20,${0.36 + 0.16 * pulseT})`);
      glow.addColorStop(1, "rgba(255,40,20,0)");
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(rx, defMidY, glowR, 0, Math.PI * 2); ctx.fill();
    } else if (buff2) {
      const glowR = rTurretW * 1.9;
      const glow = ctx.createRadialGradient(rx, defMidY, 0, rx, defMidY, glowR);
      glow.addColorStop(0, "rgba(255,216,106,0.34)");
      glow.addColorStop(1, "rgba(255,216,106,0)");
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(rx, defMidY, glowR, 0, Math.PI * 2); ctx.fill();
    }

    // Left turret — plain stone, except metallic when Fortify is active (the
    // right turret is reserved for Tower Defense/Barrage's own buff coloring)
    stone(lx, turretW, turretTop, cfg.turretH, mc);
    crenellate(lx, turretW, turretTop, mcCren);

    // Right turret — dark scorched stone for boulder mode, gold for the 2x
    // fire-rate buff, plain stone otherwise. Crenellations match.
    const rColors = boulder ? ["#8A5A44", "#5A4438", "#3A2A22"] : buff2 ? ["#FFE38A", "#FFD86A", "#C98A2E"] : null;
    const rCren = boulder ? "#3A2A22" : buff2 ? "#FFD86A" : undefined;
    stone(rx, rTurretW, rTurretTop, rTurretH, rColors);
    crenellate(rx, rTurretW, rTurretTop, rCren);

    // Arrow slit on the right turret — ember glow while boulder mode is
    // active, otherwise faction color (buff2's gold already covers the whole
    // turret, so the slit there just stays faction-colored for contrast).
    if (boulder) {
      const slitGlow = ctx.createRadialGradient(rx, defMidY, 0, rx, defMidY, 6);
      slitGlow.addColorStop(0, "rgba(255,190,110,0.95)");
      slitGlow.addColorStop(0.6, "rgba(255,90,30,0.75)");
      slitGlow.addColorStop(1, "rgba(255,90,30,0)");
      ctx.fillStyle = slitGlow;
      ctx.beginPath(); ctx.arc(rx, defMidY, 6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#FFD8A0";
      ctx.fillRect(rx - 1.4, defMidY - 3.5, 2.8, 7);
    } else {
      ctx.fillStyle = col;
      ctx.fillRect(rx - 1.2, defMidY - 3, 2.4, 6);
    }

    // Windows per level
    if (lvl === 2) win(x, keepTop + cfg.keepH * 0.34, 4, cfg.keepH * 0.32);
    if (lvl === 3) { win(x - keepW * 0.2, keepTop + cfg.keepH * 0.34, 4, cfg.keepH * 0.3); win(x + keepW * 0.2, keepTop + cfg.keepH * 0.34, 4, cfg.keepH * 0.3); }
    if (lvl >= 4) win(x, keepTop - 12 + cfg.keepH * 0.34, 9, cfg.keepH * 0.4);

    // Arched gate in faction color
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(x - 5, groundY); ctx.lineTo(x - 5, groundY - 11);
    ctx.arc(x, groundY - 11, 5, Math.PI, 0);
    ctx.lineTo(x + 5, groundY); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,0.35)"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, groundY - 11); ctx.lineTo(x, groundY); ctx.stroke();

    // Flags: one per level, planted on flat stone or a roof apex (never a slope).
    // Positions are always generated FROM nFlags (never a hardcoded-length
    // array) — grand and wide shapes previously had their own fixed 4- and
    // 3-flag arrays, which was fine back when only one level ever used each
    // shape. Now that two levels can share "grand" (levels 3 and 4), a fixed
    // array meant level 3 wrongly showed 4 flags instead of 3 — reading as a
    // 5th level. Deriving positions from nFlags keeps "one flag per level"
    // true regardless of how many levels end up sharing a silhouette.
    const nFlags = Math.min(lvl, 4);
    const flagBaseAt = (fx) => {
      const d = Math.abs(fx - x);
      if (cfg.grand) return d > baseW * 0.4 ? turretTop : keepTop;
      if (cfg.wide) return d < 2 ? keepTop - 6 - 12 : keepTop;
      if (d > baseW * 0.32) return turretTop;
      if (cfg.roof) return keepTop - 12;
      return keepTop;
    };
    const spanFrac = cfg.grand ? 0.42 : cfg.wide ? 0.28 : 0.4;
    const span = baseW * spanFrac;
    const flagOffs = nFlags === 1 ? [0] : Array.from({ length: nFlags }, (_, i) => -span + (i / (nFlags - 1)) * span * 2);
    flagOffs.forEach((ox, i) => flag(x + ox, flagBaseAt(x + ox), i % 2 === 0 ? 1 : -1));

    // Build animation: while upgrading, a thick cloud of dust/smoke billows up
    // from the base and a warm "under construction" glow sweeps up the keep
    // (replaces the old loading ring).
    if (t.upgrading) {
      const bp = t.upgrading.time / t.upgrading.dur;
      ctx.save();
      ctx.beginPath(); ctx.rect(x - baseW / 2 - 2, topY - 4, baseW + 4, totalH + 18); ctx.clip();
      ctx.fillStyle = "rgba(255,214,120,0.12)";
      ctx.fillRect(x - keepW / 2, groundY - cfg.keepH * bp, keepW, cfg.keepH * bp);
      ctx.restore();
      // Dust/smoke plume: a small puff of dust rising and churning, each on its
      // own looping life. Kept deliberately modest — this is a background detail
      // during the 5s build, not the main event.
      const N = 6;
      for (let k = 0; k < N; k++) {
        const seed = k * 12.9898;
        const rnd = (o) => { const s = Math.sin(seed + o) * 43758.5453; return s - Math.floor(s); };
        const ph = (g.pulse * (0.45 + rnd(1) * 0.5) + rnd(2)) % 1;         // 0..1 life
        const sway = Math.sin(g.pulse * 2 + k) * (3 + ph * 5);             // drift as it rises
        const px = x + (rnd(3) - 0.5) * baseW * 0.5 + sway * (rnd(4) - 0.5) * 2;
        const py = groundY + 4 - ph * 30;                                  // small billow near the base
        const r = 3 + ph * (7 + rnd(5) * 5);                              // grow outward
        const a = 0.45 * (1 - ph * 0.85) * (0.55 + rnd(6) * 0.45);        // fades sooner
        // warm dust near the ground, cooler grey smoke higher up
        const g1 = 150 + (1 - ph) * 60, b1 = 118 + (1 - ph) * 34;
        ctx.fillStyle = `rgba(${(205 - ph * 45) | 0},${g1 | 0},${b1 | 0},${a})`;
        ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI * 2); ctx.fill();
      }

      // Hammer: a small silhouette bobbing up and down at the base, alongside
      // the dust, so the build reads unmistakably as "under construction"
      // rather than just smoke. One strike roughly every 0.4s, tucked to the
      // side so it doesn't sit on top of the gate.
      const strike = (g.pulse * 2.5) % 1;                    // 0..1, one swing cycle
      const lift = Math.sin(strike * Math.PI);                // 0 at the ground, 1 at the top of the swing
      const hx = x + keepW / 2 + 5;
      const hBaseY = groundY - 1;
      ctx.save();
      ctx.translate(hx, hBaseY - lift * 11);
      ctx.rotate(-0.5 * lift);                                 // tilts back as it lifts, forward as it strikes
      ctx.strokeStyle = "#8a6a4a"; ctx.lineWidth = 1.6;
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, 8); ctx.stroke();
      ctx.fillStyle = "#525d80";
      ctx.fillRect(-3.5, -2.5, 7, 4.5);
      ctx.restore();
    }

    // Drag source / drop target / hover rings (centered on the castle's height)
    const ringR = Math.max(baseW * 0.62, totalH * 0.55) + 8;
    const dragging = g.drag != null;
    if (dragging && g.drag.src === t.id) {
      const p = 2 + Math.sin(g.pulse * 5) * 1.5;
      ctx.strokeStyle = "#FFFFFF"; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(x, midY, ringR + p, 0, Math.PI * 2); ctx.stroke();
    } else if (dragging && g.hover === t.id) {
      ctx.strokeStyle = "rgba(255,255,255,0.9)"; ctx.lineWidth = 2;
      ctx.setLineDash([4, 4]);
      ctx.beginPath(); ctx.arc(x, midY, ringR, 0, Math.PI * 2); ctx.stroke();
      ctx.setLineDash([]);
    } else if (!dragging && g.hover === t.id && t.owner === 0) {
      ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(x, midY, ringR, 0, Math.PI * 2); ctx.stroke();
    }

    // Upgrade-ready hint on your castle (the build itself now shows the dust
    // animation drawn earlier, so no loading ring while upgrading).
    if (!t.upgrading && t.owner === 0 && canStartUpgrade(t)) {
      const pulse = 0.5 + 0.5 * Math.sin(g.pulse * 5);
      ctx.strokeStyle = `rgba(255,216,106,${0.5 + 0.4 * pulse})`;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(x, midY, ringR + 4 + pulse * 3, 0, Math.PI * 2); ctx.stroke();
      const ay = topY - 26;
      ctx.fillStyle = "#FFD86A";
      ctx.beginPath();
      ctx.moveTo(x, ay - 5); ctx.lineTo(x + 5, ay + 2); ctx.lineTo(x - 5, ay + 2);
      ctx.closePath(); ctx.fill();
    }

    // Hold-to-convert hint — only while hovering your own building (and not
    // mid-drag or mid-build), so it doesn't clutter the board otherwise.
    if (!t.upgrading && t.owner === 0 && !dragging && g.hover === t.id && canConvert(t)) {
      ctx.fillStyle = "rgba(255,255,255,0.85)";
      ctx.font = "600 10px 'Oxanium', sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("hold for convert-to-tower option", x, topY - 34);
    }
    ctx.restore();
  }

  // A watchtower: the standalone defensive building. Never regenerates troops,
  // but passively fires at hostiles in range (range grows with level — see
  // towerRange()). Deliberately a distinct silhouette from a castle (tall,
  // narrow, tapered) so the two building types read apart at a glance.
  function drawWatchtowerSprite(ctx, t, g) {
    const owned = t.owner !== NEUTRAL;
    const col = owned ? FACTIONS[t.owner].color : NEUTRAL_COLOR;
    const B = proj(g, t.x, t.y);
    ctx.save();
    ctx.translate(B.x, B.y);
    ctx.scale(B.s, B.s);
    ctx.translate(-t.x, -t.y);
    const x = t.x, y = t.y;
    const lvl = Math.min(t.level || 1, 4);
    const cfg = TOWER_CFG[lvl];
    const groundY = y + 14;

    const def = t.defs && t.defs[0];
    const buff2 = def && def.rateMult === TOWER_DEF_RATE_MULT;
    const boulder = def && !!def.boulder;
    const buffed = buff2 || boulder;
    // Towers have one shaft, not a castle's separate left/right turrets, so
    // there's no free slot to show both an offensive buff AND Fortify at
    // once — Tower Defense/Barrage's own coloring wins if a tower somehow
    // has both (same priority the castle sprite's right turret uses).
    const fortified = fortifyMult(g, t) > 1 && !buffed;
    const baseW = cfg.w * (buffed ? 1.2 : 1);
    const topW = baseW * 0.72;
    const h = cfg.h * (buffed ? 1.1 : 1);
    const topY = groundY - h;
    const midY = groundY - h / 2;

    ctx.translate(x, groundY);
    ctx.scale(CASTLE_SCALE, CASTLE_SCALE);
    ctx.translate(-x, -groundY);

    const litLeft = LIGHT_DIR.x < 0;

    // Ground shadow
    ctx.fillStyle = "rgba(0,0,0,0.35)";
    ctx.beginPath();
    ctx.ellipse(x - LIGHT_DIR.x * 5, groundY + 3 - LIGHT_DIR.y * 2, baseW * 0.85, 6, 0, 0, Math.PI * 2);
    ctx.fill();

    // Team ring (2v2 only)
    if (owned && g.mode === "2v2") {
      const myTeam = g.teams[0];
      const ringCol = g.teams[t.owner] === myTeam ? "#FFD23F" : "#E4534A";
      ctx.strokeStyle = ringCol; ctx.lineWidth = 2.4;
      ctx.beginPath(); ctx.ellipse(x, groundY + 3, baseW * 0.85 + 5, 8.5, 0, 0, Math.PI * 2); ctx.stroke();
    }

    // Buff glow — same idea as a castle's buffed turret: grows + glows so an
    // active buff reads at a glance across the map. Fortify gets a silver
    // glow when no offensive buff is overriding the shaft color (see
    // `fortified` above).
    if (buffed) {
      const glowR = baseW * (boulder ? 2.6 : 2.1);
      const glow = ctx.createRadialGradient(x, midY, 0, x, midY, glowR);
      if (boulder) { glow.addColorStop(0, "rgba(255,40,20,0.34)"); glow.addColorStop(1, "rgba(255,40,20,0)"); }
      else { glow.addColorStop(0, "rgba(255,216,106,0.3)"); glow.addColorStop(1, "rgba(255,216,106,0)"); }
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(x, midY, glowR, 0, Math.PI * 2); ctx.fill();
    } else if (fortified) {
      const glowR = baseW * 1.9;
      const glow = ctx.createRadialGradient(x, midY, 0, x, midY, glowR);
      glow.addColorStop(0, "rgba(200,214,236,0.32)");
      glow.addColorStop(1, "rgba(200,214,236,0)");
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(x, midY, glowR, 0, Math.PI * 2); ctx.fill();
    }

    // Tapered stone shaft — metallic (see METALLIC_COLORS) when Fortify is
    // active and no offensive buff is overriding it.
    const grad = ctx.createLinearGradient(x - baseW / 2, 0, x + baseW / 2, 0);
    let [c1, c2, c3] = boulder ? ["#8A5A44", "#5A4438", "#3A2A22"] : buff2 ? ["#FFE38A", "#FFD86A", "#C98A2E"] : fortified ? METALLIC_COLORS : ["#6E7AA0", "#525d80", "#3b4463"];
    if (!litLeft) { [c1, c3] = [c3, c1]; }
    grad.addColorStop(0, c1); grad.addColorStop(0.55, c2); grad.addColorStop(1, c3);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(x - baseW / 2, groundY);
    ctx.lineTo(x - topW / 2, topY);
    ctx.lineTo(x + topW / 2, topY);
    ctx.lineTo(x + baseW / 2, groundY);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,0.25)"; ctx.lineWidth = 1; ctx.stroke();

    // Crenellations at the top
    ctx.fillStyle = boulder ? "#3A2A22" : buff2 ? "#FFD86A" : fortified ? METALLIC_CREN : "#6E7AA0";
    const m = topW / 5;
    for (let i = 0; i < 3; i++) ctx.fillRect(x - topW / 2 + i * 2 * m, topY - 4, m, 4);

    // One narrow window per level, faction-lit
    for (let i = 0; i < lvl; i++) {
      const wy = groundY - 12 - i * ((h - 20) / Math.max(1, lvl));
      ctx.fillStyle = "#20263c"; ctx.fillRect(x - 2, wy - 3, 4, 6);
      ctx.fillStyle = col; ctx.globalAlpha = 0.9; ctx.fillRect(x - 1.4, wy - 2.2, 2.8, 4.4); ctx.globalAlpha = 1;
    }

    // Beacon at the apex — this is where defenderPoint() anchors, i.e. where
    // arrows/boulders actually originate from.
    const beaconY = topY - 2;
    if (boulder) {
      const slitGlow = ctx.createRadialGradient(x, beaconY, 0, x, beaconY, 7);
      slitGlow.addColorStop(0, "rgba(255,190,110,0.95)");
      slitGlow.addColorStop(0.6, "rgba(255,90,30,0.75)");
      slitGlow.addColorStop(1, "rgba(255,90,30,0)");
      ctx.fillStyle = slitGlow;
      ctx.beginPath(); ctx.arc(x, beaconY, 7, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.fillStyle = col;
      ctx.beginPath(); ctx.arc(x, beaconY, 3.2, 0, Math.PI * 2); ctx.fill();
    }

    // One flag per level
    const flagY = topY - 6;
    const flagOffs = lvl === 1 ? [0] : Array.from({ length: lvl }, (_, i) => -baseW * 0.3 + (i / (lvl - 1)) * baseW * 0.6);
    flagOffs.forEach((ox, i) => {
      const fx = x + ox, dir = i % 2 === 0 ? 1 : -1;
      ctx.strokeStyle = "#8a93ab"; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.moveTo(fx, flagY); ctx.lineTo(fx, flagY - 10); ctx.stroke();
      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.moveTo(fx, flagY - 10); ctx.lineTo(fx + 8 * dir, flagY - 7.7); ctx.lineTo(fx, flagY - 5.6);
      ctx.closePath(); ctx.fill();
    });

    // Upgrade build dust (condensed version of the castle's)
    if (t.upgrading) {
      const bp = t.upgrading.time / t.upgrading.dur;
      ctx.save();
      ctx.beginPath(); ctx.rect(x - baseW / 2 - 2, topY - 10, baseW + 4, h + 20); ctx.clip();
      ctx.fillStyle = "rgba(255,214,120,0.12)";
      ctx.fillRect(x - baseW / 2, groundY - h * bp, baseW, h * bp);
      ctx.restore();
      for (let k = 0; k < 5; k++) {
        const seed = k * 12.9898;
        const rnd = (o) => { const s = Math.sin(seed + o) * 43758.5453; return s - Math.floor(s); };
        const ph = (g.pulse * (0.45 + rnd(1) * 0.5) + rnd(2)) % 1;
        const sway = Math.sin(g.pulse * 2 + k) * (3 + ph * 5);
        const px = x + (rnd(3) - 0.5) * baseW * 0.6 + sway * (rnd(4) - 0.5) * 2;
        const py = groundY + 4 - ph * 26;
        const r = 3 + ph * (6 + rnd(5) * 4);
        const a = 0.45 * (1 - ph * 0.85) * (0.55 + rnd(6) * 0.45);
        const g1 = 150 + (1 - ph) * 60, b1 = 118 + (1 - ph) * 34;
        ctx.fillStyle = `rgba(${(205 - ph * 45) | 0},${g1 | 0},${b1 | 0},${a})`;
        ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI * 2); ctx.fill();
      }
    }

    // Drag source / drop target / hover rings
    const ringR = Math.max(baseW * 0.62, h * 0.55) + 8;
    const dragging = g.drag != null;
    if (dragging && g.drag.src === t.id) {
      const p = 2 + Math.sin(g.pulse * 5) * 1.5;
      ctx.strokeStyle = "#FFFFFF"; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(x, midY, ringR + p, 0, Math.PI * 2); ctx.stroke();
    } else if (dragging && g.hover === t.id) {
      ctx.strokeStyle = "rgba(255,255,255,0.9)"; ctx.lineWidth = 2;
      ctx.setLineDash([4, 4]);
      ctx.beginPath(); ctx.arc(x, midY, ringR, 0, Math.PI * 2); ctx.stroke();
      ctx.setLineDash([]);
    } else if (!dragging && g.hover === t.id && t.owner === 0) {
      ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(x, midY, ringR, 0, Math.PI * 2); ctx.stroke();
    }

    // Upgrade-ready hint
    if (!t.upgrading && t.owner === 0 && canStartUpgrade(t)) {
      const pulse = 0.5 + 0.5 * Math.sin(g.pulse * 5);
      ctx.strokeStyle = `rgba(255,216,106,${0.5 + 0.4 * pulse})`;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(x, midY, ringR + 4 + pulse * 3, 0, Math.PI * 2); ctx.stroke();
      const ay = topY - 20;
      ctx.fillStyle = "#FFD86A";
      ctx.beginPath();
      ctx.moveTo(x, ay - 5); ctx.lineTo(x + 5, ay + 2); ctx.lineTo(x - 5, ay + 2);
      ctx.closePath(); ctx.fill();
    }

    // Hold-to-convert hint
    if (!t.upgrading && t.owner === 0 && !dragging && g.hover === t.id && canConvert(t)) {
      ctx.fillStyle = "rgba(255,255,255,0.85)";
      ctx.font = "600 10px 'Oxanium', sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("hold for convert-to-castle option", x, topY - 34);
    }
    ctx.restore();
  }

  // Rising smoke puffs at the base of a castle currently under attack — purely
  // procedural (derived from g.pulse + tower id), no particle array to manage.
  // Several overlapping puffs loop continuously, drifting up and fading out.
  // Same churning-cloud algorithm as the castle upgrade dust plume (see
  // drawTowerSprite), just toned entirely grey instead of warm dust-to-smoke.
  function drawAttackSmoke(ctx, t, g) {
    const groundY = t.y + 14; // matches the castle sprite's base
    const B = proj(g, t.x, groundY);
    ctx.save();
    ctx.translate(B.x, B.y);
    ctx.scale(B.s, B.s);
    ctx.translate(-t.x, -groundY);

    const N = 30;
    const spread = 46; // rough stand-in for castle width, independent of level
    for (let k = 0; k < N; k++) {
      const seed = k * 12.9898 + t.id * 91.7;
      const rnd = (o) => { const s = Math.sin(seed + o) * 43758.5453; return s - Math.floor(s); };
      const ph = (g.pulse * (0.45 + rnd(1) * 0.5) + rnd(2)) % 1;      // 0..1 life
      const sway = Math.sin(g.pulse * 2 + k) * (5 + ph * 12);         // drift as it rises
      const px = t.x + (rnd(3) - 0.5) * spread + sway * (rnd(4) - 0.5) * 2;
      const py = groundY + 4 - ph * 46;                               // billow upward
      const r = 4 + ph * (11 + rnd(5) * 8);                           // grow outward
      const a = 0.6 * (1 - ph * 0.85) * (0.55 + rnd(6) * 0.45);       // stays thick longer
      const shade = 88 + rnd(7) * 26; // grey, mild per-puff variation
      ctx.fillStyle = `rgba(${shade | 0},${shade | 0},${(shade + 4) | 0},${a})`;
      ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }

  function draw(g) {
    const c = canvasRef.current;
    if (!c) return;
    const ctx = c.getContext("2d");
    const { W, H } = g;
    const P = (wx, wy) => proj(g, wx, wy);

    // Cached terrain base (organic noise + unified directional light + soft
    // AO along cell borders — see buildTerrainTexture). Falls back to a flat
    // fill for a stray frame before the first texture finishes building.
    if (g.terrainTex) {
      ctx.drawImage(g.terrainTex, 0, 0, W, H);
    } else {
      ctx.fillStyle = "#41547d";
      ctx.fillRect(0, 0, W, H);
    }

    const tracePoly = (cell) => {
      const p0 = P(cell[0].x, cell[0].y);
      ctx.beginPath();
      ctx.moveTo(p0.x, p0.y);
      for (let i = 1; i < cell.length; i++) {
        const pi = P(cell[i].x, cell[i].y);
        ctx.lineTo(pi.x, pi.y);
      }
      ctx.closePath();
    };

    // Territory regions (the board's top face)
    const dragSrc = g.drag ? g.drag.src : null;
    for (const t of g.towers) {
      if (t.cell.length < 3) continue;
      tracePoly(t.cell);
      ctx.fillStyle = t.owner === NEUTRAL ? NEUTRAL_FILL : FACTIONS[t.owner].fill;
      ctx.fill();

      // Highlight the region under the pointer and the one you're dragging from
      const isSrc = t.id === dragSrc;
      const isHover = g.hover === t.id && t.id !== dragSrc;
      if (isSrc) {
        ctx.fillStyle = "rgba(255,255,255,0.16)";
        ctx.fill();
      } else if (isHover) {
        ctx.fillStyle = "rgba(255,255,255,0.10)";
        ctx.fill();
      }

      // Flash the region white the instant hostile troops make contact with its
      // castle (set in unitArrives — reinforcement doesn't count, only combat).
      // Quick decay so a single hit reads as a sharp flash, not a glow; a
      // sustained attack re-triggers it on every arrival and reads as a flicker.
      if (t.underAttackFlashAt != null) {
        const since = g.pulse - t.underAttackFlashAt;
        if (since < REGION_FLASH_DUR) {
          ctx.fillStyle = `rgba(255,255,255,${(0.6 * (1 - since / REGION_FLASH_DUR)).toFixed(3)})`;
          ctx.fill();
        }
      }

      // Borders like a political map (brighter when highlighted)
      const hot = isSrc || isHover;
      ctx.strokeStyle = t.owner === NEUTRAL
        ? (hot ? "rgba(255,255,255,1)" : "rgba(255,255,255,0.7)")
        : FACTIONS[t.owner].color + (hot ? "FF" : "AA");
      ctx.lineWidth = hot ? 3 : 2;
      ctx.stroke();
    }


    // Range rings: a dashed circle around every tower-type building (they're
    // always armed), and around any castle currently under an active Tower
    // Defense buff (the special temporarily activates the same firing
    // behavior in it). Radius grows with level — see towerRange().
    for (const t of g.towers) {
      const def = t.defs && t.defs[0];
      const buffed = def && (def.rateMult === TOWER_DEF_RATE_MULT || def.boulder);
      if (t.type !== "tower" && !buffed) continue;
      const C = P(t.x, t.y);
      const r = towerRange(t) * C.s;
      ctx.save();
      ctx.strokeStyle = t.owner === NEUTRAL ? "rgba(255,255,255,0.35)" : FACTIONS[t.owner].color + "55";
      ctx.lineWidth = 1.4;
      ctx.setLineDash([5, 5]);
      ctx.beginPath();
      ctx.ellipse(C.x, C.y, r, r * TILT, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }

    // "This is you" ring — a pulsing yellow marching-ants circle around the
    // player's own castles, only for the first few seconds of a match, so it's
    // obvious at a glance which one is yours before the action starts.
    if (g.pulse < START_HIGHLIGHT_DURATION) {
      const fade = g.pulse > START_HIGHLIGHT_DURATION - 1 ? Math.max(0, START_HIGHLIGHT_DURATION - g.pulse) : 1;
      const pulseT = 0.5 + 0.5 * Math.sin(g.pulse * 5);
      for (const t of g.towers) {
        if (t.owner !== 0) continue;
        const C = P(t.x, t.y);
        const r = (30 + pulseT * 7) * C.s;
        ctx.save();
        ctx.globalAlpha = fade * (0.6 + 0.3 * pulseT);
        ctx.strokeStyle = "#FFD23F";
        ctx.lineWidth = 3;
        ctx.setLineDash([9, 7]);
        ctx.lineDashOffset = -g.pulse * 50; // marching-ants rotation
        ctx.beginPath();
        ctx.ellipse(C.x, C.y, r, r * TILT, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
    }

    // Drag arrow from the pressed tower to the pointer
    if (g.drag) {
      const s = g.towers[g.drag.src];
      const A = P(s.x, s.y);
      const B = P(g.drag.x, g.drag.y);
      const d = Math.hypot(B.x - A.x, B.y - A.y);
      if (d > 8) {
        const ux = (B.x - A.x) / d, uy = (B.y - A.y) / d;
        ctx.setLineDash([7, 7]);
        ctx.strokeStyle = "rgba(255,255,255,0.75)";
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(A.x, A.y); ctx.lineTo(B.x, B.y); ctx.stroke();
        ctx.setLineDash([]);
        // Arrowhead
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        ctx.beginPath();
        ctx.moveTo(B.x, B.y);
        ctx.lineTo(B.x - ux * 12 - uy * 6, B.y - uy * 12 + ux * 6);
        ctx.lineTo(B.x - ux * 12 + uy * 6, B.y - uy * 12 - ux * 6);
        ctx.closePath();
        ctx.fill();
      }
    }

    // Soldiers — tiny marching sprites facing their direction of travel.
    // Step frames are desynced per unit via uid/phase so the army doesn't
    // march in lockstep; the speed-boost glow stays on the ground beneath.
    for (const u of g.units) {
      const Q = P(u.x, u.y);
      // A Rolling Stone is drawn as an actual boulder below (replacing the
      // soldier sprite outright), and its speed buff is intrinsic to what it
      // is — so it deliberately skips the teal speed glow here, which would
      // otherwise read as a second, redundant effect stacked under the rock.
      if (u.speedMul && u.speedMul > 1 && !u.rollingStone) {
        ctx.fillStyle = "rgba(87,224,198,0.5)";
        ctx.beginPath();
        ctx.ellipse(Q.x, Q.y, 5.5 * Q.s, 5.5 * Q.s * TILT, 0, 0, Math.PI * 2);
        ctx.fill();
      } else if ((u.speedMul && u.speedMul < 1) || u.frozen) {
        // Slowed (Slow Down) or fully frozen (Frost — u.frozen, a separate flag
        // from speedMul, see castFrost) — deliberately a DASHED ring, not a
        // filled glow, so it reads as visually distinct from the speed-boost
        // effect above (shape difference, not just color) even at a glance or
        // for colorblind players. Frost intentionally reuses this same visual
        // rather than adding a second near-identical one.
        ctx.strokeStyle = "rgba(143,163,199,0.85)";
        ctx.lineWidth = Math.max(1, 1.3 * Q.s);
        ctx.setLineDash([2.5 * Q.s, 2.5 * Q.s]);
        ctx.beginPath();
        ctx.ellipse(Q.x, Q.y, 5.5 * Q.s, 5.5 * Q.s * TILT, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
      }
      if (u.rageBoosted) {
        // Rage (see castRage) — a solid, saturated red glow beneath the
        // sprite: the same "filled glow" language as Speed's teal one (both
        // are troop-strength/tempo buffs), color-distinct rather than shape-
        // distinct, which is what actually reads as "these troops turned
        // red" at a glance. Drawn as its own `if` (not chained into the
        // speed/slow branch above) so it can stack with any of the others —
        // possible in 2v2, since Rage/Speed/Rolling Stones are all
        // team-inclusive casts and could land on the same marching unit.
        ctx.fillStyle = "rgba(255,45,35,0.55)";
        ctx.beginPath();
        ctx.ellipse(Q.x, Q.y, 6 * Q.s, 6 * Q.s * TILT, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      const tgt = g.towers[u.dst];
      const flip = tgt ? tgt.x < u.x : false;
      let h;
      if (u.rollingStone) {
        // An actual rolling boulder, drawn in place of the soldier sprite —
        // the unit doesn't just get a marker, it visibly IS a stone now.
        const r = ROLLING_STONE_R * Q.s;
        h = r * 2;
        const cy = Q.y - r; // rest the rock ON the unit's ground point
        // Rotation is derived from remaining distance to the destination, which
        // decreases monotonically as the unit advances — so the rock always
        // rolls FORWARD, never jitters or reverses, and needs no per-unit state
        // to accumulate. Sign flips with travel direction so it rolls the way
        // it's actually going.
        const rem = tgt ? Math.hypot(tgt.x - u.x, tgt.y - u.y) : 0;
        const roll = (flip ? 1 : -1) * rem * 0.12;
        // Contact shadow on the ground, matching the soldier sprites' language.
        ctx.fillStyle = "rgba(0,0,0,0.28)";
        ctx.beginPath();
        ctx.ellipse(Q.x, Q.y, r * 0.95, r * 0.42 * TILT * 2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.save();
        ctx.translate(Q.x, cy);
        ctx.rotate(roll);
        // Body
        ctx.fillStyle = "#8C7A63";
        ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
        // Lit face, upper-left to match the map's shared LIGHT_DIR convention
        ctx.fillStyle = "rgba(255,247,230,0.22)";
        ctx.beginPath(); ctx.arc(-r * 0.32, -r * 0.36, r * 0.52, 0, Math.PI * 2); ctx.fill();
        // A couple of cracks/pits so the rotation actually reads as rolling —
        // a flat-shaded circle would look static no matter how fast it spun.
        ctx.strokeStyle = "rgba(58,48,38,0.55)";
        ctx.lineWidth = Math.max(1, 0.9 * Q.s);
        ctx.beginPath();
        ctx.moveTo(-r * 0.55, -r * 0.1); ctx.lineTo(-r * 0.05, r * 0.2);
        ctx.moveTo(r * 0.2, -r * 0.5); ctx.lineTo(r * 0.45, -r * 0.05);
        ctx.stroke();
        ctx.fillStyle = "rgba(58,48,38,0.4)";
        ctx.beginPath(); ctx.arc(r * 0.3, r * 0.35, r * 0.16, 0, Math.PI * 2); ctx.fill();
        // Faction rim — a stone still has to read as YOURS at a glance, which
        // the old grey diamond did via the sprite it sat under. Now that the
        // sprite is gone, the rim carries that job.
        ctx.strokeStyle = FACTIONS[u.owner].color;
        ctx.lineWidth = Math.max(1, 1.3 * Q.s);
        ctx.beginPath(); ctx.arc(0, 0, r * 0.94, 0, Math.PI * 2); ctx.stroke();
        ctx.restore();
      } else {
        const frame = (Math.floor(g.pulse * 9 + u.phase * 3) % 2 + 2) % 2;
        const bob = frame === 1 ? -0.5 * Q.s : 0;
        const w = SOLDIER_W * Q.s;
        h = SOLDIER_H * Q.s;
        ctx.drawImage(soldierSprite(u.owner, frame, flip), Q.x - w / 2, Q.y - h + bob, w, h);
      }
      if ((u.speedMul && u.speedMul < 1) || u.frozen) {
        // Small rotating frost sparkle above the head — a second, unmistakable cue on
        // top of the ring beneath, cheap to draw (a few strokes) and immune to the
        // sprite-tinting/compositing bleed risk a per-pixel overlay would have in a
        // crowd of overlapping units.
        const sx = Q.x, sy = Q.y - h - 3 * Q.s + Math.sin(g.pulse * 3 + u.phase * 5) * 1.5 * Q.s;
        const r = 2.4 * Q.s;
        ctx.strokeStyle = "rgba(191,227,255,0.9)";
        ctx.lineWidth = Math.max(1, Q.s);
        ctx.beginPath();
        for (let k = 0; k < 3; k++) {
          const ang = (Math.PI / 3) * k + g.pulse * 1.2;
          ctx.moveTo(sx - Math.cos(ang) * r, sy - Math.sin(ang) * r);
          ctx.lineTo(sx + Math.cos(ang) * r, sy + Math.sin(ang) * r);
        }
        ctx.stroke();
      }
    }

    // Arrows / boulders in flight
    for (const a of g.arrows) {
      const A = P(a.x, a.y);
      const T = P(a.lx, a.ly);
      const dx = T.x - A.x, dy = T.y - A.y;
      const d = Math.hypot(dx, dy) || 1;
      const ux = dx / d, uy = dy / d;
      if (a.boulder) {
        // A tumbling rock with a short dust trail — heavier and slower-reading than an arrow
        ctx.strokeStyle = "rgba(120,104,88,0.55)";
        ctx.lineWidth = 3 * A.s;
        ctx.beginPath();
        ctx.moveTo(A.x, A.y);
        ctx.lineTo(A.x - ux * 14 * A.s, A.y - uy * 14 * A.s);
        ctx.stroke();
        const r = 4.5 * A.s;
        const spin = (a.x + a.y) * 0.15;
        const rockGrad = ctx.createRadialGradient(A.x - r * 0.3, A.y - r * 0.3, 0, A.x, A.y, r);
        rockGrad.addColorStop(0, "#B0A08C");
        rockGrad.addColorStop(1, "#4A3F32");
        ctx.fillStyle = rockGrad;
        ctx.beginPath(); ctx.arc(A.x, A.y, r, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = "#2E2620";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(A.x + Math.cos(spin) * r * 0.5, A.y + Math.sin(spin) * r * 0.5);
        ctx.lineTo(A.x + Math.cos(spin + Math.PI) * r * 0.5, A.y + Math.sin(spin + Math.PI) * r * 0.5);
        ctx.stroke();
      } else {
        ctx.strokeStyle = "#F4E4B8";
        ctx.lineWidth = 1.5 * A.s;
        ctx.beginPath();
        ctx.moveTo(A.x, A.y);
        ctx.lineTo(A.x - ux * 7 * A.s, A.y - uy * 7 * A.s);
        ctx.stroke();
      }
    }

    // Impact puffs — soft expanding dust burst under the sparks, with a brief
    // bright flash on the impact frame. Drawn first so sparks pop on top.
    for (const pf of g.puffs) {
      const Q = P(pf.x, pf.y);
      const p = pf.age / pf.dur;
      const r = (pf.r * 0.35 + p * pf.r) * Q.s;
      const grad = ctx.createRadialGradient(Q.x, Q.y, 0, Q.x, Q.y, r);
      grad.addColorStop(0, `rgba(255,240,210,${(1 - p) * 0.5})`);
      grad.addColorStop(0.4, `rgba(210,200,190,${(1 - p) * 0.28})`);
      grad.addColorStop(1, "rgba(210,200,190,0)");
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.ellipse(Q.x, Q.y, r, r * TILT, 0, 0, Math.PI * 2);
      ctx.fill();
      if (p < 0.2) {
        ctx.fillStyle = `rgba(255,255,255,${(1 - p / 0.2) * 0.8})`;
        ctx.beginPath();
        ctx.ellipse(Q.x, Q.y, 7 * Q.s, 7 * Q.s * TILT, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Clash sparks
    for (const s of g.sparks) {
      const Q = P(s.x, s.y);
      const a = s.life / 0.45;
      ctx.globalAlpha = Math.max(0, a);
      ctx.fillStyle = s.color;
      ctx.beginPath();
      ctx.arc(Q.x, Q.y, (3 + (1 - a) * 6) * Q.s, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }


    // Special-cast rings — quick expanding pulse at each affected castle, flat on
    // the ground. Shared by Speed (cyan) and Tower Defense / 2.0 (gold).
    const RING_RADIUS = 70;
    for (const rg of g.rings) {
      const C = P(rg.x, rg.y);
      const p = rg.life / rg.dur;
      const rr = RING_RADIUS * C.s * (0.4 + 0.6 * p);
      const alpha = Math.round(0.8 * (1 - p) * 255).toString(16).padStart(2, "0");
      ctx.strokeStyle = rg.color + alpha;
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.ellipse(C.x, C.y, rr, rr * TILT, 0, 0, Math.PI * 2); ctx.stroke();
    }


    // Buildings — depth-sorted by world y so nearer sprites overlap farther ones.
    // The defense tower is drawn as part of the castle sprite now (see
    // drawTowerSprite's right turret), so there's just one entry per castle.
    const sprites = g.towers.map((t) => ({ wy: t.y, t }));
    sprites.sort((a, b) => a.wy - b.wy);
    for (const s of sprites) {
      if (s.t.type === "tower") drawWatchtowerSprite(ctx, s.t, g);
      else drawTowerSprite(ctx, s.t, g);
    }

    // Sabotage's ninja-sword slash — one cut across every enemy building it
    // hits, plus a literal ninja emoji popping up and rising alongside it
    // (see below) — so the debuff reads as a visible strike instead of just
    // numbers changing (see castSabotage, which pushes one of these per
    // enemy building on cast). Deliberately drawn AFTER the building sprites
    // above (was drawn before them originally, which meant the building
    // sprite rendered right on top and completely hid it — a bug fixed in
    // an earlier session) so it's always visible, on top of the building
    // it's hitting. Held at full brightness for the first 30% of its life,
    // then eases out — a pure (1-p)^2 fade from frame 0 read as barely-there
    // over such a short effect, so a brief hold makes it actually register
    // before it fades. A bright core stroke over a slightly wider dim one
    // gives the slash some blade thickness without needing actual sprite art.
    for (const sl of g.slashes) {
      const C = P(sl.x, sl.y);
      const p = sl.life / sl.dur;
      if (p >= 1) continue;
      const alpha = p < 0.3 ? 1 : Math.max(0, 1 - ((p - 0.3) / 0.7) ** 2);
      const len = 36 * C.s;
      const dx = Math.cos(sl.angle) * len, dy = Math.sin(sl.angle) * len * TILT;
      const midX = C.x, midY = C.y - 10 * C.s; // slight upward bow for a curved-blade arc
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.lineCap = "round";
      ctx.strokeStyle = "#DCE4F0";
      ctx.lineWidth = 3.5 * C.s;
      ctx.beginPath();
      ctx.moveTo(C.x - dx, C.y - dy);
      ctx.quadraticCurveTo(midX, midY, C.x + dx, C.y + dy);
      ctx.stroke();
      ctx.strokeStyle = "rgba(255,255,255,0.95)";
      ctx.lineWidth = 1.4 * C.s;
      ctx.stroke();
      ctx.restore();
      // A literal ninja pops up and rises above the building alongside the
      // slash — the blade streak alone read as abstract, this makes it
      // unmistakably "a ninja struck here." Rises as it fades (same alpha
      // curve as the slash) rather than staying pinned in place, for a
      // "leaping up and vanishing" read instead of a static icon.
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.font = `${16 * C.s}px sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("🥷", C.x, C.y - 14 * C.s - 18 * C.s * p);
      ctx.restore();
    }


    // Smoke at the base of any castle currently under attack — only once hostile
    // troops are actually at the walls, not while they're still marching in.
    for (const t of g.towers) {
      let attacked = false;
      for (const u of g.units) {
        if (u.dst === t.id && !sameTeam(g, u.owner, t.owner) && u.owner !== t.owner && dist(u, t) <= ATTACK_SMOKE_R) {
          attacked = true;
          break;
        }
      }
      if (attacked) drawAttackSmoke(ctx, t, g);
    }

    // Troop counters last, on top of every building — a taller castle in front
    // can never hide the counter of a castle behind it. Nearer plates (higher y)
    // draw over farther ones so overlapping counters still resolve sensibly.
    const plates = g.towers.slice().sort((a, b) => a.y - b.y);
    for (const t of plates) drawGarrisonPlate(ctx, t, g);

    // Any plate that visually falls inside the COMMIT % buttons' screen zone
    // gets redrawn onto the separate overlay canvas too (see overlayCanvasRef)
    // — that canvas paints AFTER the COMMIT bar in the DOM, so it appears on
    // top of the buttons, but has pointerEvents:none, so taps still pass
    // through to the real buttons underneath. Recomputes the same B/proj math
    // drawGarrisonPlate does internally rather than changing that function's
    // signature just for this.
    const oc = overlayCanvasRef.current;
    if (oc) {
      const octx = oc.getContext("2d");
      octx.clearRect(0, 0, W, H);
      for (const t of plates) {
        const B = proj(g, t.x, t.y + 14 + 17);
        if (B.y + 9 * B.s >= H - COMMIT_BAR_ZONE_H) drawGarrisonPlate(octx, t, g);
      }
    }
  }

  // ================= UI =================
  const chip = (base) => ({

          const noHero = !!(gameRef.current && gameRef.current.noAiHeroes);

          </div>

      })()}

      {/* Map area — the battlefield only; specials live in their own panel below */}
      <div ref={mapRef} style={{ position: "relative", flex: 1, minHeight: 0, overflow: "hidden" }}>
        <canvas

          onPointerUp={handleUp}
          onPointerCancel={handleCancel}
          onPointerLeave={handleCancel}

        {screen === "play" && convertConfirm && (
          <div

              transform: "translate(-50%, -100%)",
              zIndex: 60,
              background: "rgba(20,28,46,0.97)",
              border: "1px solid #3a4d72",
              borderRadius: 10,
              padding: "10px 12px",
              display: "flex", flexDirection: "column", gap: 8,
              boxShadow: "0 6px 20px rgba(0,0,0,0.45)",

      {screen === "menu" && (
        <div style={{
          position: "absolute", inset: 0,

          <div style={{

          <div style={{ maxWidth: 560, textAlign: "center" }}>
            <h1 style={{ fontSize: 46, fontWeight: 800, margin: "0 0 10px", letterSpacing: 1, color: "#1F2A44" }}>
              DOMIN<span style={{ color: "#D99A00" }}>ATION</span>

            <button

              style={chip({

            {showHelp && (

              const heroId = (gameRef.current && gameRef.current.heroes && gameRef.current.heroes[0]) || "tempo";
              const kit = (HEROES[heroId] || HEROES.tempo).kit;
              const specials = [1, 2, 3].map((tier) => {

              return [
                ...specials.map((s, i) => {
                  const start = i * TRAIN_STAGE;
                  const fillPct = Math.max(0, Math.min(100, ((fireInfo.trainProgress - start) / TRAIN_STAGE) * 100));
                  // Ready needs BOTH the train loaded AND this special's own cooldown
                  // clear. Show whichever is the binding constraint as the countdown.
                  const ready = s.secs <= 0 && s.cd <= 0;
                  const displaySecs = Math.max(s.secs, s.cd);
                  const onCooldown = s.secs <= 0 && s.cd > 0;
                  const pulsing = pulse[s.tier];
                  const shaking = shake[s.tier];
                  return (
                    <button key={s.kind} className="special" onClick={() => castPlayerSpecial(s.kind)}
                      style={{
                        position: "relative",
                        fontFamily: "'Oxanium', sans-serif",
                        flex: "1 1 0", minWidth: 0, minHeight: 36,

                        border: "none",
                        borderLeft: i > 0 ? "1px solid #3a4d72" : "none",
                        background: "#1c2942",
                        overflow: "hidden",
                        cursor: ready ? "pointer" : "default",
                        animation: shaking ? "specialDenied 0.3s ease-in-out" : pulsing ? "specialReady 0.6s ease-out" : "none",
                      }}>

                          "cooling down" read as visually distinct states. */}

                        position: "absolute", left: 0, top: 0, bottom: 0,
                        width: `${fillPct}%`,
                        background: ready ? s.readyBg : onCooldown ? "rgba(138,147,171,0.4)" : s.fillTint + "38",
                        transition: "width 0.1s linear, background 0.15s",
                      }} />
                      <div style={{
                        position: "relative",
                        display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
                        gap: 1, height: "100%", padding: "4px 6px",
                        color: ready ? s.readyTxt : onCooldown ? "#C7CCDA" : "#8a93ab",
                      }}>
                        <span style={{ fontSize: 14, lineHeight: 1 }}>{onCooldown ? "⏳" : s.icon}</span>
                        {ready ? (
                          <span style={{ fontSize: 11, fontWeight: 800 }}>{s.name}</span>
                        ) : (
                          <span style={{ display: "flex", flexDirection: "column", alignItems: "center", lineHeight: 1.2 }}>
                            <span style={{ fontSize: 11, fontWeight: 800 }}>{s.name}</span>
                            <span style={{ fontSize: 9, fontWeight: 700, opacity: 0.85 }}>{displaySecs}s</span>
                          </span>
                        )}
                      </div>
                    </button>
                  );
                }),
                (() => {
                  // 4th segment: pure reserve capacity, no special of its own. Fills
                  // from the 3rd special's threshold (3x TRAIN_STAGE) up to trainMax()
                  // (4x TRAIN_STAGE) — banking this is what lets you follow up Tower
                  // Defense with the Tier-1 ability right away instead of starting from
                  // empty. Expressed in stage multiples rather than literal seconds
                  // because TRAIN_STAGE is player-configurable (see SKILL TIMER).
                  // The reserve mechanic itself (fill behavior) is unchanged — only
                  // what's DISPLAYED on top of it changed: the player's own
                  // Momentum (renamed back from "Attack Strength" this session —
                  // now that momentum affects speed and defense again, not just
                  // attack damage, "Attack Strength" was no longer an accurate
                  // name) — pulled from `hud`'s pid-0 entry, same source the Top
                  // HUD's opponent pills already read from. Shown alongside the
                  // player's own troop count (also from that same `hud` entry).
                  const start = 3 * TRAIN_STAGE;
                  const fillPct = Math.max(0, Math.min(100, ((fireInfo.trainProgress - start) / TRAIN_STAGE) * 100));
                  const full = fillPct >= 100;
                  const mine = hud.find((h) => h.pid === 0);
                  const myTroops = mine ? mine.troops : 0;
                  const momPct = mine ? Math.round(mine.momentum * 100) : 100;
                  const momTint = momPct > 100 ? "#4ADE5A" : momPct < 100 ? "#FF6B6B" : (full ? "#C7CCDA" : "#8a93ab");
                  return (
                    <div key="reserve"
                      style={{
                        position: "relative",
                        fontFamily: "'Oxanium', sans-serif",
                        flex: "1 1 0", minWidth: 0, minHeight: 36,
                        borderLeft: "1px solid #3a4d72",
                        background: "#1c2942",
                        overflow: "hidden",
                      }}>
                      <div style={{
                        position: "absolute", left: 0, top: 0, bottom: 0,
                        width: `${fillPct}%`,
                        background: full ? "rgba(138,147,171,0.4)" : "rgba(138,147,171,0.22)",
                        transition: "width 0.1s linear, background 0.15s",
                      }} />
                      <div style={{
                        position: "relative",
                        display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
                        gap: 1, height: "100%", padding: "4px 6px",
                      }}>
                        <span style={{
                          display: "flex", alignItems: "center", gap: 3,
                          fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, fontWeight: 800,
                          lineHeight: 1, color: full ? "#E8EBF2" : "#C7CCDA",
                        }}>
                          <span style={{ fontSize: 10 }}>🪖</span>{myTroops}
                        </span>
                        <span style={{
                          fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 800,
                          lineHeight: 1, color: momTint,
                        }}>
                          {momPct}% MOM
                        </span>
                      </div>
                    </div>
                  );
                })(),
              ];
            })()}
          </div>
        </div>
      )}
    </div>
  );
}


const boot = document.getElementById('boot');
if (boot) boot.remove();
ReactDOM.createRoot(document.getElementById('root')).render(<TowerConquest />);
</script>
