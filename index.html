      const ringCol = g.teams[t.owner] === myTeam ? "#FFD23F" : "#E4534A";
      ctx.strokeStyle = ringCol;
      ctx.lineWidth = 2.4;
      ctx.beginPath();
      ctx.ellipse(x, groundY + 3, baseW * 0.72 + 5, 9.5, 0, 0, Math.PI * 2);
      ctx.stroke();
    }

    const lx = x - baseW / 2, rx = x + baseW / 2;
    const off = keepW * 0.28, blockW = keepW * 0.62;

    // Body / keep
    if (cfg.wide) {
      if (cfg.grand) {
        // L4: one solid wide body + a raised central keep with roof
        stone(x, keepW + off * 2, keepTop, cfg.keepH);
        crenellate(x - off, blockW, keepTop);
        crenellate(x + off, blockW, keepTop);
        const centTop = keepTop - 12, centW = blockW * 1.15;
        stone(x, centW, centTop, cfg.keepH + 12);
        roofTop(x, centW, centTop, 15);
      } else {
        // L3: twin-block gatehouse with a roofed raised center block
        stone(x - off, blockW, keepTop, cfg.keepH);
        stone(x + off, blockW, keepTop, cfg.keepH);
        crenellate(x - off, blockW, keepTop);
        crenellate(x + off, blockW, keepTop);
        const centTop = keepTop - 6, centW = off * 1.7;
        stone(x, centW, centTop, groundY - centTop);
        roofTop(x, centW, centTop, 12);
      }
    } else {
      stone(x, keepW, keepTop, cfg.keepH);
      if (cfg.roof) roofTop(x, keepW, keepTop, 12);
      else crenellate(x, keepW, keepTop);
    }

    // Flanking turrets
    stone(lx, turretW, turretTop, cfg.turretH);
    stone(rx, turretW, turretTop, cfg.turretH);
    crenellate(lx, turretW, turretTop); crenellate(rx, turretW, turretTop);

    // Windows per level
    if (lvl === 2) win(x, keepTop + cfg.keepH * 0.34, 4, cfg.keepH * 0.32);
    if (lvl === 3) { win(x - keepW * 0.2, keepTop + cfg.keepH * 0.34, 4, cfg.keepH * 0.3); win(x + keepW * 0.2, keepTop + cfg.keepH * 0.34, 4, cfg.keepH * 0.3); }
    if (lvl >= 4) win(x, keepTop - 12 + cfg.keepH * 0.34, 9, cfg.keepH * 0.4);

    // Arched gate in faction color
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(x - 5, groundY); ctx.lineTo(x - 5, groundY - 11);
    ctx.arc(x, groundY - 11, 5, Math.PI, 0);
    ctx.lineTo(x + 5, groundY); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,0.35)"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, groundY - 11); ctx.lineTo(x, groundY); ctx.stroke();

    // Flags: one per level, planted on flat stone or a roof apex (never a slope).
    const nFlags = Math.min(lvl, 4);
    const flagBaseAt = (fx) => {
      const d = Math.abs(fx - x);
      if (cfg.grand) return d > baseW * 0.4 ? turretTop : keepTop;
      if (cfg.wide) return d < 2 ? keepTop - 6 - 12 : keepTop;
      if (d > baseW * 0.32) return turretTop;
      if (cfg.roof) return keepTop - 12;
      return keepTop;
    };
    let flagOffs;
    if (cfg.grand) { const tX = baseW * 0.42, bX = baseW * 0.35; flagOffs = [-tX, -bX, bX, tX]; }
    else if (cfg.wide) { const sX = baseW * 0.28; flagOffs = [-sX, 0, sX]; }
    else if (nFlags === 1) flagOffs = [0];
    else { const s = baseW * 0.4; flagOffs = Array.from({ length: nFlags }, (_, i) => -s + (i / (nFlags - 1)) * s * 2); }
    flagOffs.forEach((ox, i) => flag(x + ox, flagBaseAt(x + ox), i % 2 === 0 ? 1 : -1));

    // Build animation: while upgrading, a thick cloud of dust/smoke billows up
    // from the base and a warm "under construction" glow sweeps up the keep
    // (replaces the old loading ring).
    if (t.upgrading) {
      const bp = t.upgrading.time / t.upgrading.dur;
      ctx.save();
      ctx.beginPath(); ctx.rect(x - baseW / 2 - 2, topY - 4, baseW + 4, totalH + 18); ctx.clip();
      ctx.fillStyle = "rgba(255,214,120,0.12)";
      ctx.fillRect(x - keepW / 2, groundY - cfg.keepH * bp, keepW, cfg.keepH * bp);
      ctx.restore();
      // Dust/smoke plume: a small puff of dust rising and churning, each on its
      // own looping life. Kept deliberately modest — this is a background detail
      // during the 5s build, not the main event.
      const N = 6;
      for (let k = 0; k < N; k++) {
        const seed = k * 12.9898;
        const rnd = (o) => { const s = Math.sin(seed + o) * 43758.5453; return s - Math.floor(s); };
        const ph = (g.pulse * (0.45 + rnd(1) * 0.5) + rnd(2)) % 1;         // 0..1 life
        const sway = Math.sin(g.pulse * 2 + k) * (3 + ph * 5);             // drift as it rises
        const px = x + (rnd(3) - 0.5) * baseW * 0.5 + sway * (rnd(4) - 0.5) * 2;
        const py = groundY + 4 - ph * 30;                                  // small billow near the base
        const r = 3 + ph * (7 + rnd(5) * 5);                              // grow outward
        const a = 0.45 * (1 - ph * 0.85) * (0.55 + rnd(6) * 0.45);        // fades sooner
        // warm dust near the ground, cooler grey smoke higher up
        const g1 = 150 + (1 - ph) * 60, b1 = 118 + (1 - ph) * 34;
        ctx.fillStyle = `rgba(${(205 - ph * 45) | 0},${g1 | 0},${b1 | 0},${a})`;
        ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI * 2); ctx.fill();
      }
    }

    // Drag source / drop target / hover rings (centered on the castle's height)
    const ringR = Math.max(baseW * 0.62, totalH * 0.55) + 8;
    const dragging = g.drag != null;
    if (dragging && g.drag.src === t.id) {
      const p = 2 + Math.sin(g.pulse * 5) * 1.5;
      ctx.strokeStyle = "#FFFFFF"; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(x, midY, ringR + p, 0, Math.PI * 2); ctx.stroke();
    } else if (dragging && g.hover === t.id) {
      ctx.strokeStyle = "rgba(255,255,255,0.9)"; ctx.lineWidth = 2;
      ctx.setLineDash([4, 4]);
      ctx.beginPath(); ctx.arc(x, midY, ringR, 0, Math.PI * 2); ctx.stroke();
      ctx.setLineDash([]);
    } else if (!dragging && g.hover === t.id && t.owner === 0) {
      ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(x, midY, ringR, 0, Math.PI * 2); ctx.stroke();
    }

    // Upgrade-ready hint on your castle (the build itself now shows the dust
    // animation drawn earlier, so no loading ring while upgrading).
    if (!t.upgrading && t.owner === 0 && canStartUpgrade(t)) {
      const pulse = 0.5 + 0.5 * Math.sin(g.pulse * 5);
      ctx.strokeStyle = `rgba(255,216,106,${0.5 + 0.4 * pulse})`;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(x, midY, ringR + 4 + pulse * 3, 0, Math.PI * 2); ctx.stroke();
      const ay = topY - 26;
      ctx.fillStyle = "#FFD86A";
      ctx.beginPath();
      ctx.moveTo(x, ay - 5); ctx.lineTo(x + 5, ay + 2); ctx.lineTo(x - 5, ay + 2);
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();
  }

  // Rising smoke puffs at the base of a castle currently under attack — purely
  // procedural (derived from g.pulse + tower id), no particle array to manage.
  // Several overlapping puffs loop continuously, drifting up and fading out.
  // Same churning-cloud algorithm as the castle upgrade dust plume (see
  // drawTowerSprite), just toned entirely grey instead of warm dust-to-smoke.
  function drawAttackSmoke(ctx, t, g) {
    const groundY = t.y + 14; // matches the castle sprite's base
    const B = proj(g, t.x, groundY);
    ctx.save();
    ctx.translate(B.x, B.y);
    ctx.scale(B.s, B.s);
    ctx.translate(-t.x, -groundY);

    const N = 30;
    const spread = 46; // rough stand-in for castle width, independent of level
    for (let k = 0; k < N; k++) {
      const seed = k * 12.9898 + t.id * 91.7;
      const rnd = (o) => { const s = Math.sin(seed + o) * 43758.5453; return s - Math.floor(s); };
      const ph = (g.pulse * (0.45 + rnd(1) * 0.5) + rnd(2)) % 1;      // 0..1 life
      const sway = Math.sin(g.pulse * 2 + k) * (5 + ph * 12);         // drift as it rises
      const px = t.x + (rnd(3) - 0.5) * spread + sway * (rnd(4) - 0.5) * 2;
      const py = groundY + 4 - ph * 46;                               // billow upward
      const r = 4 + ph * (11 + rnd(5) * 8);                           // grow outward
      const a = 0.6 * (1 - ph * 0.85) * (0.55 + rnd(6) * 0.45);       // stays thick longer
      const shade = 88 + rnd(7) * 26; // grey, mild per-puff variation
      ctx.fillStyle = `rgba(${shade | 0},${shade | 0},${(shade + 4) | 0},${a})`;
      ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }

  function draw(g) {
    const c = canvasRef.current;
    if (!c) return;
    const ctx = c.getContext("2d");
    const { W, H } = g;
    const P = (wx, wy) => proj(g, wx, wy);

    // The camera is clamped inside the board, so no "outside" is ever visible.
    // A flat base fill remains only as a safety net against sub-pixel seams.
    ctx.fillStyle = "#41547d";
    ctx.fillRect(0, 0, W, H);

    const tracePoly = (cell) => {
      const p0 = P(cell[0].x, cell[0].y);
      ctx.beginPath();
      ctx.moveTo(p0.x, p0.y);
      for (let i = 1; i < cell.length; i++) {
        const pi = P(cell[i].x, cell[i].y);
        ctx.lineTo(pi.x, pi.y);
      }
      ctx.closePath();
    };

    // Territory regions (the board's top face)
    const dragSrc = g.drag ? g.drag.src : null;
    for (const t of g.towers) {
      if (t.cell.length < 3) continue;
      tracePoly(t.cell);
      ctx.fillStyle = "#41547d";
      ctx.fill();
      ctx.fillStyle = t.owner === NEUTRAL ? NEUTRAL_FILL : FACTIONS[t.owner].fill;
      ctx.fill();

      // Highlight the region under the pointer and the one you're dragging from
      const isSrc = t.id === dragSrc;
      const isHover = g.hover === t.id && t.id !== dragSrc;
      if (isSrc) {
        ctx.fillStyle = "rgba(255,255,255,0.16)";
        ctx.fill();
      } else if (isHover) {
        ctx.fillStyle = "rgba(255,255,255,0.10)";
        ctx.fill();
      }

      // Borders like a political map (brighter when highlighted)
      const hot = isSrc || isHover;
      ctx.strokeStyle = t.owner === NEUTRAL
        ? (hot ? "rgba(255,255,255,1)" : "rgba(255,255,255,0.7)")
        : FACTIONS[t.owner].color + (hot ? "FF" : "AA");
      ctx.lineWidth = hot ? 3 : 2;
      ctx.stroke();
    }

    // Subtle hatching for texture (screen-space is fine)
    ctx.strokeStyle = "rgba(255,255,255,0.03)";
    ctx.lineWidth = 1;
    for (let x = -H; x < W; x += 26) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x + H, H); ctx.stroke();
    }

    // Arrow-tower coverage rings — a true circle centered on the castle itself
    for (const t of g.towers) {
      if (!t.defs || !t.defs.length) continue;
      const C = P(t.x, t.y);
      const lvl = t.level || 1;
      const ringA = Math.min(0x66, 0x22 + (lvl - 1) * 0x10);
      const col = t.owner === NEUTRAL ? NEUTRAL_COLOR : FACTIONS[t.owner].color;
      ctx.strokeStyle = col + ringA.toString(16).padStart(2, "0");
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(C.x, C.y, ARROW_RANGE * C.s, 0, Math.PI * 2);
      ctx.stroke();
    }

    // "This is you" ring — a pulsing yellow marching-ants circle around the
    // player's own castles, only for the first few seconds of a match, so it's
    // obvious at a glance which one is yours before the action starts.
    if (g.pulse < START_HIGHLIGHT_DURATION) {
      const fade = g.pulse > START_HIGHLIGHT_DURATION - 1 ? Math.max(0, START_HIGHLIGHT_DURATION - g.pulse) : 1;
      const pulseT = 0.5 + 0.5 * Math.sin(g.pulse * 5);
      for (const t of g.towers) {
        if (t.owner !== 0) continue;
        const C = P(t.x, t.y);
        const r = (30 + pulseT * 7) * C.s;
        ctx.save();
        ctx.globalAlpha = fade * (0.6 + 0.3 * pulseT);
        ctx.strokeStyle = "#FFD23F";
        ctx.lineWidth = 3;
        ctx.setLineDash([9, 7]);
        ctx.lineDashOffset = -g.pulse * 50; // marching-ants rotation
        ctx.beginPath();
        ctx.ellipse(C.x, C.y, r, r * TILT, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
    }

    // Drag arrow from the pressed tower to the pointer
    if (g.drag) {
      const s = g.towers[g.drag.src];
      const A = P(s.x, s.y);
      const B = P(g.drag.x, g.drag.y);
      const d = Math.hypot(B.x - A.x, B.y - A.y);
      if (d > 8) {
        const ux = (B.x - A.x) / d, uy = (B.y - A.y) / d;
        ctx.setLineDash([7, 7]);
        ctx.strokeStyle = "rgba(255,255,255,0.75)";
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(A.x, A.y); ctx.lineTo(B.x, B.y); ctx.stroke();
        ctx.setLineDash([]);
        // Arrowhead
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        ctx.beginPath();
        ctx.moveTo(B.x, B.y);
        ctx.lineTo(B.x - ux * 12 - uy * 6, B.y - uy * 12 + ux * 6);
        ctx.lineTo(B.x - ux * 12 + uy * 6, B.y - uy * 12 - ux * 6);
        ctx.closePath();
        ctx.fill();
      }
    }

    // Soldiers — tiny marching sprites facing their direction of travel.
    // Step frames are desynced per unit via uid/phase so the army doesn't
    // march in lockstep; the speed-boost glow stays on the ground beneath.
    for (const u of g.units) {
      const Q = P(u.x, u.y);
      if (u.speedMul && u.speedMul > 1) {
        ctx.fillStyle = "rgba(87,224,198,0.5)";
        ctx.beginPath();
        ctx.ellipse(Q.x, Q.y, 5.5 * Q.s, 5.5 * Q.s * TILT, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      const tgt = g.towers[u.dst];
      const flip = tgt ? tgt.x < u.x : false;
      const frame = (Math.floor(g.pulse * 9 + u.phase * 3) % 2 + 2) % 2;
      const bob = frame === 1 ? -0.5 * Q.s : 0;
      const w = SOLDIER_W * Q.s, h = SOLDIER_H * Q.s;
      ctx.drawImage(soldierSprite(u.owner, frame, flip), Q.x - w / 2, Q.y - h + bob, w, h);
    }

    // Arrows / boulders in flight
    for (const a of g.arrows) {
      const A = P(a.x, a.y);
      const T = P(a.lx, a.ly);
      const dx = T.x - A.x, dy = T.y - A.y;
      const d = Math.hypot(dx, dy) || 1;
      const ux = dx / d, uy = dy / d;
      if (a.boulder) {
        // A tumbling rock with a short dust trail — heavier and slower-reading than an arrow
        ctx.strokeStyle = "rgba(120,104,88,0.55)";
        ctx.lineWidth = 3 * A.s;
        ctx.beginPath();
        ctx.moveTo(A.x, A.y);
        ctx.lineTo(A.x - ux * 14 * A.s, A.y - uy * 14 * A.s);
        ctx.stroke();
        const r = 4.5 * A.s;
        const spin = (a.x + a.y) * 0.15;
        const rockGrad = ctx.createRadialGradient(A.x - r * 0.3, A.y - r * 0.3, 0, A.x, A.y, r);
        rockGrad.addColorStop(0, "#B0A08C");
        rockGrad.addColorStop(1, "#4A3F32");
        ctx.fillStyle = rockGrad;
        ctx.beginPath(); ctx.arc(A.x, A.y, r, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = "#2E2620";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(A.x + Math.cos(spin) * r * 0.5, A.y + Math.sin(spin) * r * 0.5);
        ctx.lineTo(A.x + Math.cos(spin + Math.PI) * r * 0.5, A.y + Math.sin(spin + Math.PI) * r * 0.5);
        ctx.stroke();
      } else {
        ctx.strokeStyle = "#F4E4B8";
        ctx.lineWidth = 1.5 * A.s;
        ctx.beginPath();
        ctx.moveTo(A.x, A.y);
        ctx.lineTo(A.x - ux * 7 * A.s, A.y - uy * 7 * A.s);
        ctx.stroke();
      }
    }

    // Clash sparks
    for (const s of g.sparks) {
      const Q = P(s.x, s.y);
      const a = s.life / 0.45;
      ctx.globalAlpha = Math.max(0, a);
      ctx.fillStyle = s.color;
      ctx.beginPath();
      ctx.arc(Q.x, Q.y, (3 + (1 - a) * 6) * Q.s, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }


    // Special-cast rings — quick expanding pulse at each affected castle, flat on
    // the ground. Shared by Speed (cyan) and Tower Defense / 2.0 (gold).
    const RING_RADIUS = 70;
    for (const rg of g.rings) {
      const C = P(rg.x, rg.y);
      const p = rg.life / rg.dur;
      const rr = RING_RADIUS * C.s * (0.4 + 0.6 * p);
      const alpha = Math.round(0.8 * (1 - p) * 255).toString(16).padStart(2, "0");
      ctx.strokeStyle = rg.color + alpha;
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.ellipse(C.x, C.y, rr, rr * TILT, 0, 0, Math.PI * 2); ctx.stroke();
    }


    // Buildings — depth-sorted by world y so nearer sprites overlap farther ones
    const sprites = [];
    for (const t of g.towers) {
      if (t.defs) for (const d of t.defs) sprites.push({ wy: d.y, def: true, t, d });
      sprites.push({ wy: t.y, def: false, t });
    }
    sprites.sort((a, b) => a.wy - b.wy);
    for (const s of sprites) {
      if (s.def) drawDefenseTower(ctx, s.t, s.d, g);
      else drawTowerSprite(ctx, s.t, g);
    }

    // Smoke at the base of any castle currently under attack — only once hostile
    // troops are actually at the walls, not while they're still marching in.
    for (const t of g.towers) {
      let attacked = false;
      for (const u of g.units) {
        if (u.dst === t.id && !sameTeam(g, u.owner, t.owner) && u.owner !== t.owner && dist(u, t) <= ATTACK_SMOKE_R) {
          attacked = true;
          break;
        }
      }
      if (attacked) drawAttackSmoke(ctx, t, g);
    }

    // Troop counters last, on top of every building — a taller castle in front
    // can never hide the counter of a castle behind it. Nearer plates (higher y)
    // draw over farther ones so overlapping counters still resolve sensibly.
    const plates = g.towers.slice().sort((a, b) => a.y - b.y);
    for (const t of plates) drawGarrisonPlate(ctx, t, g);
  }

  // ================= UI =================
  const chip = (base) => ({
    fontFamily: "'Oxanium', sans-serif",
    background: "rgba(34,48,77,0.85)",
    border: "1px solid #3a4d72",
    color: "#E8EBF2",
    borderRadius: 8,
    padding: "10px 18px",
    fontSize: 15,
    cursor: "pointer",
    backdropFilter: "blur(4px)",
    ...base,
  });

  return (
    <div ref={wrapRef} style={{
      position: "fixed", inset: 0, background: "#1c2942", color: "#EEF2FA",
      fontFamily: "'Oxanium', sans-serif", overflow: "hidden",
      display: "flex", flexDirection: "column",
    }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;800&family=IBM+Plex+Mono:wght@400;600;700&display=swap');
        html, body {
          overflow: hidden !important;
          overscroll-behavior: none !important;
          touch-action: none !important;
          position: fixed;
          inset: 0;
          width: 100%;
          height: 100%;
        }
        * { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
        button:not(.special):hover { border-color: #FFD23F !important; }
        button.special:hover { filter: brightness(1.12); }
        button:focus-visible { outline: 2px solid #FFD23F; outline-offset: 2px; }
      `}</style>

      {/* Map area — the battlefield only; specials live in their own panel below */}
      <div ref={mapRef} style={{ position: "relative", flex: 1, minHeight: 0, overflow: "hidden" }}>
        <canvas
          ref={canvasRef}
          onPointerDown={handleDown}
          onPointerMove={handleMove}
          onPointerUp={handleUp}
          onPointerCancel={handleCancel}
          onPointerLeave={handleCancel}
          style={{ position: "absolute", inset: 0, cursor: "crosshair", touchAction: "none" }}
        />

      {screen === "menu" && (
        <div style={{
          position: "absolute", inset: 0,
          overflowY: "auto", WebkitOverflowScrolling: "touch", touchAction: "pan-y",
          background: "rgba(24,35,58,0.94)",
        }}>
          <div style={{
            position: "absolute", bottom: 10, right: 14,
            fontSize: 11, letterSpacing: 1, color: "#4a5570",
            fontFamily: "'IBM Plex Mono', monospace",
          }}>
            v{APP_VERSION}
          </div>
          <div style={{
            minHeight: "100%", boxSizing: "border-box",
            display: "flex", alignItems: "center", justifyContent: "center",
            padding: "32px 20px",
          }}>
          <div style={{ maxWidth: 560, textAlign: "center" }}>
            <h1 style={{ fontSize: 46, fontWeight: 800, margin: "0 0 10px", letterSpacing: 1 }}>
              DOMIN<span style={{ color: "#FFD23F" }}>ATION</span>
            </h1>
            <button
              onClick={() => { SoundEngine.click(); setShowHelp(true); }}
              style={chip({
                marginTop: 6,
                padding: "6px 14px",
                fontSize: 13,
                letterSpacing: 1,
                color: "#8a93ab",
                borderColor: "#3a4d72",
              })}>
              How to play
            </button>

            {showHelp && (
              <div onClick={() => setShowHelp(false)}
                style={{
                  position: "fixed", inset: 0, zIndex: 100,
                  background: "rgba(6,9,16,0.75)", backdropFilter: "blur(2px)",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  padding: 20,
                }}>
                <div onClick={(e) => e.stopPropagation()}
                  style={{
                    background: "#182238", border: "1px solid #3a4d72", borderRadius: 14,
                    padding: 24, maxWidth: 480, maxHeight: "80vh", overflowY: "auto",
                    boxShadow: "0 12px 40px rgba(0,0,0,0.5)", textAlign: "left",
                  }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
                    <div style={{ fontSize: 17, fontWeight: 800, color: "#E8EEF9" }}>How to play</div>
                    <button onClick={() => setShowHelp(false)}
                      style={{ background: "none", border: "none", color: "#8a93ab", fontSize: 20, cursor: "pointer", lineHeight: 1 }}>
                      ✕
                    </button>

                  <ul style={{
                    color: "#8a93ab", lineHeight: 1.6, fontSize: 15,

                    <li>Drag from your region to any territory to send troops.</li>

                    <li>Castles hold up to 10 troops. Double-tap a full castle to upgrade it: costs half its troops, adds +10 capacity, and speeds up regen and firing.</li>

                    <li>Everyone starts even. Take every rival's last castle to win.</li>

            <div style={{ display: "flex", gap: 32, justifyContent: "center", marginTop: 26, flexWrap: "wrap" }}>

                    <button key={m} onClick={() => setMode(m)}

      {screen === "play" && (

          {/* Top HUD */}

              <button onClick={() => { SoundEngine.click(); setMenuOpen(false); setShowPlayers((v) => !v); }}
                title="Show players" aria-label="Show players"
                style={chip({

              <button onClick={() => { setShowPlayers(false); setMenuOpen((v) => !v); }}
                style={chip({

                    {(() => {

                      if (gameRef.current?.mode !== "2v2") return grid(hud);

                      const myTeam = hud.find((s) => s.pid === 0)?.team ?? 0;
                      return [myTeam, myTeam === 0 ? 1 : 0].map((teamId, idx) => (
                        <React.Fragment key={teamId}>

                          <div style={{

                            border: `1px solid ${teamId === myTeam ? "rgba(255,210,63,0.4)" : "rgba(228,83,74,0.35)"}`,
                          }}>

                              fontSize: 10, letterSpacing: 1, fontWeight: 700,
                              color: teamId === myTeam ? "#FFD23F" : "#E4534A", padding: "0 2px",
                            }}>
                              {teamId === myTeam ? "YOUR TEAM" : "ENEMY"}

                        </React.Fragment>
                      ));
                    })()}
                  </div>
                </>
              )}

              {menuOpen && (
                <>
                  {/* Tap outside to close */}
                  <div onClick={() => setMenuOpen(false)}
                    style={{ position: "fixed", inset: 0, zIndex: 40 }} />
                  <div style={{
                    position: "absolute", top: "115%", left: 0, zIndex: 50,
                    display: "flex", flexDirection: "column", gap: 6,
                    background: "#1c2942", border: "1px solid #3a4d72", borderRadius: 10,
                    padding: 8, minWidth: 150,
                    boxShadow: "0 8px 20px rgba(0,0,0,0.35)",
                  }}>
                    <button onClick={() => { SoundEngine.click(); setSoundOn((s) => !s); }}
                      style={chip({ padding: "8px 12px", fontSize: 13, textAlign: "left", width: "100%" })}>
                      {soundOn ? "🔊 Sound: On" : "🔇 Sound: Off"}
                    </button>
                    <button onClick={() => { SoundEngine.click(); setMenuOpen(false); setScreen("menu"); }}
                      style={chip({ padding: "8px 12px", fontSize: 13, textAlign: "left", width: "100%" })}>
                      🗺️ New map
                    </button>
                  </div>
                </>
              )}
            </div>
          </div>

          {/* Paused overlay (regular games only — tutorial has its own below) */}
          {paused && !outcome && !gameRef.current?.tutorial && (
            <div style={{
              position: "absolute", inset: 0,
              display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
              gap: 14, background: "rgba(10,14,24,0.72)", backdropFilter: "blur(2px)",
            }}
              onClick={() => setPaused(false)}
            >
              <div style={{ fontSize: 26, fontWeight: 800, letterSpacing: 3, color: "#E8EEF9" }}>PAUSED</div>
              <button onClick={(e) => { e.stopPropagation(); SoundEngine.pause(); setPaused(false); }}
                style={chip({ background: "#FFD23F", color: "#0A0E18", fontWeight: 800, border: "1px solid #FFD23F", padding: "9px 20px", fontSize: 14 })}>
                Resume
              </button>
            </div>
          )}

          {/* Tutorial step overlay — explains the current step, then either lets
              the player try it live (unpausing) or advances straight to the next
              explanation. */}
          {paused && !outcome && gameRef.current?.tutorial && TUTORIAL_STEPS[tutorialStep] && (
            <div style={{
              position: "absolute", inset: 0,
              display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
              gap: 14, background: "rgba(10,14,24,0.88)", backdropFilter: "blur(2px)",
              padding: 24, textAlign: "center",
            }}>
              <div style={{ fontSize: 11, letterSpacing: 3, color: "#FFD23F", fontWeight: 800 }}>
                TUTORIAL · {tutorialStep + 1} / {TUTORIAL_STEPS.length}
              </div>
              <div style={{ fontSize: 21, fontWeight: 800, color: "#E8EEF9", maxWidth: 420 }}>
                {TUTORIAL_STEPS[tutorialStep].title}
              </div>
              <div style={{ fontSize: 14, color: "#B8C0D6", maxWidth: 420, lineHeight: 1.6 }}>
                {TUTORIAL_STEPS[tutorialStep].body}
              </div>
              <button onClick={() => {
                SoundEngine.click();
                const step = TUTORIAL_STEPS[tutorialStep];
                if (step.final) { setScreen("menu"); return; }
                if (step.waitFor) { setPaused(false); }
                else {
                  const next = tutorialStep + 1;
                  if (TUTORIAL_STEPS[next]) { applyTutorialStep(gameRef.current, next); setTutorialStep(next); }
                }
              }}
                style={chip({ background: "#FFD23F", color: "#0A0E18", fontWeight: 800, border: "1px solid #FFD23F", padding: "10px 22px", fontSize: 15 })}>
                {TUTORIAL_STEPS[tutorialStep].final ? "Finish Tutorial" : TUTORIAL_STEPS[tutorialStep].waitFor ? "Try it →" : "Continue →"}
              </button>
              <button onClick={() => { SoundEngine.click(); setScreen("menu"); }}
                style={{ background: "none", border: "none", color: "#5c6580", fontSize: 12, textDecoration: "underline", cursor: "pointer" }}>
                Skip tutorial
              </button>
            </div>
          )}

          {/* Live hint while unpaused and waiting for the player to try the
              current step's mechanic. */}
          {!paused && gameRef.current?.tutorial && TUTORIAL_STEPS[tutorialStep]?.hint && (
            <div style={{
              position: "absolute", top: 60, left: "50%", transform: "translateX(-50%)",
              background: "rgba(28,41,66,0.9)", border: "1px solid #FFD23F", borderRadius: 10,
              padding: "8px 16px", fontSize: 13, color: "#FFD23F", fontWeight: 700,
              pointerEvents: "none", zIndex: 30, textAlign: "center", maxWidth: "80%",
            }}>
              🎯 {TUTORIAL_STEPS[tutorialStep].hint}
            </div>
          )}

          {/* Outcome overlay */}
          {outcome && (
            <div style={{
              position: "absolute", top: 0, left: 0, right: 0,
              display: "flex", alignItems: "center", justifyContent: "space-between",
              gap: 12, padding: "10px 14px",
              background: "linear-gradient(to bottom, rgba(22,32,54,0.95), rgba(22,32,54,0.0))",
              pointerEvents: "none",
            }}>
              <div style={{ pointerEvents: "auto" }}>
                <div style={{
                  fontSize: 22, fontWeight: 800, letterSpacing: 2,
                  color: outcome === "win" ? "#4ADE5A" : "#E4534A",
                }}>
                  {outcome === "win" ? "SECTOR SECURED" : "OVERRUN"}
                </div>
                <div style={{ color: "#8a93ab", fontSize: 12 }}>
                  {outcome === "win"
                    ? (gameRef.current?.mode === "2v2" ? "Enemy team wiped out." : "Every rival eliminated.")
                    : (gameRef.current?.mode === "2v2" ? "Your team has fallen." : "Your last forces have fallen.")}
                </div>
              </div>
              <div style={{ display: "flex", gap: 8, pointerEvents: "auto" }}>
                <button onClick={() => startGame(gameRef.current.numPlayers, gameRef.current.mode)}
                  style={chip({ background: "#FFD23F", color: "#0A0E18", fontWeight: 800, border: "1px solid #FFD23F", padding: "8px 14px" })}>
                  Redeploy
                </button>
                <button onClick={() => { SoundEngine.click(); setScreen("menu"); }} style={chip({ padding: "8px 14px" })}>Menu</button>
              </div>
            </div>
          )}

          {/* Commit % — overlaid on the map itself (translucent) instead of taking
              up space in the panel below, so the battlefield gets more room. */}
          <div style={{
            position: "absolute", left: 0, right: 0, bottom: 10,
            display: "flex", alignItems: "center", justifyContent: "center", gap: 7,
            pointerEvents: "auto",
          }}>
            <span style={{ fontSize: 11, letterSpacing: 3, color: "rgba(138,147,171,0.75)" }}>COMMIT</span>
            {[25, 50, 75, 100].map((p) => (
              <button key={p} onClick={() => setPct(p)}
                style={chip({
                  fontFamily: "'IBM Plex Mono', monospace",
                  padding: "8px 14px", fontSize: 13,
                  borderColor: pct === p ? "rgba(255,210,63,0.75)" : "rgba(70,87,125,0.55)",
                  color: pct === p ? "#FFD23F" : "rgba(232,235,242,0.85)",
                  background: pct === p ? "rgba(255,210,63,0.16)" : "rgba(28,41,66,0.45)",
                  backdropFilter: "blur(3px)",
                })}>
                {p}%
              </button>
            ))}
          </div>
        </>
      )}
      </div>
      {/* Map area ends here — everything below is a physically separate panel,
          not overlaid on the battlefield. */}

      {screen === "play" && (
        <div style={{
          flexShrink: 0,
          background: "#1c2942",
          borderTop: "1px solid #3a4d72",
          boxShadow: "0 -6px 18px rgba(0,0,0,0.35)",
          padding: "9px 12px calc(9px + env(safe-area-inset-bottom, 0px))",
          display: "flex", flexDirection: "column", alignItems: "center", gap: 9,
        }}>
          {/* Specials: one merged "train" — each of the first 3 segments is both its own
              load-progress fill AND the tap target for that special. Fills left-to-right
              in load order (Tower Defense → Speed → Tower Defense 2.0); a segment only
              becomes tappable once it (and everything before it) has fully loaded —
              tapping it casts instantly, no aiming/targeting step. A 4th segment (no
              special of its own) visibly fills after that, banking reserve capacity —
              enough that casting Tower Defense 2.0 from a full bar still leaves enough
              to immediately follow up with Tower Defense. */}
          <div style={{
            display: "flex", width: "100%", maxWidth: 460,
            borderRadius: 12, overflow: "hidden", border: "1px solid #3a4d72",
          }}>
            {(() => {
              const specials = [
                { kind: "storm", icon: "🛡️", name: "Tower Defense", secs: fireInfo.stormSecs, cd: fireInfo.stormCd,
                  readyTxt: "#D2E0FF", readyBg: "rgba(92,124,196,0.34)", fillTint: "#8FB4FF" },
                { kind: "speed", icon: "💨", name: "Speed", secs: fireInfo.speedSecs, cd: fireInfo.speedCd,
                  readyTxt: "#B8F5EA", readyBg: "rgba(46,158,138,0.34)", fillTint: "#57E0C6" },
                { kind: "fire", icon: "🪨", name: "Tower Defense 2.0", secs: fireInfo.fireSecs, cd: fireInfo.fireCd,
                  readyTxt: "#FFC7B0", readyBg: "rgba(180,40,25,0.42)", fillTint: "#FF3B30" },
              ];
              return [
                ...specials.map((s, i) => {
                  const start = i * TRAIN_STAGE;
                  const fillPct = Math.max(0, Math.min(100, ((fireInfo.trainProgress - start) / TRAIN_STAGE) * 100));
                  // Ready needs BOTH the train loaded AND this special's own 20s cooldown
                  // clear. Show whichever is the binding constraint as the countdown.
                  const ready = s.secs <= 0 && s.cd <= 0;
                  const displaySecs = Math.max(s.secs, s.cd);
                  const onCooldown = s.secs <= 0 && s.cd > 0;
                  const pulsing = pulse[s.kind];
                  return (
                    <button key={s.kind} className="special" onClick={() => castPlayerSpecial(s.kind)}
                      disabled={!ready}
                      style={{
                        position: "relative",
                        fontFamily: "'Oxanium', sans-serif",
                        flex: "1 1 0", minWidth: 0, minHeight: 52,
                        padding: 0,
                        border: "none",
                        borderLeft: i > 0 ? "1px solid #3a4d72" : "none",
                        background: "#1c2942",
                        overflow: "hidden",
                        cursor: ready ? "pointer" : "default",
                        animation: pulsing ? "specialReady 0.6s ease-out" : "none",
                      }}>
                      {/* Fill — this stage's own load progress; covers 100% once ready.
                          Once loaded but still on its own cooldown, the fill goes a flat
                          muted grey instead of the special's color, so "loaded" and
                          "cooling down" read as visually distinct states. */}
                      <div style={{
                        position: "absolute", left: 0, top: 0, bottom: 0,
                        width: `${fillPct}%`,
                        background: ready ? s.readyBg : onCooldown ? "rgba(138,147,171,0.4)" : s.fillTint + "38",
                        transition: "width 0.1s linear, background 0.15s",
                      }} />
                      <div style={{
                        position: "relative",
                        display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
                        gap: 2, height: "100%", padding: "6px 6px",
                        color: ready ? s.readyTxt : onCooldown ? "#C7CCDA" : "#8a93ab",
                      }}>
                        <span style={{ fontSize: 18, lineHeight: 1 }}>{onCooldown ? "⏳" : s.icon}</span>
                        {ready ? (
                          <span style={{ fontSize: 12, fontWeight: 800 }}>{s.name}</span>
                        ) : (
                          <span style={{ display: "flex", flexDirection: "column", alignItems: "center", lineHeight: 1.2 }}>
                            <span style={{ fontSize: 12, fontWeight: 800 }}>{s.name}</span>
                            <span style={{ fontSize: 10, fontWeight: 700, opacity: 0.85 }}>{displaySecs}s</span>
                          </span>
                        )}
                      </div>
                    </button>
                  );
                }),
                (() => {
                  // 4th segment: pure reserve capacity, no special of its own. Fills
                  // from the 3rd special's threshold (60s) up to TRAIN_MAX (80s) —
                  // banking this is what lets you follow up Tower Defense 2.0 with
                  // Tower Defense right away instead of starting from empty.
                  const start = 3 * TRAIN_STAGE;
                  const fillPct = Math.max(0, Math.min(100, ((fireInfo.trainProgress - start) / TRAIN_STAGE) * 100));
                  const full = fillPct >= 100;
                  return (
                    <div key="reserve"
                      style={{
                        position: "relative",
                        fontFamily: "'Oxanium', sans-serif",
                        flex: "1 1 0", minWidth: 0, minHeight: 52,
                        borderLeft: "1px solid #3a4d72",
                        background: "#1c2942",
                        overflow: "hidden",
                      }}>
                      <div style={{
                        position: "absolute", left: 0, top: 0, bottom: 0,
                        width: `${fillPct}%`,
                        background: full ? "rgba(138,147,171,0.4)" : "rgba(138,147,171,0.22)",
                        transition: "width 0.1s linear, background 0.15s",
                      }} />
                      <div style={{
                        position: "relative",
                        display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
                        gap: 2, height: "100%", padding: "6px 6px",
                        color: full ? "#C7CCDA" : "#6b7590",
                      }}>
                        <span style={{ fontSize: 16, lineHeight: 1 }}>🔋</span>
                        <span style={{ fontSize: 10, fontWeight: 800 }}>Reserve</span>
                      </div>
                    </div>
                  );
                })(),
              ];
            })()}
          </div>
        </div>
      )}
    </div>
  );
}


const boot = document.getElementById('boot');
if (boot) boot.remove();
ReactDOM.createRoot(document.getElementById('root')).render(<TowerConquest />);
</script>
</body>
</html>
